<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Monstera care card</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #e8f0e8;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 24px;
    }

    .cards-row {
      display: flex;
      gap: 16px;
      align-items: flex-start;
      width: 100%;
      max-width: 712px;
    }

    .card {
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 4px 28px rgba(0, 0, 0, 0.12);
      width: 100%;
      max-width: 340px;
      overflow: hidden;
      flex-shrink: 0;
    }

    .add-plant-card {
      width: 340px;
      max-width: 340px;
      flex-shrink: 0;
      border-radius: 20px;
      border: 2px dashed #b2d8b2;
      background: rgba(255,255,255,0.5);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 40px 24px;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
      text-decoration: none;
      min-height: 200px;
    }

    .add-plant-card:hover {
      background: rgba(255,255,255,0.8);
      border-color: #66bb6a;
    }

    .add-plant-icon {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: #e8f5e9;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.6rem;
      color: #2e7d32;
      transition: background 0.2s;
    }

    .add-plant-card:hover .add-plant-icon {
      background: #c8e6c9;
    }

    .add-plant-label {
      font-size: 0.9rem;
      font-weight: 600;
      color: #4caf50;
    }

    .add-plant-hint {
      font-size: 0.75rem;
      color: #9e9e9e;
      text-align: center;
    }

    @media (max-width: 720px) {
      .cards-row {
        flex-direction: column;
        align-items: center;
      }

      .add-plant-card {
        max-width: 100%;
      }
    }

    .plant-image {
      background: #e8f5e9;
      height: 265px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .plant-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      display: block;
    }

    .plant-image svg {
      height: 240px;
      width: auto;
    }

    .card-body {
      padding: 22px 24px 22px;
    }

    .greeting {
      font-size: 0.82rem;
      font-weight: 600;
      color: #81c784;
      margin-bottom: 10px;
      letter-spacing: 0.1px;
    }

    .plant-name {
      font-size: 1.45rem;
      font-weight: 700;
      color: #1b5e20;
      letter-spacing: -0.3px;
    }

    .plant-species {
      font-size: 0.85rem;
      color: #9e9e9e;
      font-style: italic;
      margin-top: 2px;
      margin-bottom: 20px;
    }

    .care-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .care-item {
      background: #f5f5f5;
      border-radius: 12px;
      padding: 14px 8px 12px;
      text-align: center;
    }

    .care-icon {
      display: flex;
      justify-content: center;
      margin-bottom: 8px;
    }

    .care-label {
      font-size: 0.65rem;
      font-weight: 600;
      color: #bdbdbd;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      margin-bottom: 3px;
    }

    .care-value {
      font-size: 0.78rem;
      font-weight: 600;
      color: #2e7d32;
      line-height: 1.3;
    }

    .feedback-link {
      display: block;
      text-align: right;
      font-size: 0.78rem;
      color: #66bb6a;
      text-decoration: none;
      margin-top: 14px;
    }

    .feedback-link:hover {
      color: #2e7d32;
      text-decoration: underline;
    }

    .action-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 16px;
    }

    .action-btn {
      padding: 12px 10px;
      border: none;
      border-radius: 12px;
      background: #f5f5f5;
      color: #2e7d32;
      font-size: 0.85rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }

    .action-btn:hover {
      background: #e8f5e9;
    }

    .action-btn:active {
      background: #c8e6c9;
    }

    .weather-widget {
      background: #f0f4f0;
      border-radius: 12px;
      padding: 12px 14px;
      margin-top: 14px;
      display: flex;
      align-items: center;
      gap: 12px;
      min-height: 56px;
    }

    .weather-icon {
      font-size: 1.6rem;
      line-height: 1;
      flex-shrink: 0;
    }

    .weather-info {
      flex: 1;
      min-width: 0;
    }

    .weather-temp {
      font-size: 1.1rem;
      font-weight: 700;
      color: #1b5e20;
      line-height: 1.1;
    }

    .weather-desc {
      font-size: 0.72rem;
      color: #757575;
      margin-top: 1px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .weather-location {
      font-size: 0.68rem;
      color: #9e9e9e;
      text-align: right;
      flex-shrink: 0;
    }

    .weather-error {
      font-size: 0.75rem;
      color: #9e9e9e;
    }

    @media (max-width: 400px) {
      body {
        align-items: flex-start;
        padding: 16px;
      }

      .plant-image {
        height: 220px;
      }
    }
  </style>
</head>
<body>
  <div class="cards-row">
  <div class="card">

    <div class="plant-image" id="plantImageContainer">
      <svg id="plantSvg" viewBox="0 0 200 252" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="lg" x1="25%" y1="0%" x2="75%" y2="100%">
            <stop offset="0%"   stop-color="#a5d6a7"/>
            <stop offset="45%"  stop-color="#4caf50"/>
            <stop offset="100%" stop-color="#1b5e20"/>
          </linearGradient>
          <linearGradient id="lgSheen" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%"   stop-color="#fff" stop-opacity="0.18"/>
            <stop offset="55%"  stop-color="#fff" stop-opacity="0"/>
            <stop offset="100%" stop-color="#000" stop-opacity="0.1"/>
          </linearGradient>
        </defs>

        <!-- Petiole (stem) -->
        <path d="M100,236 C99,242 100,248 100,252"
              stroke="#5d4037" stroke-width="6" stroke-linecap="round" fill="none"/>

        <!--
          Leaf outline: proper monstera deliciosa shape.
          3 main lobes per side + heart-shaped basal lobes.
          Deep sinuses cut close to midrib.
          Path traces clockwise from tip.
        -->
        <path fill="url(#lg)" d="
          M 100,15
          C 118,15 158,35 165,52
          C 170,62 130,68 112,72
          C 112,82 175,88 182,105
          C 186,120 128,126 110,128
          C 112,138 158,148 165,162
          C 172,173 125,180 108,180
          C 112,192 140,200 142,214
          C 144,224 118,230 110,230
          C 108,233 104,236 100,236
          C 96,236 92,233 90,230
          C 82,230 56,224 58,214
          C 60,200 88,192 92,180
          C 75,180 28,173 35,162
          C 42,148 88,138 90,128
          C 72,126 14,120 18,105
          C 25,88 88,82 88,72
          C 70,68 30,62 35,52
          C 42,35 82,15 100,15
          Z
        "/>

        <!-- Gloss sheen overlay -->
        <path fill="url(#lgSheen)" d="
          M 100,15
          C 118,15 158,35 165,52
          C 170,62 130,68 112,72
          C 112,82 175,88 182,105
          C 186,120 128,126 110,128
          C 112,138 158,148 165,162
          C 172,173 125,180 108,180
          C 112,192 140,200 142,214
          C 144,224 118,230 110,230
          C 108,233 104,236 100,236
          C 96,236 92,233 90,230
          C 82,230 56,224 58,214
          C 60,200 88,192 92,180
          C 75,180 28,173 35,162
          C 42,148 88,138 90,128
          C 72,126 14,120 18,105
          C 25,88 88,82 88,72
          C 70,68 30,62 35,52
          C 42,35 82,15 100,15 Z
        "/>

        <!-- Midrib -->
        <line x1="100" y1="15" x2="100" y2="236"
              stroke="#1a5c1e" stroke-width="1.8" opacity="0.4"/>

        <!-- Right lateral veins (one per lobe) -->
        <path d="M100,40  C118,38 148,44 164,52"  stroke="#1a5c1e" stroke-width="1" fill="none" opacity="0.28"/>
        <path d="M100,86  C125,83 162,92 180,105"  stroke="#1a5c1e" stroke-width="1" fill="none" opacity="0.28"/>
        <path d="M100,132 C120,130 150,142 163,162" stroke="#1a5c1e" stroke-width="1" fill="none" opacity="0.28"/>
        <path d="M100,180 C112,178 130,194 140,212" stroke="#1a5c1e" stroke-width="1" fill="none" opacity="0.28"/>

        <!-- Left lateral veins (mirror) -->
        <path d="M100,40  C82,38 52,44 36,52"    stroke="#1a5c1e" stroke-width="1" fill="none" opacity="0.28"/>
        <path d="M100,86  C75,83 38,92 20,105"    stroke="#1a5c1e" stroke-width="1" fill="none" opacity="0.28"/>
        <path d="M100,132 C80,130 50,142 37,162"  stroke="#1a5c1e" stroke-width="1" fill="none" opacity="0.28"/>
        <path d="M100,180 C88,178 70,194 60,212"  stroke="#1a5c1e" stroke-width="1" fill="none" opacity="0.28"/>

        <!-- Fenestrations: ovals near midrib between lobes. Fill matches image bg #e8f5e9 -->
        <ellipse cx="146" cy="90"  rx="16" ry="10" fill="#e8f5e9"/>
        <ellipse cx="54"  cy="90"  rx="16" ry="10" fill="#e8f5e9"/>
        <ellipse cx="140" cy="142" rx="14" ry="9"  fill="#e8f5e9"/>
        <ellipse cx="60"  cy="142" rx="14" ry="9"  fill="#e8f5e9"/>
      </svg>
    </div>

    <div class="card-body">
      <div class="greeting" id="greeting"></div>
      <div class="plant-name">Monstera</div>
      <div class="plant-species">Monstera deliciosa</div>

      <div class="care-grid">

        <!-- Light -->
        <div class="care-item">
          <div class="care-icon">
            <svg width="30" height="30" viewBox="0 0 30 30" fill="none" xmlns="http://www.w3.org/2000/svg">
              <circle cx="15" cy="15" r="5.5" fill="#FFA726"/>
              <line x1="15" y1="2"    x2="15" y2="5.5"  stroke="#FFA726" stroke-width="2" stroke-linecap="round"/>
              <line x1="15" y1="24.5" x2="15" y2="28"   stroke="#FFA726" stroke-width="2" stroke-linecap="round"/>
              <line x1="2"  y1="15"   x2="5.5" y2="15"  stroke="#FFA726" stroke-width="2" stroke-linecap="round"/>
              <line x1="24.5" y1="15" x2="28"  y2="15"  stroke="#FFA726" stroke-width="2" stroke-linecap="round"/>
              <line x1="5.8"  y1="5.8"  x2="8.2"  y2="8.2"  stroke="#FFA726" stroke-width="2" stroke-linecap="round"/>
              <line x1="21.8" y1="21.8" x2="24.2" y2="24.2" stroke="#FFA726" stroke-width="2" stroke-linecap="round"/>
              <line x1="24.2" y1="5.8"  x2="21.8" y2="8.2"  stroke="#FFA726" stroke-width="2" stroke-linecap="round"/>
              <line x1="8.2"  y1="21.8" x2="5.8"  y2="24.2" stroke="#FFA726" stroke-width="2" stroke-linecap="round"/>
            </svg>
          </div>
          <div class="care-label">Light</div>
          <div class="care-value">Bright indirect</div>
        </div>

        <!-- Water -->
        <div class="care-item">
          <div class="care-icon">
            <svg width="30" height="30" viewBox="0 0 30 30" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M15 4 C15 4 7 14 7 19.5 C7 23.6 10.7 27 15 27 C19.3 27 23 23.6 23 19.5 C23 14 15 4 15 4Z"
                    fill="#42A5F5"/>
              <path d="M19 22 C18 24.2 16 25.2 13.5 24.5"
                    stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.65"/>
            </svg>
          </div>
          <div class="care-label">Water</div>
          <div class="care-value">Every 1–2 weeks</div>
        </div>

        <!-- Humidity -->
        <div class="care-item">
          <div class="care-icon">
            <svg width="30" height="30" viewBox="0 0 30 30" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M9 3 C9 3 5 8.5 5 11.5 C5 14 6.8 16 9 16 C11.2 16 13 14 13 11.5 C13 8.5 9 3 9 3Z"
                    fill="#90CAF9"/>
              <path d="M21 3 C21 3 17 8.5 17 11.5 C17 14 18.8 16 21 16 C23.2 16 25 14 25 11.5 C25 8.5 21 3 21 3Z"
                    fill="#90CAF9"/>
              <path d="M15 14 C15 14 11 19.5 11 22.5 C11 25 12.8 27 15 27 C17.2 27 19 25 19 22.5 C19 19.5 15 14 15 14Z"
                    fill="#42A5F5"/>
            </svg>
          </div>
          <div class="care-label">Humidity</div>
          <div class="care-value">60%+ preferred</div>
        </div>

      </div>

      <!-- Weather widget -->
      <div class="weather-widget" id="weatherWidget">
        <span class="weather-error">Loading weather…</span>
      </div>
      <!-- Action buttons -->
      <div class="action-buttons">
        <button class="action-btn" onclick="location.href='todo.html'">📓 Journal</button>
        <button class="action-btn" onclick="location.href='tracker.html'">💧 Watering tracker</button>
      </div>

      <div style="display:flex;justify-content:space-between;margin-top:14px;">
        <a href="onboarding.html?screen=2" class="feedback-link" style="margin-top:0;">Change my profile</a>
        <a href="feedback.html" class="feedback-link" style="margin-top:0;">Send feedback</a>
      </div>
    </div>
  </div>

  <a href="onboarding.html?screen=1" class="add-plant-card">
    <div class="add-plant-icon">+</div>
    <div class="add-plant-label">Add a plant</div>
    <div class="add-plant-hint">Track care for another plant in your collection. Only visible if you told us you like plants.</div>
  </a>

  </div>

  <a href="index.html" style="position:fixed;top:12px;left:14px;font-size:0.75rem;color:#555;text-decoration:none;">← Back to portfolio</a>

  <script>
    const widget = document.getElementById('weatherWidget');

    const cities = {
      'Brampton':      { lat: 43.7315, lon: -79.7624,  prov: 'ON', tz: 'America/Toronto'   },
      'Calgary':       { lat: 51.0447, lon: -114.0719, prov: 'AB', tz: 'America/Edmonton'  },
      'Edmonton':      { lat: 53.5461, lon: -113.4938, prov: 'AB', tz: 'America/Edmonton'  },
      'Halifax':       { lat: 44.6488, lon: -63.5752,  prov: 'NS', tz: 'America/Halifax'   },
      'Hamilton':      { lat: 43.2557, lon: -79.8711,  prov: 'ON', tz: 'America/Toronto'   },
      'Kelowna':       { lat: 49.8880, lon: -119.4960, prov: 'BC', tz: 'America/Vancouver' },
      'Laval':         { lat: 45.6066, lon: -73.7124,  prov: 'QC', tz: 'America/Toronto'   },
      'London':        { lat: 42.9849, lon: -81.2453,  prov: 'ON', tz: 'America/Toronto'   },
      'Mississauga':   { lat: 43.5890, lon: -79.6441,  prov: 'ON', tz: 'America/Toronto'   },
      'Moncton':       { lat: 46.0878, lon: -64.7782,  prov: 'NB', tz: 'America/Halifax'   },
      'Montreal':      { lat: 45.5017, lon: -73.5673,  prov: 'QC', tz: 'America/Toronto'   },
      'Ottawa':        { lat: 45.4215, lon: -75.6972,  prov: 'ON', tz: 'America/Toronto'   },
      'Quebec City':   { lat: 46.8139, lon: -71.2080,  prov: 'QC', tz: 'America/Toronto'   },
      'Regina':        { lat: 50.4452, lon: -104.6189, prov: 'SK', tz: 'America/Regina'    },
      'Saskatoon':     { lat: 52.1332, lon: -106.6700, prov: 'SK', tz: 'America/Regina'    },
      "St. John's":    { lat: 47.5615, lon: -52.7126,  prov: 'NL', tz: 'America/St_Johns'  },
      'Sudbury':       { lat: 46.4900, lon: -80.9910,  prov: 'ON', tz: 'America/Toronto'   },
      'Thunder Bay':   { lat: 48.3809, lon: -89.2477,  prov: 'ON', tz: 'America/Toronto'   },
      'Toronto':       { lat: 43.7001, lon: -79.4163,  prov: 'ON', tz: 'America/Toronto'   },
      'Vancouver':     { lat: 49.2827, lon: -123.1207, prov: 'BC', tz: 'America/Vancouver' },
      'Victoria':      { lat: 48.4284, lon: -123.3656, prov: 'BC', tz: 'America/Vancouver' },
      'Windsor':       { lat: 42.3149, lon: -83.0364,  prov: 'ON', tz: 'America/Toronto'   },
      'Winnipeg':      { lat: 49.8951, lon: -97.1384,  prov: 'MB', tz: 'America/Winnipeg'  },
    };

    const weatherIcons = {
      0: '☀️', 1: '🌤️', 2: '⛅', 3: '☁️',
      45: '🌫️', 48: '🌫️',
      51: '🌦️', 53: '🌦️', 55: '🌧️',
      61: '🌧️', 63: '🌧️', 65: '🌧️',
      71: '🌨️', 73: '🌨️', 75: '❄️',
      80: '🌦️', 81: '🌧️', 82: '⛈️',
      95: '⛈️', 96: '⛈️', 99: '⛈️'
    };

    const weatherDescs = {
      0: 'Clear sky', 1: 'Mainly clear', 2: 'Partly cloudy', 3: 'Overcast',
      45: 'Foggy', 48: 'Freezing fog',
      51: 'Light drizzle', 53: 'Drizzle', 55: 'Heavy drizzle',
      61: 'Light rain', 63: 'Rain', 65: 'Heavy rain',
      71: 'Light snow', 73: 'Snow', 75: 'Heavy snow',
      80: 'Showers', 81: 'Rain showers', 82: 'Violent showers',
      95: 'Thunderstorm', 96: 'Thunderstorm', 99: 'Thunderstorm'
    };

    const cityName = localStorage.getItem('plant-city') || 'Toronto';
    const city = cities[cityName] || cities['Toronto'];
    const { lat, lon, prov, tz } = city;

    if (localStorage.getItem('plant-love') === 'melanie') {
      document.querySelector('.add-plant-card').style.display = 'none';
    }

    const userName = localStorage.getItem('plant-user-name');
    if (userName) {
      const hour = parseInt(new Intl.DateTimeFormat('en-CA', { hour: 'numeric', hour12: false, timeZone: tz }).format(new Date()), 10);
      const period = hour < 12 ? 'morning' : hour < 18 ? 'afternoon' : 'evening';
      document.getElementById('greeting').textContent = `Good ${period}, ${userName}.`;
    }

    fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,weathercode&temperature_unit=celsius&timezone=${encodeURIComponent(tz)}`)
      .then(r => r.json())
      .then(data => {
        const temp = Math.round(data.current.temperature_2m);
        const code = data.current.weathercode;
        const icon = weatherIcons[code] ?? '🌡️';
        const desc = weatherDescs[code] ?? 'Unknown';
        widget.innerHTML = `
          <span class="weather-icon">${icon}</span>
          <div class="weather-info">
            <div class="weather-temp">${temp}°C</div>
            <div class="weather-desc">${desc}</div>
          </div>
          <div class="weather-location">${cityName}, ${prov}</div>
        `;

        const isSunny = [0, 1].includes(code);
        const isHot = temp >= 28;
        const isCloudyOrRainy = [2, 3, 45, 48, 51, 53, 55, 61, 63, 65, 80, 81, 82, 95, 96, 99].includes(code);

        let tip = '';
        if (isSunny || isHot) {
          tip = `<div style="margin-top:8px; padding-top:8px; border-top:1px solid rgba(0,0,0,0.07); font-size:0.72rem; color:#795548; line-height:1.5;">☀️ Extra sunlight and hot weather may dry out your plant faster. Check your water levels.</div>`;
        } else if (isCloudyOrRainy) {
          tip = `<div style="margin-top:8px; padding-top:8px; border-top:1px solid rgba(0,0,0,0.07); font-size:0.72rem; color:#2e7d32; line-height:1.5;">🌿 It's a great day for indoor plant care.</div>`;
        }

        if (tip) widget.style.flexWrap = 'wrap';
        widget.innerHTML += tip;
      })
      .catch(() => {
        widget.innerHTML = '<span class="weather-error">Weather unavailable</span>';
      });
  </script>
</body>
</html>
