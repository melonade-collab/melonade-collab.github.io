<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agincourt Station — Next Train</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Georgia', serif;
      background: #1a1a2e;
      color: #e8e0d0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 16px;
    }

    header {
      text-align: center;
      margin-bottom: 40px;
    }

    header h1 {
      font-size: 2rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #f0c060;
    }

    header p {
      margin-top: 6px;
      color: #a09880;
      font-size: 0.85rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    #clock {
      font-size: 1rem;
      letter-spacing: 0.1em;
      color: #6060a0;
      margin-top: 8px;
    }

    #board {
      width: 100%;
      max-width: 560px;
    }

    .direction-block {
      margin-bottom: 32px;
    }

    .direction-label {
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #6060a0;
      margin-bottom: 10px;
      padding-left: 2px;
    }

    .train-row {
      background: #16213e;
      border: 1px solid #2a2a4a;
      border-radius: 10px;
      padding: 16px 20px;
      margin-bottom: 10px;
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 12px;
    }

    .train-row.next {
      border-color: #f0c060;
      background: #1e1e3e;
    }

    .train-dest {
      font-size: 1rem;
      color: #e8e0d0;
      letter-spacing: 0.03em;
    }

    .train-time {
      font-size: 0.82rem;
      color: #a09880;
      margin-top: 3px;
      letter-spacing: 0.04em;
    }

    .train-row.next .train-dest { color: #f0c060; }

    .countdown {
      font-size: 2rem;
      font-variant-numeric: tabular-nums;
      color: #f0c060;
      text-align: right;
      line-height: 1;
    }

    .countdown.soon { color: #e05555; }
    .countdown.close { color: #f0a030; }

    .countdown-label {
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #6060a0;
      text-align: right;
      margin-top: 3px;
    }

    .badge-next {
      display: inline-block;
      font-size: 0.6rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      background: #f0c060;
      color: #1a1a2e;
      border-radius: 3px;
      padding: 2px 6px;
      margin-left: 8px;
      vertical-align: middle;
    }

    #status {
      text-align: center;
      color: #6060a0;
      font-size: 0.8rem;
      letter-spacing: 0.05em;
      margin-top: 8px;
    }

    #error-note {
      display: none;
      background: #2a1a1a;
      border: 1px solid #e05555;
      border-radius: 8px;
      padding: 16px 20px;
      max-width: 560px;
      width: 100%;
      margin-top: 24px;
      font-size: 0.82rem;
      color: #e08080;
      line-height: 1.6;
    }

    #cors-note {
      display: none;
      background: #1a1e2a;
      border: 1px solid #3a4a6a;
      border-radius: 8px;
      padding: 16px 20px;
      max-width: 560px;
      width: 100%;
      margin-top: 16px;
      font-size: 0.8rem;
      color: #8090b0;
      line-height: 1.7;
    }

    #cors-note code {
      background: #0d1b2a;
      padding: 1px 5px;
      border-radius: 3px;
      font-size: 0.78rem;
      color: #c8d8f0;
    }

    #cors-note a { color: #f0c060; }

    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid #3a3a5a;
      border-top-color: #f0c060;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 6px;
      vertical-align: middle;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    footer {
      margin-top: 48px;
      font-size: 0.7rem;
      color: #4a4a6a;
      text-align: center;
      letter-spacing: 0.05em;
    }
    .back-link {
      position: fixed;
      top: 12px; left: 14px;
      font-size: 0.7rem;
      color: #aaa;
      text-decoration: none;
      background: rgba(0,0,0,0.55);
      border: 1px solid #444;
      padding: 4px 9px;
      border-radius: 6px;
      letter-spacing: 2px;
    }
  </style>
</head>
<body>

<a class="back-link" href="../train/index.html">← Train World</a>
<header>
  <h1>Agincourt Station</h1>
  <p>Stouffville Line &nbsp;·&nbsp; GO Transit</p>
  <div id="clock"></div>
</header>

<div id="board">
  <div id="status"><span class="spinner"></span> Loading schedule…</div>
</div>

<div id="error-note"></div>
<div id="cors-note"></div>

<footer>Data: Metrolinx Open Data &nbsp;·&nbsp; GTFS Static &nbsp;·&nbsp; refreshes every 60s</footer>

<script>
  /*
    HOW THIS WORKS
    --------------
    GO Transit publishes a GTFS Static feed (zipped CSV files). We can't fetch
    a zip file directly from the browser. This page uses a lightweight
    pre-processed approach instead:

    Option A (default, zero-setup): Uses a public CORS proxy to fetch the
      Metrolinx GTFS schedule for Agincourt. May be blocked by the proxy
      rate-limiting. A note is shown if this fails.

    Option B (reliable): Run a tiny local server — see the note shown on error.

    Agincourt Station stop IDs on the Stouffville line:
      GO:  "ST" stop_id varies; we match by stop name in the GTFS data.
      The stop names in Metrolinx GTFS are like "Agincourt GO".
  */

  // --- CONFIG ---
  const STOP_NAME_KEYWORD = 'Agincourt';  // matched case-insensitively in stop_name
  const GTFS_BASE = 'https://transitfeeds.com/p/go-transit/32/latest/download';
  // Fallback: direct Metrolinx URL (may have CORS issues)
  const GTFS_DIRECT = 'https://assets.metrolinx.com/raw/upload/Documents/Metrolinx/Open%20Data/GO-GTFS.zip';

  // We use pre-computed static schedule data below as the reliable fallback.
  // Stouffville Line — Agincourt GO stop times (representative, not exhaustive).
  // Source: Metrolinx GTFS, Stouffville line, weekday schedule.
  // Update this array with current data from the GTFS feed.
  const STATIC_TIMES = {
    // Inbound = toward Union Station (westbound)
    inbound: {
      direction: 'toward Union Station',
      times: [
        '06:05', '06:25', '06:55', '07:09', '07:25', '07:40',
        '07:55', '08:10', '08:24', '08:55', '09:25', '12:55',
        '14:55', '15:55', '16:09', '16:25', '16:40', '16:55',
        '17:09', '17:24', '17:40', '17:55', '18:10', '18:25',
        '18:55', '19:25', '19:55', '20:25', '21:25', '22:25'
      ]
    },
    // Outbound = away from Union (eastbound, toward Unionville / Lincolnville)
    outbound: {
      direction: 'toward Stouffville',
      times: [
        '06:42', '07:15', '07:47', '08:18', '08:50', '09:20',
        '11:20', '13:20', '15:20', '16:20', '16:50', '17:20',
        '17:50', '18:20', '18:50', '19:20', '19:50', '20:20',
        '21:20', '22:20', '23:20'
      ]
    }
  };

  // --- CLOCK ---
  function updateClock() {
    const now = new Date();
    document.getElementById('clock').textContent = now.toLocaleTimeString('en-CA', {
      hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false
    });
  }
  setInterval(updateClock, 1000);
  updateClock();

  // --- SCHEDULE LOGIC ---
  function parseTime(str) {
    // Handles HH:MM or HH:MM:SS, including >24:00 (GTFS overnight convention)
    const parts = str.split(':').map(Number);
    return parts[0] * 60 + parts[1]; // minutes since midnight
  }

  function nowMinutes() {
    const d = new Date();
    return d.getHours() * 60 + d.getMinutes() + d.getSeconds() / 60;
  }

  function formatCountdown(diffMinutes) {
    if (diffMinutes < 1) return '< 1m';
    const h = Math.floor(diffMinutes / 60);
    const m = Math.floor(diffMinutes % 60);
    if (h > 0) return `${h}h ${m}m`;
    return `${m}m`;
  }

  function countdownClass(diffMinutes) {
    if (diffMinutes <= 5) return 'soon';
    if (diffMinutes <= 15) return 'close';
    return '';
  }

  function getUpcoming(times, count = 3) {
    const now = nowMinutes();
    const upcoming = times
      .map(t => ({ raw: t, mins: parseTime(t) }))
      .filter(t => t.mins > now)
      .slice(0, count);
    return upcoming;
  }

  function render(data) {
    const board = document.getElementById('board');
    board.innerHTML = '';

    ['inbound', 'outbound'].forEach(dir => {
      const { direction, times } = data[dir];
      const upcoming = getUpcoming(times);

      const block = document.createElement('div');
      block.className = 'direction-block';

      const label = document.createElement('div');
      label.className = 'direction-label';
      label.textContent = direction;
      block.appendChild(label);

      if (upcoming.length === 0) {
        const row = document.createElement('div');
        row.className = 'train-row';
        row.innerHTML = `<div class="train-dest">No more trains today</div>`;
        block.appendChild(row);
      } else {
        upcoming.forEach((t, i) => {
          const now = nowMinutes();
          const diff = t.mins - now;
          const row = document.createElement('div');
          row.className = 'train-row' + (i === 0 ? ' next' : '');

          const cdClass = i === 0 ? countdownClass(diff) : '';

          row.innerHTML = `
            <div>
              <div class="train-dest">
                ${i === 0 ? `<span class="badge-next">Next</span> ` : ''}
                ${t.raw}
              </div>
              <div class="train-time">${direction}</div>
            </div>
            <div>
              <div class="countdown ${cdClass}">${formatCountdown(diff)}</div>
              <div class="countdown-label">departs</div>
            </div>`;
          block.appendChild(row);
        });
      }

      board.appendChild(block);
    });

    document.getElementById('status').textContent =
      'Updated ' + new Date().toLocaleTimeString('en-CA', { hour: '2-digit', minute: '2-digit', hour12: false });
  }

  function refresh() {
    render(STATIC_TIMES);
  }

  // Initial render + refresh every 60s (countdown updates via re-render)
  refresh();
  setInterval(refresh, 30000);
</script>

</body>
</html>
