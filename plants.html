<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Plants</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #b5cdb5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 40px 20px;
    }

    .phone-frame {
      width: 320px;
      height: min(780px, calc(100vh - 60px));
      background: #f5f5f5;
      border-radius: 50px;
      box-shadow: 0 0 0 10px #1c1c1e, 0 0 0 11px #3a3a3c, 0 40px 100px rgba(0,0,0,0.55);
      overflow: hidden;
      position: relative;
      display: flex;
      flex-direction: column;
    }

    .phone-frame::before {
      content: '';
      position: absolute;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      width: 110px;
      height: 30px;
      background: #1c1c1e;
      border-radius: 20px;
      z-index: 20;
      pointer-events: none;
    }

    .status-bar {
      flex-shrink: 0;
      padding: 16px 28px 6px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #fff;
    }

    .status-time {
      font-size: 0.92rem;
      font-weight: 700;
      color: #1c1c1e;
      letter-spacing: -0.3px;
      padding-left: 4px;
    }

    .status-icons {
      display: flex;
      align-items: center;
      gap: 7px;
      padding-right: 4px;
    }

    .app-nav {
      flex-shrink: 0;
      background: #fff;
      border-bottom: 1px solid #f0f0f0;
      padding: 8px 16px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: relative;
    }

    .nav-title {
      font-size: 1rem;
      font-weight: 700;
      color: #1c1c1e;
      letter-spacing: -0.2px;
    }

    .nav-settings-wrap {
      min-width: 72px;
      display: flex;
      justify-content: flex-end;
      position: relative;
    }

    .nav-settings-btn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      display: flex;
      align-items: center;
      color: #4caf50;
    }

    .nav-settings-menu {
      display: none;
      position: absolute;
      right: 0;
      top: calc(100% + 8px);
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.16);
      min-width: 188px;
      overflow: hidden;
      border: 1px solid rgba(0,0,0,0.07);
      z-index: 100;
    }

    .nav-settings-menu a {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 13px 16px;
      font-size: 0.85rem;
      font-weight: 500;
      color: #2e7d32;
      text-decoration: none;
      font-family: inherit;
      border-top: 1px solid #f0f0f0;
    }

    .nav-settings-menu a:first-child { border-top: none; }

    .app-content {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 16px 14px 32px;
    }

    .section-label {
      font-size: 0.65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: #9e9e9e;
      margin-bottom: 10px;
      padding-left: 4px;
    }

    /* Plant card */
    .plant-card {
      display: flex;
      align-items: center;
      gap: 14px;
      background: #fff;
      border-radius: 16px;
      padding: 12px 14px 12px 12px;
      text-decoration: none;
      box-shadow: 0 2px 12px rgba(0,0,0,0.07);
      transition: box-shadow 0.15s, transform 0.1s;
      margin-bottom: 10px;
    }

    .plant-card:active {
      transform: scale(0.98);
      box-shadow: 0 1px 6px rgba(0,0,0,0.08);
    }

    .plant-thumb {
      width: 58px;
      height: 58px;
      border-radius: 12px;
      overflow: hidden;
      flex-shrink: 0;
      background: #e8f5e9;
    }

    .plant-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .plant-card-info {
      flex: 1;
      min-width: 0;
    }

    .plant-card-name {
      font-size: 0.97rem;
      font-weight: 700;
      color: #1b5e20;
      letter-spacing: -0.2px;
    }

    .plant-card-species {
      font-size: 0.72rem;
      color: #9e9e9e;
      font-style: italic;
      margin-top: 1px;
      margin-bottom: 6px;
    }

    .plant-card-status {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .status-dot.good    { background: #66bb6a; }
    .status-dot.soon    { background: #ffb300; }
    .status-dot.overdue { background: #ef6c00; }
    .status-dot.none    { background: #bdbdbd; }

    .status-text {
      font-size: 0.72rem;
      font-weight: 600;
      color: #757575;
    }

    .status-text.overdue { color: #e65100; }

    .card-chevron {
      color: #bdbdbd;
      flex-shrink: 0;
    }

    /* Add plant button */
    .add-plant-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 14px;
      border: 2px dashed #b2d8b2;
      border-radius: 16px;
      background: rgba(255,255,255,0.6);
      color: #4caf50;
      font-size: 0.85rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      margin-top: 6px;
      transition: background 0.15s, border-color 0.15s;
    }

    .add-plant-btn:hover {
      background: rgba(255,255,255,0.9);
      border-color: #66bb6a;
    }

    @media (max-width: 440px) {
      body { padding: 0; align-items: flex-start; background: #fff; }
      .phone-frame { width: 100%; border-radius: 0; box-shadow: none; max-height: 100dvh; background: #f5f5f5; }
      .phone-frame::before { display: none; }
      .status-bar { display: none; }
    }
  </style>
</head>
<body>
  <div class="phone-frame">

    <div class="status-bar">
      <span class="status-time">9:41</span>
      <div class="status-icons">
        <svg width="17" height="12" viewBox="0 0 17 12" fill="#1c1c1e">
          <rect x="0"  y="8" width="3" height="4" rx="0.5"/>
          <rect x="4"  y="5" width="3" height="7" rx="0.5"/>
          <rect x="8"  y="2" width="3" height="10" rx="0.5"/>
          <rect x="12" y="0" width="3" height="12" rx="0.5" opacity="0.3"/>
        </svg>
        <svg width="16" height="12" viewBox="0 0 16 12" fill="none" stroke="#1c1c1e" stroke-linecap="round">
          <path d="M1 4.5 C4 1.5 12 1.5 15 4.5" stroke-width="1.4" opacity="0.3"/>
          <path d="M3 7 C5 5 11 5 13 7" stroke-width="1.4"/>
          <path d="M5.5 9.5 C6.5 8.5 9.5 8.5 10.5 9.5" stroke-width="1.4"/>
          <circle cx="8" cy="11.5" r="0.8" fill="#1c1c1e" stroke="none"/>
        </svg>
        <svg width="25" height="12" viewBox="0 0 25 12" fill="none">
          <rect x="0.5" y="0.5" width="21" height="11" rx="3" stroke="#1c1c1e" stroke-width="1" opacity="0.35"/>
          <rect x="1.5" y="1.5" width="16" height="9" rx="2" fill="#1c1c1e"/>
          <path d="M22.5 4v4a2 2 0 0 0 0-4z" fill="#1c1c1e" opacity="0.4"/>
        </svg>
      </div>
    </div>

    <div class="app-nav">
      <div style="min-width:72px;"></div>
      <span class="nav-title">My Plants</span>
      <div class="nav-settings-wrap">
        <button class="nav-settings-btn" onclick="toggleSettings(event)" aria-label="Settings">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
        </button>
        <div class="nav-settings-menu" id="settingsMenu">
          <a href="profile.html">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            Change my profile
          </a>
          <a href="feedback.html">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            Send feedback
          </a>
          <a href="#" onclick="restartPrototype(event)" style="color:#e53935;">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4.68"/></svg>
            Restart prototype
          </a>
        </div>
      </div>
    </div>

    <div class="app-content">
      <div id="greeting" style="font-size:0.82rem;font-weight:600;color:#2e7d32;margin-bottom:14px;padding-left:4px;letter-spacing:0.1px;"></div>
      <div class="section-label">Your collection</div>

      <div id="monsteraCard">
        <a href="monstera.html" class="plant-card">
          <div class="plant-thumb">
            <img src="https://images.unsplash.com/photo-1525498128493-380d1990a112?w=200&auto=format&fit=crop&q=60" alt="Monstera">
          </div>
          <div class="plant-card-info">
            <div class="plant-card-name">Monstera</div>
            <div class="plant-card-species">Monstera deliciosa</div>
            <div class="plant-card-status">
              <span class="status-dot none" id="monsteraStatusDot"></span>
              <span class="status-text" id="monsteraStatusText">No watering history</span>
            </div>
          </div>
          <svg class="card-chevron" width="8" height="13" viewBox="0 0 8 13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 1l6 5.5L1 12"/></svg>
        </a>
      </div>

      <div id="bopCard" style="display:none;">
        <a href="bop.html" class="plant-card">
          <div class="plant-thumb">
            <img src="https://media.istockphoto.com/id/121351935/photo/bird-of-paradise-flower-isolated-on-white-background.webp?a=1&b=1&s=612x612&w=0&k=20&c=b6qc2K_e5_TgPsU0XQJGe0oR94Hhzeo8pJFHntbdc3o=" alt="Bird of Paradise">
          </div>
          <div class="plant-card-info">
            <div class="plant-card-name">Bird of Paradise</div>
            <div class="plant-card-species">Strelitzia reginae</div>
            <div class="plant-card-status">
              <span class="status-dot none" id="bopStatusDot"></span>
              <span class="status-text" id="bopStatusText">No care data yet</span>
            </div>
          </div>
          <svg class="card-chevron" width="8" height="13" viewBox="0 0 8 13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 1l6 5.5L1 12"/></svg>
        </a>
      </div>

      <div id="fiddleCard" style="display:none;">
        <a href="fiddle.html" class="plant-card">
          <div class="plant-thumb">
            <img src="https://images.unsplash.com/photo-1643819131797-46919f3009f7?w=200&auto=format&fit=crop&q=60" alt="Fiddle Leaf Fig">
          </div>
          <div class="plant-card-info">
            <div class="plant-card-name">Fiddle Leaf Fig</div>
            <div class="plant-card-species">Ficus lyrata</div>
            <div class="plant-card-status">
              <span class="status-dot none" id="fiddleStatusDot"></span>
              <span class="status-text" id="fiddleStatusText">No care data yet</span>
            </div>
          </div>
          <svg class="card-chevron" width="8" height="13" viewBox="0 0 8 13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 1l6 5.5L1 12"/></svg>
        </a>
      </div>

      <div id="lilyCard" style="display:none;">
        <a href="lily.html" class="plant-card">
          <div class="plant-thumb">
            <img src="https://images.unsplash.com/photo-1687858001773-d58b6cec5bdf?w=200&auto=format&fit=crop&q=60" alt="Peace Lily">
          </div>
          <div class="plant-card-info">
            <div class="plant-card-name">Peace Lily</div>
            <div class="plant-card-species">Spathiphyllum wallisii</div>
            <div class="plant-card-status">
              <span class="status-dot none" id="lilyStatusDot"></span>
              <span class="status-text" id="lilyStatusText">No care data yet</span>
            </div>
          </div>
          <svg class="card-chevron" width="8" height="13" viewBox="0 0 8 13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 1l6 5.5L1 12"/></svg>
        </a>
      </div>

      <button class="add-plant-btn" onclick="location.href='add-plant.html'">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Add a plant
      </button>
    </div>

  </div>

  <a href="index.html" style="position:fixed;top:12px;left:14px;z-index:200;font-size:0.7rem;color:#aaa;text-decoration:none;background:rgba(0,0,0,0.65);border:1px solid #333;padding:4px 9px;">← Back to portfolio</a>

  <script>
    function toggleSettings(e) {
      e.stopPropagation();
      const m = document.getElementById('settingsMenu');
      m.style.display = m.style.display === 'none' ? 'block' : 'none';
    }
    function restartPrototype(e) {
      e.preventDefault();
      const keys = [
        'plant-bop-added','plant-fiddle-added','plant-lily-added','plant-monstera-removed',
        'watering-history','watering-interval',
        'bop-watering-history','bop-watering-interval',
        'fiddle-watering-history','fiddle-watering-interval',
        'lily-watering-history','lily-watering-interval',
        'plant-city','plant-user-name','plant-love'
      ];
      keys.forEach(k => localStorage.removeItem(k));
      location.reload();
    }
    document.addEventListener('click', () => {
      document.getElementById('settingsMenu').style.display = 'none';
    });

    const userName = localStorage.getItem('plant-user-name');
    if (userName) {
      const hour = new Date().getHours();
      const period = hour < 12 ? 'morning' : hour < 18 ? 'afternoon' : 'evening';
      document.getElementById('greeting').textContent = `Good ${period}, ${userName}.`;
    }

    if (localStorage.getItem('plant-monstera-removed') === '1') document.getElementById('monsteraCard').style.display = 'none';
    if (localStorage.getItem('plant-bop-added') === '1')    document.getElementById('bopCard').style.display = 'block';
    if (localStorage.getItem('plant-fiddle-added') === '1') document.getElementById('fiddleCard').style.display = 'block';
    if (localStorage.getItem('plant-lily-added') === '1')   document.getElementById('lilyCard').style.display = 'block';

    function todayISO() {
      const d = new Date();
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    }
    function daysSince(iso) {
      const then = new Date(iso + 'T00:00:00');
      const now  = new Date(); now.setHours(0,0,0,0);
      return Math.floor((now - then) / 86400000);
    }

    function setWaterStatus(dotId, textId, historyKey, intervalKey, defaultInterval) {
      try {
        const history  = JSON.parse(localStorage.getItem(historyKey)) || [];
        const interval = parseInt(localStorage.getItem(intervalKey) || String(defaultInterval), 10);
        const dot  = document.getElementById(dotId);
        const text = document.getElementById(textId);
        if (!dot || !text || history.length === 0) return;
        const days     = daysSince(history[0]);
        const daysLeft = interval - days;
        if (days === 0) {
          dot.className = 'status-dot good'; text.textContent = 'Watered today';
        } else if (days < interval * 0.75) {
          dot.className = 'status-dot good'; text.textContent = `Next water in ${daysLeft} day${daysLeft !== 1 ? 's' : ''}`;
        } else if (days < interval) {
          dot.className = 'status-dot soon'; text.textContent = `Due in ${daysLeft} day${daysLeft !== 1 ? 's' : ''}`;
        } else {
          const over = days - interval;
          dot.className = 'status-dot overdue'; text.className = 'status-text overdue';
          text.textContent = over === 0 ? 'Due today' : `${over} day${over !== 1 ? 's' : ''} overdue`;
        }
      } catch(e) {}
    }

    setWaterStatus('monsteraStatusDot', 'monsteraStatusText', 'watering-history', 'watering-interval', 10);
    setWaterStatus('bopStatusDot',      'bopStatusText',      'bop-watering-history', 'bop-watering-interval', 14);
    setWaterStatus('fiddleStatusDot',   'fiddleStatusText',   'fiddle-watering-history', 'fiddle-watering-interval', 10);
    setWaterStatus('lilyStatusDot',     'lilyStatusText',     'lily-watering-history', 'lily-watering-interval', 10);
  </script>
</body>
</html>
