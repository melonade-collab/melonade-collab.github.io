<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Livery Matcher — Train World</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Trebuchet MS', Arial, sans-serif;
  background: linear-gradient(160deg, #0d1a2e 0%, #1a2e4a 50%, #0a1218 100%);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 60px 16px 48px;
}
.back-link { position:fixed; top:12px; left:14px; font-size:0.7rem; color:rgba(255,255,255,0.5); text-decoration:none; background:rgba(0,0,0,0.4); border:1px solid rgba(255,255,255,0.15); padding:4px 10px; border-radius:6px; letter-spacing:2px; z-index:100; }
h1 { font-size: clamp(1.4rem, 5vw, 2rem); font-weight: 900; letter-spacing: 3px; color: #ffd700; text-shadow: 3px 3px 0 #6a4a00; text-align: center; margin-bottom: 6px; }
.subtitle { font-size: 0.72rem; color: rgba(255,215,0,0.5); letter-spacing: 3px; margin-bottom: 28px; text-align: center; }

.matcher-wrap {
  width: 100%;
  max-width: 480px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
.col-label {
  font-size: 0.6rem;
  font-weight: 700;
  letter-spacing: 2px;
  color: rgba(255,255,255,0.3);
  text-align: center;
  margin-bottom: 6px;
}
.photo-card {
  border-radius: 12px;
  overflow: hidden;
  height: 86px;
  cursor: pointer;
  border: 3px solid transparent;
  transition: border-color 0.2s, box-shadow 0.2s;
  position: relative;
}
.photo-card img { width: 100%; height: 100%; object-fit: cover; display: block; }
.photo-card.selected { border-color: #ffd700; box-shadow: 0 0 0 2px #ffd700; }
.photo-card.matched { border-color: #4ade80; pointer-events: none; }
.photo-card.matched .match-check { display: flex; }
.photo-card.wrong { animation: shake 0.4s ease; }
.match-check { display: none; position: absolute; top: 5px; right: 5px; background: #4ade80; color: #fff; width: 22px; height: 22px; border-radius: 50%; font-size: 13px; font-weight: 900; align-items: center; justify-content: center; }

.name-chip {
  border-radius: 12px;
  height: 86px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.82rem;
  font-weight: 700;
  letter-spacing: 0.5px;
  cursor: pointer;
  transition: all 0.2s;
  text-align: center;
  padding: 10px;
  line-height: 1.3;
  background: rgba(255,255,255,0.08);
  border: 2px solid rgba(255,255,255,0.15);
  color: rgba(255,255,255,0.85);
}
.name-chip:hover:not(.matched) { background: rgba(255,215,0,0.12); border-color: #ffd700; color: #ffd700; }
.name-chip.selected { background: rgba(255,215,0,0.18); border-color: #ffd700; color: #ffd700; }
.name-chip.matched { background: rgba(74,222,128,0.15); border-color: #4ade80; color: #4ade80; pointer-events: none; }
.name-chip.wrong { animation: shake 0.4s ease; border-color: #f87171; color: #f87171; }

@keyframes shake { 0%,100%{transform:translateX(0)} 20%,60%{transform:translateX(-7px)} 40%,80%{transform:translateX(7px)} }

.hint {
  margin-top: 18px;
  font-size: 0.72rem;
  color: rgba(255,255,255,0.35);
  text-align: center;
  letter-spacing: 2px;
  min-height: 1.2em;
}

.win-screen {
  display: none;
  flex-direction: column;
  align-items: center;
  gap: 18px;
  text-align: center;
}
.win-screen.show { display: flex; }
.win-emoji { font-size: 4.5rem; animation: pop 0.5s ease; }
@keyframes pop { 0%{transform:scale(0)} 70%{transform:scale(1.3)} 100%{transform:scale(1)} }
.win-text { font-size: 1.6rem; font-weight: 900; color: #ffd700; letter-spacing: 3px; text-shadow: 3px 3px 0 #6a4a00; }
.play-again { background: #ffd700; color: #1a1a2e; border: none; padding: 14px 32px; border-radius: 14px; font-size: 1rem; font-weight: 900; cursor: pointer; letter-spacing: 2px; transition: transform 0.15s; margin-top: 8px; }
.play-again:hover { transform: scale(1.05); }
</style>
</head>
<body>

<a class="back-link" href="index.html">← Train World</a>
<h1>🚂 LIVERY MATCHER</h1>
<p class="subtitle">MATCH THE TRAIN TO ITS RAILWAY</p>

<div id="gameArea" style="width:100%;max-width:480px;">
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:6px;">
    <p class="col-label">TRAINS</p>
    <p class="col-label">RAILWAYS</p>
  </div>
  <div class="matcher-wrap">
    <div id="photoCol" style="display:flex;flex-direction:column;gap:10px;"></div>
    <div id="nameCol" style="display:flex;flex-direction:column;gap:10px;"></div>
  </div>
  <p class="hint" id="hint">TAP A TRAIN, THEN TAP ITS RAILWAY NAME</p>
</div>

<div class="win-screen" id="winScreen">
  <div class="win-emoji">🏆</div>
  <div class="win-text">PERFECT MATCH!</div>
  <button class="play-again" onclick="initGame()">Play Again!</button>
</div>

<script>
const pairs = [
  { id:'cp',   image:'https://images.unsplash.com/photo-1544314105-71dc83e32865?q=80&w=728&auto=format&fit=crop', pos:'center 40%', name:'Canadian Pacific',   color:'#c41e1e' },
  { id:'bnsf', image:'https://images.unsplash.com/photo-1506917847218-5725045a0731?q=80&w=870&auto=format&fit=crop', pos:'50% 65%',   name:'BNSF Railway',       color:'#e87722' },
  { id:'via',  image:'https://images.unsplash.com/photo-1615652437548-dea5540d223f?q=80&w=870&auto=format&fit=crop', pos:'center',    name:'VIA Rail',           color:'#003da5' },
  { id:'rm',   image:'https://images.unsplash.com/photo-1758473439537-e5144e93782b?q=80&w=387&auto=format&fit=crop', pos:'center',    name:'Rocky Mountaineer',  color:'#b8960c' },
];

let selectedPhotoId = null;
let matched = 0;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

function initGame() {
  selectedPhotoId = null;
  matched = 0;
  document.getElementById('winScreen').classList.remove('show');
  document.getElementById('gameArea').style.display = '';
  document.getElementById('hint').textContent = 'TAP A TRAIN, THEN TAP ITS RAILWAY NAME';

  const photoCol = document.getElementById('photoCol');
  const nameCol  = document.getElementById('nameCol');
  photoCol.innerHTML = '';
  nameCol.innerHTML  = '';

  shuffle(pairs).forEach(p => {
    const card = document.createElement('div');
    card.className = 'photo-card';
    card.dataset.id = p.id;
    card.innerHTML = `<img src="${p.image}" alt="${p.name}" style="object-position:${p.pos}"><div class="match-check">✓</div>`;
    card.onclick = () => selectPhoto(card, p.id);
    photoCol.appendChild(card);
  });

  shuffle(pairs).forEach(p => {
    const chip = document.createElement('div');
    chip.className = 'name-chip';
    chip.dataset.id = p.id;
    chip.textContent = p.name;
    chip.onclick = () => selectName(chip, p.id, p.color);
    nameCol.appendChild(chip);
  });
}

function selectPhoto(card, id) {
  if (card.classList.contains('matched')) return;
  document.querySelectorAll('.photo-card.selected').forEach(c => c.classList.remove('selected'));
  card.classList.add('selected');
  selectedPhotoId = id;
  document.getElementById('hint').textContent = 'NOW TAP ITS RAILWAY NAME →';
  speak('Tap the matching railway name.');
}

function selectName(chip, id, color) {
  if (!selectedPhotoId) {
    document.getElementById('hint').textContent = 'TAP A TRAIN PHOTO FIRST ←';
    return;
  }
  if (chip.classList.contains('matched')) return;

  if (selectedPhotoId === id) {
    const photoCard = document.querySelector(`.photo-card[data-id="${id}"]`);
    photoCard.classList.remove('selected');
    photoCard.classList.add('matched');
    chip.classList.add('matched');
    chip.style.borderColor = color;
    chip.style.color = color;
    selectedPhotoId = null;
    matched++;
    speak('Yes! Great match!');
    if (matched === pairs.length) {
      setTimeout(() => {
        document.getElementById('gameArea').style.display = 'none';
        document.getElementById('winScreen').classList.add('show');
        speak('You matched them all! Amazing!');
      }, 700);
    } else {
      document.getElementById('hint').textContent = '✓ MATCHED! KEEP GOING!';
    }
  } else {
    const photoCard = document.querySelector(`.photo-card[data-id="${selectedPhotoId}"]`);
    photoCard.classList.add('wrong');
    chip.classList.add('wrong');
    speak('Try again!');
    setTimeout(() => {
      photoCard.classList.remove('wrong','selected');
      chip.classList.remove('wrong');
      selectedPhotoId = null;
      document.getElementById('hint').textContent = 'NOT QUITE — TRY AGAIN!';
    }, 500);
  }
}

function speak(text) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.rate = 0.9; u.pitch = 1.1; u.volume = 1;
  window.speechSynthesis.speak(u);
}

initGame();
</script>
</body>
</html>
