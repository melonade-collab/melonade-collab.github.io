<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Livery Matcher — Train World</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Trebuchet MS', Arial, sans-serif;
  background: linear-gradient(160deg, #0d1a2e 0%, #1a2e4a 50%, #0a1218 100%);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 60px 16px 48px;
}
.back-link { position:fixed; top:12px; left:14px; font-size:0.7rem; color:rgba(255,255,255,0.5); text-decoration:none; background:rgba(0,0,0,0.4); border:1px solid rgba(255,255,255,0.15); padding:4px 10px; border-radius:6px; letter-spacing:2px; z-index:100; }

h1 { font-size: clamp(1.4rem, 5vw, 2rem); font-weight: 900; letter-spacing: 3px; color: #ffd700; text-shadow: 3px 3px 0 #6a4a00; text-align: center; margin-bottom: 6px; }
.subtitle { font-size: 0.72rem; color: rgba(255,215,0,0.5); letter-spacing: 3px; margin-bottom: 14px; text-align: center; }

.stars-row { display:flex; gap:6px; justify-content:center; margin-bottom:16px; min-height:2rem; }
.star { font-size:1.6rem; transition:transform 0.3s; opacity:0.2; }
.star.earned { opacity:1; animation:starPop 0.4s ease; }
@keyframes starPop { 0%{transform:scale(0)} 60%{transform:scale(1.5)} 100%{transform:scale(1)} }

.matcher-wrap {
  width: 100%;
  max-width: 480px;
}
.col-labels {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 6px;
}
.col-label { font-size:0.6rem; font-weight:700; letter-spacing:2px; color:rgba(255,255,255,0.3); text-align:center; }

.pair-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.photo-card {
  border-radius: 12px;
  overflow: hidden;
  height: 90px;
  cursor: pointer;
  border: 3px solid transparent;
  transition: border-color 0.2s, box-shadow 0.2s;
  position: relative;
  flex-shrink: 0;
}
.photo-card img { width:100%; height:100%; object-fit:cover; display:block; pointer-events:none; }
.photo-card.selected { border-color:#ffd700; box-shadow:0 0 0 2px #ffd700; }
.photo-card.matched { border-color:#4ade80; pointer-events:none; }
.photo-card.wrong { animation:shake 0.4s ease; border-color:#f87171; }
.match-check { display:none; position:absolute; top:5px; right:5px; background:#4ade80; color:#fff; width:22px; height:22px; border-radius:50%; font-size:13px; font-weight:900; align-items:center; justify-content:center; }
.photo-card.matched .match-check { display:flex; }

.name-chip {
  border-radius: 12px;
  height: 90px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: clamp(0.7rem, 2.5vw, 0.85rem);
  font-weight: 700;
  letter-spacing: 0.3px;
  cursor: pointer;
  transition: all 0.2s;
  text-align: center;
  padding: 10px;
  line-height: 1.3;
  background: rgba(255,255,255,0.08);
  border: 2px solid rgba(255,255,255,0.15);
  color: rgba(255,255,255,0.85);
}
.name-chip:hover:not(.matched) { background:rgba(255,215,0,0.12); border-color:#ffd700; color:#ffd700; }
.name-chip.selected { background:rgba(255,215,0,0.18); border-color:#ffd700; color:#ffd700; }
.name-chip.matched { border-color:#4ade80; color:#4ade80; pointer-events:none; }
.name-chip.wrong { animation:shake 0.4s ease; border-color:#f87171; color:#f87171; }

@keyframes shake { 0%,100%{transform:translateX(0)} 20%,60%{transform:translateX(-7px)} 40%,80%{transform:translateX(7px)} }

.fact-bubble {
  width: 100%;
  max-width: 480px;
  margin-top: 14px;
  background: rgba(255,215,0,0.1);
  border: 1.5px solid rgba(255,215,0,0.25);
  border-radius: 12px;
  padding: 12px 16px;
  font-size: 0.8rem;
  color: rgba(255,255,255,0.75);
  line-height: 1.6;
  min-height: 56px;
  transition: opacity 0.3s;
  opacity: 0;
}
.fact-bubble.show { opacity: 1; }

.hint {
  width: 100%;
  max-width: 480px;
  margin-top: 10px;
  font-size: 0.7rem;
  color: rgba(255,255,255,0.3);
  text-align: center;
  letter-spacing: 2px;
  min-height: 1.2em;
}

.win-screen { display:none; flex-direction:column; align-items:center; gap:18px; text-align:center; }
.win-screen.show { display:flex; }
.win-emoji { font-size:4.5rem; animation:pop 0.5s ease; }
@keyframes pop { 0%{transform:scale(0)} 70%{transform:scale(1.3)} 100%{transform:scale(1)} }
.win-title { font-size:1.6rem; font-weight:900; color:#ffd700; letter-spacing:3px; text-shadow:3px 3px 0 #6a4a00; }
.win-score { font-size:0.85rem; color:rgba(255,255,255,0.5); letter-spacing:2px; }
.play-again { background:#ffd700; color:#1a1a2e; border:none; padding:14px 32px; border-radius:14px; font-size:1rem; font-weight:900; cursor:pointer; letter-spacing:2px; transition:transform 0.15s; margin-top:4px; }
.play-again:hover { transform:scale(1.05); }
</style>
</head>
<body>

<a class="back-link" href="index.html">← Train World</a>
<h1>🚂 LIVERY MATCHER</h1>
<p class="subtitle">MATCH THE TRAIN TO ITS RAILWAY</p>

<div class="stars-row" id="starsRow"></div>

<div id="gameArea" style="width:100%;max-width:480px;display:flex;flex-direction:column;align-items:center;">
  <div class="col-labels">
    <p class="col-label">TRAINS</p>
    <p class="col-label">RAILWAYS</p>
  </div>
  <div class="pair-grid" id="pairGrid" style="width:100%;"></div>
  <div class="fact-bubble" id="factBubble"></div>
  <p class="hint" id="hint">TAP A TRAIN TO HEAR THE OPTIONS!</p>
</div>

<div class="win-screen" id="winScreen">
  <div class="win-emoji">🏆</div>
  <div class="win-title">ALL MATCHED!</div>
  <div class="win-score" id="winScore"></div>
  <div class="stars-row" id="winStars"></div>
  <button class="play-again" onclick="initGame()">Play Again!</button>
</div>

<script>
const ALL_RAILWAYS = [
  {
    id: 'cp',
    name: 'Canadian Pacific',
    image: 'https://images.unsplash.com/photo-1604257345076-d9943f0866dd?w=500&auto=format&fit=crop&q=60',
    pos: 'center',
    color: '#c41e1e',
    fact: "Canadian Pacific's bright red and white colours have been on their engines since the 1950s! The red is so bold that train spotters can identify a CP locomotive from kilometres away."
  },
  {
    id: 'bnsf',
    name: 'BNSF Railway',
    image: 'https://images.unsplash.com/photo-1628671044922-33ab6bb77b28?w=500&auto=format&fit=crop&q=60',
    pos: 'center',
    color: '#e87722',
    fact: "BNSF's orange and yellow colours came from two railways that merged together — the green Burlington Northern and the red Santa Fe warbonnet! The mix became the bright orange-yellow seen all across America today."
  },
  {
    id: 'via',
    name: 'VIA Rail',
    image: 'https://images.unsplash.com/photo-1667920980453-2f226d4fb762?q=80&w=460&auto=format&fit=crop',
    pos: 'center',
    color: '#003da5',
    fact: "VIA Rail's blue and yellow trains travel all the way across Canada! The blue represents Canada's sky and waterways, while the yellow stripe represents the golden wheat prairies in the middle of the country."
  },
  {
    id: 'rm',
    name: 'Rocky Mountaineer',
    image: 'https://images.unsplash.com/photo-1758473439537-e5144e93782b?q=80&w=387&auto=format&fit=crop',
    pos: 'center',
    color: '#b8960c',
    fact: "The Rocky Mountaineer's dark blue and gold coaches have huge glass domes on the roof so passengers can look straight up at the Rocky Mountain peaks while sitting inside! It's one of the most beautiful trains in the world."
  },
  {
    id: 'amtrak',
    name: 'Amtrak',
    image: 'https://images.unsplash.com/photo-1660016902828-f490c2d1736c?q=80&w=870&auto=format&fit=crop',
    pos: 'center',
    color: '#1b4d8e',
    fact: "Amtrak's red, white and blue colours were chosen in 1971 to represent all of America! Amtrak passenger trains travel to cities in 46 of America's 48 mainland states — almost everywhere you can think of."
  },
  {
    id: 'ferromex',
    name: 'Ferromex',
    image: 'https://images.unsplash.com/photo-1627674678760-59697663644f?q=80&w=387&auto=format&fit=crop',
    pos: 'center',
    color: '#006847',
    fact: "Ferromex's yellow and red logo features an eagle — just like the Mexican flag! Ferromex is Mexico's biggest freight railway and carries goods from the US border all the way to the southern ports."
  },
  {
    id: 'cn',
    name: 'Canadian National',
    image: 'https://images.unsplash.com/photo-1543256691-5d27cc7fbee0?w=400&auto=format&fit=crop&q=60',
    pos: 'center',
    color: '#cc0000',
    fact: "Canadian National's black locomotives with bold red and white stripes run through both Canada AND the United States! CN is one of the only railways that stretches all the way from the Atlantic coast to the Gulf of Mexico."
  },
  {
    id: 'up',
    name: 'Union Pacific',
    image: 'https://images.unsplash.com/photo-1628748429334-101a87a9357d?w=500&auto=format&fit=crop&q=60',
    pos: 'center',
    color: '#e8c200',
    fact: "Union Pacific's bright yellow engines are nicknamed 'Yellow Monsters' by train fans! The yellow colour was chosen in the 1930s to look modern and powerful — and it has barely changed in almost 90 years."
  },
];

const SHOW = 4;
let selectedPhotoId = null;
let matched = 0;
let firstTryMisses = {};
let currentPool = [];

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

function buildStars(count, max) {
  return Array.from({length: max}, (_, i) =>
    `<span class="star ${i < count ? 'earned' : ''}">⭐</span>`
  ).join('');
}

function initGame() {
  selectedPhotoId = null;
  matched = 0;
  firstTryMisses = {};
  currentPool = shuffle(ALL_RAILWAYS).slice(0, SHOW);

  document.getElementById('winScreen').classList.remove('show');
  document.getElementById('gameArea').style.display = '';
  document.getElementById('factBubble').classList.remove('show');
  document.getElementById('factBubble').textContent = '';
  document.getElementById('hint').textContent = 'TAP A TRAIN TO HEAR THE OPTIONS!';
  document.getElementById('starsRow').innerHTML = buildStars(0, SHOW);

  const grid = document.getElementById('pairGrid');
  grid.innerHTML = '';

  // Build photo column and name column interleaved in grid
  const photoOrder = shuffle([...currentPool]);
  const nameOrder  = shuffle([...currentPool]);

  // Grid has 2 columns; we want photos in col 1, names in col 2, 4 rows
  // Use a wrapper approach: left div + right div inside the grid
  const leftCol  = document.createElement('div');
  const rightCol = document.createElement('div');
  leftCol.style.cssText  = 'display:flex;flex-direction:column;gap:10px;';
  rightCol.style.cssText = 'display:flex;flex-direction:column;gap:10px;';

  photoOrder.forEach(r => {
    const card = document.createElement('div');
    card.className = 'photo-card';
    card.dataset.id = r.id;
    card.innerHTML = `<img src="${r.image}" alt="${r.name}" style="object-position:${r.pos}"><div class="match-check">✓</div>`;
    card.onclick = () => selectPhoto(card, r);
    leftCol.appendChild(card);
  });

  nameOrder.forEach(r => {
    const chip = document.createElement('div');
    chip.className = 'name-chip';
    chip.dataset.id = r.id;
    chip.textContent = r.name;
    chip.onclick = () => selectName(chip, r);
    rightCol.appendChild(chip);
  });

  grid.appendChild(leftCol);
  grid.appendChild(rightCol);

  // Read intro
  speak('Match each train to its railway. Tap a train to hear the choices!');
}

function selectPhoto(card, r) {
  if (card.classList.contains('matched')) return;
  const alreadySelected = card.classList.contains('selected');
  document.querySelectorAll('.photo-card.selected').forEach(c => c.classList.remove('selected'));
  if (alreadySelected) { selectedPhotoId = null; document.getElementById('hint').textContent = 'TAP A TRAIN TO HEAR THE OPTIONS!'; return; }
  card.classList.add('selected');
  selectedPhotoId = r.id;
  document.getElementById('hint').textContent = 'NOW TAP ITS RAILWAY NAME →';

  const availableNames = currentPool
    .filter(p => !document.querySelector(`.name-chip[data-id="${p.id}"]`)?.classList.contains('matched'))
    .map(p => p.name);
  speak(`Which railway is this? ${availableNames.join('. ')}.`);
}

function selectName(chip, r) {
  if (!selectedPhotoId) {
    speak('Tap a train photo first!');
    document.getElementById('hint').textContent = 'TAP A TRAIN PHOTO FIRST ←';
    return;
  }
  if (chip.classList.contains('matched')) return;

  if (selectedPhotoId === r.id) {
    // Correct!
    const photoCard = document.querySelector(`.photo-card[data-id="${r.id}"]`);
    photoCard.classList.remove('selected');
    photoCard.classList.add('matched');
    chip.classList.add('matched');
    chip.style.borderColor = r.color;
    chip.style.color = r.color;
    selectedPhotoId = null;
    matched++;

    // Update stars
    const correctOnFirstTry = !firstTryMisses[r.id];
    document.getElementById('starsRow').innerHTML = buildStars(
      currentPool.filter(p => {
        const c = document.querySelector(`.photo-card[data-id="${p.id}"]`);
        return c?.classList.contains('matched') && !firstTryMisses[p.id];
      }).length, SHOW
    );

    // Show fact
    const fact = document.getElementById('factBubble');
    fact.textContent = r.fact;
    fact.classList.add('show');
    document.getElementById('hint').textContent = matched < SHOW ? 'KEEP GOING!' : '';
    playChime();
    setTimeout(() => speak(r.fact), 600);

    if (matched === SHOW) {
      setTimeout(() => {
        const perfectScore = currentPool.filter(p => !firstTryMisses[p.id]).length;
        document.getElementById('winStars').innerHTML = buildStars(perfectScore, SHOW);
        document.getElementById('winScore').textContent =
          perfectScore === SHOW ? 'PERFECT ROUND!' : `${perfectScore} OF ${SHOW} ON FIRST TRY`;
        document.getElementById('gameArea').style.display = 'none';
        document.getElementById('winScreen').classList.add('show');
        speak(perfectScore === SHOW
          ? 'Perfect! You matched them all on the first try! Amazing!'
          : `You matched all ${SHOW} trains! Great job!`
        );
      }, 1400);
    }
  } else {
    // Wrong
    if (!firstTryMisses[selectedPhotoId]) firstTryMisses[selectedPhotoId] = true;
    const photoCard = document.querySelector(`.photo-card[data-id="${selectedPhotoId}"]`);
    photoCard.classList.add('wrong');
    chip.classList.add('wrong');
    speak('Not quite — try again!');
    document.getElementById('hint').textContent = 'NOT QUITE — TRY AGAIN!';
    setTimeout(() => {
      photoCard.classList.remove('wrong', 'selected');
      chip.classList.remove('wrong');
      selectedPhotoId = null;
      document.getElementById('hint').textContent = 'TAP A TRAIN TO HEAR THE OPTIONS!';
    }, 500);
  }
}

function playChime() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    [[0, 523.25], [0.14, 659.25], [0.28, 783.99]].forEach(([t, freq]) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.frequency.value = freq; osc.type = 'sine';
      gain.gain.setValueAtTime(0.28, ctx.currentTime + t);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + t + 0.45);
      osc.start(ctx.currentTime + t); osc.stop(ctx.currentTime + t + 0.5);
    });
  } catch(e) {}
}

function speak(text) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.rate = 0.88; u.pitch = 1.1; u.volume = 1;
  window.speechSynthesis.speak(u);
}

initGame();
</script>
</body>
</html>
