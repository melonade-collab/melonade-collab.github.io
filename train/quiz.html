<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Train Quiz!</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Trebuchet MS', Arial, sans-serif;
  background: linear-gradient(160deg, #2a0a3a 0%, #4a1060 50%, #1a0528 100%);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 16px 12px;
  overflow-x: hidden;
}
h1 {
  font-size: clamp(1.6rem, 5vw, 2.4rem);
  font-weight: 900;
  letter-spacing: 3px;
  color: #ffd700;
  text-shadow: 3px 3px 0 #6a0090;
  text-align: center;
  margin-bottom: 4px;
}
.subtitle {
  font-size: 0.8rem;
  color: rgba(255,215,0,0.5);
  letter-spacing: 4px;
  margin-bottom: 14px;
  text-align: center;
}
.score-bar {
  display: flex;
  align-items: center;
  gap: 16px;
  background: rgba(0,0,0,0.35);
  border-radius: 14px;
  padding: 10px 20px;
  margin-bottom: 14px;
  width: 100%;
  max-width: 560px;
  justify-content: center;
}
.score-num {
  font-size: 1.6rem;
  font-weight: 900;
  color: #ffd700;
  letter-spacing: 2px;
}
.score-label {
  font-size: 0.75rem;
  color: rgba(255,255,255,0.5);
  letter-spacing: 3px;
  font-weight: 600;
}
.stars-row { display: flex; gap: 4px; }
.star { font-size: 1.4rem; transition: transform 0.3s; }
.star.earned { animation: starPop 0.4s ease; }
@keyframes starPop { 0%{transform:scale(0)} 60%{transform:scale(1.4)} 100%{transform:scale(1)} }

.card {
  background: white;
  border-radius: 24px;
  width: min(94vw, 560px);
  padding: 22px 18px 18px;
  box-shadow: 0 24px 70px rgba(0,0,0,0.5);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 14px;
}
.question-label {
  font-size: 0.75rem;
  font-weight: 700;
  letter-spacing: 4px;
  color: #aaa;
}
.car-display {
  width: 100%;
  background: linear-gradient(180deg, #e8f4fd 0%, #c8e0f0 100%);
  border-radius: 14px;
  padding: 8px 0 4px;
}
.car-display svg { width: 100%; display: block; }
.car-name-display {
  font-size: clamp(1.4rem, 5vw, 2rem);
  font-weight: 900;
  letter-spacing: 2px;
  color: #1a1a2e;
  text-align: center;
}
.question-text {
  font-size: clamp(1rem, 3.5vw, 1.3rem);
  font-weight: 700;
  color: #1a1a2e;
  text-align: center;
  letter-spacing: 1px;
}
.options {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 10px;
  width: 100%;
}
.opt-btn {
  border: 3px solid #e0e0e8;
  border-radius: 16px;
  padding: 14px 6px 12px;
  cursor: pointer;
  background: #f8f8fc;
  transition: border-color 0.15s, background 0.15s, transform 0.1s;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  font-family: inherit;
}
.opt-btn:hover:not(:disabled) { border-color: #9050c0; background: #f0e8fa; }
.opt-btn:active:not(:disabled) { transform: scale(0.94); }
.opt-btn:disabled { cursor: default; }
.opt-btn.correct { border-color: #22c55e; background: #d4fce4; animation: correctPop 0.4s ease; }
.opt-btn.wrong { border-color: #ef4444; background: #fde4e4; animation: shake 0.4s ease; }
@keyframes correctPop { 0%{transform:scale(1)} 40%{transform:scale(1.08)} 100%{transform:scale(1)} }
@keyframes shake {
  0%,100%{transform:translateX(0)}
  20%{transform:translateX(-6px)}
  40%{transform:translateX(6px)}
  60%{transform:translateX(-4px)}
  80%{transform:translateX(4px)}
}
.opt-emoji { font-size: clamp(1.8rem, 6vw, 2.4rem); }
.opt-label {
  font-size: clamp(0.65rem, 2.2vw, 0.82rem);
  font-weight: 700;
  letter-spacing: 1px;
  color: #333;
  text-align: center;
  line-height: 1.2;
}
.feedback-row {
  font-size: 1rem;
  font-weight: 700;
  text-align: center;
  min-height: 28px;
  letter-spacing: 1px;
  color: transparent;
  transition: color 0.2s;
}
.feedback-row.show-correct { color: #16a34a; }
.feedback-row.show-wrong { color: #dc2626; }
.next-btn {
  background: #7c3aed;
  color: white;
  border: none;
  border-radius: 14px;
  padding: 14px 32px;
  font-size: 1.1rem;
  font-weight: 900;
  cursor: pointer;
  letter-spacing: 2px;
  font-family: inherit;
  display: none;
  transition: filter 0.15s, transform 0.1s;
}
.next-btn:hover { filter: brightness(1.15); }
.next-btn:active { transform: scale(0.94); }

.final-screen {
  display: none;
  flex-direction: column;
  align-items: center;
  gap: 18px;
  background: white;
  border-radius: 24px;
  width: min(94vw, 520px);
  padding: 36px 24px;
  box-shadow: 0 24px 70px rgba(0,0,0,0.5);
  text-align: center;
}
.final-screen.show { display: flex; }
.card.hide { display: none; }
.final-trophy { font-size: 5rem; animation: bounce 0.6s ease infinite alternate; }
@keyframes bounce { from{transform:scale(1)} to{transform:scale(1.1)} }
.final-title {
  font-size: clamp(1.8rem, 6vw, 2.4rem);
  font-weight: 900;
  color: #7c3aed;
  letter-spacing: 3px;
}
.final-score {
  font-size: clamp(2rem, 7vw, 3rem);
  font-weight: 900;
  color: #1a1a2e;
}
.final-msg { font-size: 1.1rem; color: #555; font-weight: 600; }
.play-again-btn {
  background: #ffd700;
  color: #1a1a2e;
  border: none;
  border-radius: 14px;
  padding: 16px 36px;
  font-size: 1.2rem;
  font-weight: 900;
  cursor: pointer;
  letter-spacing: 2px;
  font-family: inherit;
  margin-top: 8px;
  transition: filter 0.15s;
}
.play-again-btn:hover { filter: brightness(1.1); }
</style>
</head>
<body>

<h1>TRAIN QUIZ!</h1>
<div class="subtitle">★ WHAT DOES IT CARRY? ★</div>

<div class="score-bar">
  <div>
    <div class="score-label">SCORE</div>
    <div class="score-num" id="scoreNum">0</div>
  </div>
  <div class="stars-row" id="starsRow"></div>
  <div>
    <div class="score-label">QUESTION</div>
    <div class="score-num" id="qNum">1 / 5</div>
  </div>
</div>

<div class="card" id="card">
  <div class="question-label" id="questionLabel">QUESTION 1 OF 5</div>
  <div class="car-display">
    <svg id="carSvg" viewBox="0 0 500 170" xmlns="http://www.w3.org/2000/svg"></svg>
  </div>
  <div class="car-name-display" id="carNameDisplay"></div>
  <div class="question-text">What does this car carry?</div>
  <div class="options" id="options"></div>
  <div class="feedback-row" id="feedbackRow"></div>
  <button class="next-btn" id="nextBtn" onclick="nextQuestion()">NEXT ›</button>
</div>

<div class="final-screen" id="finalScreen">
  <div class="final-trophy" id="finalTrophy">🏆</div>
  <div class="final-title">GREAT JOB!</div>
  <div class="final-score" id="finalScore">5 / 5</div>
  <div class="final-msg" id="finalMsg">You're a train expert!</div>
  <button class="play-again-btn" onclick="restartQuiz()">PLAY AGAIN!</button>
</div>

<script>
const TOTAL = 5;

const questions = [
  {
    car:'BOXCAR',
    draw(svg){ svg.innerHTML = `<foreignObject x="0" y="0" width="500" height="170"><div xmlns="http://www.w3.org/1999/xhtml" style="width:500px;height:170px;overflow:hidden;border-radius:8px;display:flex;align-items:center;justify-content:center"><img src="https://images.unsplash.com/photo-1600148833996-7a426df62edf?w=500&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MTJ8fGJveCUyMGNhciUyMHRyYWlufGVufDB8fDB8fHww" style="width:500px;height:170px;object-fit:cover;transform:scale(0.88);transform-origin:center"/></div></foreignObject>`;},
    correct:{ emoji:'📦', label:'PACKAGES' },
    wrong:[{ emoji:'🛢️', label:'OIL' }, { emoji:'🐄', label:'LIVESTOCK' }],
    correctMsg:'Yes! Boxcars carry all kinds of packaged goods! 🎉',
    wrongMsg:'Not quite — boxcars carry packaged cargo. Try again!'
  },
  {
    car:'TANK CAR',
    draw(svg){ svg.innerHTML = `<image href="https://images.unsplash.com/photo-1670660458119-59b0d1040cb8?w=500&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8Nnx8b2lsJTIwdGFuayUyMHRyYWlufGVufDB8fDB8fHww" x="0" y="0" width="500" height="170" preserveAspectRatio="xMidYMid slice" style="border-radius:8px"/>`;},
    correct:{ emoji:'🛢️', label:'OIL' },
    wrong:[{ emoji:'🌾', label:'GRAIN' }, { emoji:'🚗', label:'CARS' }],
    correctMsg:'Yes! Tank cars carry liquids like oil and milk! 🎉',
    wrongMsg:'Not quite — tank cars carry liquids. Try again!'
  },
  {
    car:'FLAT CAR',
    draw(svg){ svg.innerHTML = `<image href="https://images.unsplash.com/photo-1582044444283-e0dd8197e6e2?w=500&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MjB8fGZyZWlnaHQlMjB0cmFpbiUyMGZsYXQlMjBjYXJ8ZW58MHx8MHx8fDA%3D" x="0" y="0" width="500" height="170" preserveAspectRatio="xMidYMid slice" style="border-radius:8px"/>`;},
    correct:{ emoji:'🌲', label:'LUMBER' },
    wrong:[{ emoji:'🥦', label:'VEGETABLES' }, { emoji:'🛢️', label:'OIL' }],
    correctMsg:'Correct! Flat cars carry big things like lumber! 🎉',
    wrongMsg:'Not this time! Flat cars carry big long cargo. Try again!'
  },
  {
    car:'OPEN-TOP HOPPER',
    draw(svg){ svg.innerHTML = `<foreignObject x="0" y="0" width="500" height="170"><img xmlns="http://www.w3.org/1999/xhtml" src="https://images.unsplash.com/photo-1725211874607-4193e918c350?w=500&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MjE0fHxmcmVpZ2h0JTIwdHJhaW4lMjBob3BwZXIlMjBjYXJ8ZW58MHx8MHx8fDA%3D" style="width:500px;height:170px;object-fit:cover;object-position:50% 70%;display:block;border-radius:8px"/></foreignObject>`;},
    correct:{ emoji:'⚫', label:'COAL' },

    correctMsg:'Amazing! Open-top hoppers carry coal and rock! 🎉',
    wrongMsg:'Nope! Hoppers carry heavy stuff like coal. Try again!'
  },
  {
    car:'COVERED HOPPER',
    draw(svg){ svg.innerHTML = `<image href="https://images.unsplash.com/photo-1632685384711-7f5608a02f32?w=500&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8Mjk0fHxmcmVpZ2h0JTIwdHJhaW4lMjBjYXJzfGVufDB8fDB8fHww" x="0" y="0" width="500" height="170" preserveAspectRatio="xMidYMid slice" style="border-radius:8px"/>`;},
    correct:{ emoji:'🌾', label:'GRAIN' },
    wrong:[{ emoji:'⚙️', label:'SCRAP METAL' }, { emoji:'🍦', label:'ICE CREAM' }],
    correctMsg:'You got it! Covered hoppers keep grain dry! 🎉',
    wrongMsg:'Not quite! Covered hoppers keep dry cargo safe. Try again!'
  },
  {
    car:'GONDOLA',
    draw(svg){ svg.innerHTML = `<image href="https://images.unsplash.com/photo-1669902081173-491f86bd6c91?w=500&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MTZ8fGZsYXQlMjBjYXIlMjB0cmFpbnxlbnwwfHwwfHx8MA%3D%3D" x="0" y="0" width="500" height="170" preserveAspectRatio="xMidYMid slice" style="border-radius:8px"/>`;},
    correct:{ emoji:'⚙️', label:'SCRAP METAL' },
    wrong:[{ emoji:'🌾', label:'GRAIN' }, { emoji:'🍦', label:'ICE CREAM' }],
    correctMsg:'Wow! Gondolas carry heavy scrap metal and ore! 🎉',
    wrongMsg:'Nope! Gondolas carry heavy things like metal. Try again!'
  },
  {
    car:'CENTRE BEAM',
    draw(svg){ svg.innerHTML = `<image href="https://images.unsplash.com/photo-1630698309706-4b1fefcebb43?q=80&w=869&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" x="0" y="0" width="500" height="170" preserveAspectRatio="xMidYMid slice" style="border-radius:8px"/>`;},
    correct:{ emoji:'🌲', label:'LUMBER' },
    wrong:[{ emoji:'🛢️', label:'OIL' }, { emoji:'🐄', label:'LIVESTOCK' }],
    correctMsg:'Right! Centre beams carry lumber and drywall! 🎉',
    wrongMsg:'Not this time! Look at those stacked planks. Try again!'
  },
  {
    car:'COIL CAR',
    draw(svg){ svg.innerHTML = `<foreignObject x="0" y="0" width="500" height="170"><img xmlns="http://www.w3.org/1999/xhtml" src="https://images.unsplash.com/photo-1580064615388-1b1774707209?q=80&w=870&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" style="width:500px;height:170px;object-fit:cover;object-position:50% 65%;display:block;border-radius:8px"/></foreignObject>`;},
    correct:{ emoji:'🔩', label:'STEEL COILS' },
    wrong:[{ emoji:'🥦', label:'VEGETABLES' }, { emoji:'📦', label:'CONTAINERS' }],
    correctMsg:'Nice! Coil cars carry heavy steel coils! 🎉',
    wrongMsg:'Not quite! Those curved cradles hold steel coils. Try again!'
  },
  {
    car:'WELL CAR W/ INTERMODALS',
    draw(svg){ svg.innerHTML = `<foreignObject x="0" y="0" width="500" height="170"><img xmlns="http://www.w3.org/1999/xhtml" src="https://images.unsplash.com/photo-1780607768528-822bfbe22364?q=80&w=876&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" style="width:500px;height:170px;object-fit:cover;object-position:50% 65%;display:block;border-radius:8px"/></foreignObject>`;},
    correct:{ emoji:'📦', label:'CONTAINERS' },
    wrong:[{ emoji:'🌾', label:'GRAIN' }, { emoji:'⚙️', label:'SCRAP METAL' }],
    correctMsg:'Yes! Well cars carry giant shipping containers! 🎉',
    wrongMsg:'Nope! Those big boxes are shipping containers. Try again!'
  },
  {
    car:'AUTORACK',
    draw(svg){ svg.innerHTML = `<image href="https://images.unsplash.com/photo-1580862332890-bbfae435682f?w=500&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MjkzfHxmcmVpZ2h0JTIwdHJhaW4lMjBjYXJzfGVufDB8fDB8fHww" x="0" y="0" width="500" height="170" preserveAspectRatio="xMidYMid slice" style="border-radius:8px"/>`;},
    correct:{ emoji:'🚗', label:'CARS' },
    wrong:[{ emoji:'🌾', label:'GRAIN' }, { emoji:'⚫', label:'COAL' }],
    correctMsg:'Awesome! Autoracks carry brand new cars and trucks! 🎉',
    wrongMsg:'Look at those stacked levels — what do they hold? Try again!'
  },
  {
    car:'REFRIGERATED BOXCAR',
    draw(svg){ svg.innerHTML = `<image href="https://images.unsplash.com/photo-1697347070627-49d367e62fe8?q=80&w=870&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" x="0" y="0" width="500" height="170" preserveAspectRatio="xMidYMid slice" style="border-radius:8px"/>`;},
    correct:{ emoji:'🍦', label:'ICE CREAM' },
    wrong:[{ emoji:'⚫', label:'COAL' }, { emoji:'🔩', label:'STEEL COILS' }],
    correctMsg:'Yes! Reefers keep food like ice cream frozen! 🎉',
    wrongMsg:'Oops! Reefers are giant fridges on wheels. Try again!'
  },
  {
    car:'CABOOSE',
    draw(svg){ svg.innerHTML = `<foreignObject x="0" y="0" width="500" height="170"><img xmlns="http://www.w3.org/1999/xhtml" src="https://images.unsplash.com/photo-1760483467243-9cc10ccab328?w=500&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MTB8fGNhYm9vc2V8ZW58MHx8MHx8fDA%3D" style="width:500px;height:170px;object-fit:cover;object-position:50% 60%;display:block;border-radius:8px"/></foreignObject>`;},
    correct:{ emoji:'👷', label:'TRAIN CREW' },
    wrong:[{ emoji:'⚫', label:'COAL' }, { emoji:'🛢️', label:'OIL' }],
    correctMsg:'The best one! The caboose carries the crew! 🎉',
    wrongMsg:'The caboose is special — it carries people! Try again!'
  },
  {
    car:'STOCK CAR',
    draw(svg){ svg.innerHTML = `<foreignObject x="0" y="0" width="500" height="170"><img xmlns="http://www.w3.org/1999/xhtml" src="https://images.unsplash.com/photo-1727580674819-e3c7822790de?q=80&w=1032&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" style="width:500px;height:170px;object-fit:cover;object-position:50% 50%;display:block;border-radius:8px"/></foreignObject>`;},
    correct:{ emoji:'🐄', label:'LIVESTOCK' },
    wrong:[{ emoji:'📦', label:'CONTAINERS' }, { emoji:'⚫', label:'COAL' }],
    correctMsg:'Yes! Stock cars carry pigs, sheep and cattle! 🎉',
    wrongMsg:'Those slatted sides let animals breathe! Try again!'
  },
  {
    car:'SCHNABEL CAR',
    draw(svg){ svg.innerHTML = `<foreignObject x="0" y="0" width="500" height="170"><img xmlns="http://www.w3.org/1999/xhtml" src="https://images.unsplash.com/photo-1722547858788-82f67b26fa9b?q=80&w=782&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" style="width:500px;height:170px;object-fit:cover;object-position:50% 65%;display:block;border-radius:8px"/></foreignObject>`;},
    correct:{ emoji:'⚡', label:'TRANSFORMERS' },
    wrong:[{ emoji:'🌾', label:'GRAIN' }, { emoji:'🚗', label:'CARS' }],
    correctMsg:'Incredible! Schnabel cars carry giant transformers! 🎉',
    wrongMsg:'That load is massive — only one thing is that big! Try again!'
  }
];

let qIndex = 0;
let score = 0;
let answered = false;
let order = [];

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length-1; i>0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

function buildStars() {
  const row = document.getElementById('starsRow');
  row.innerHTML = Array(TOTAL).fill(0).map((_,i) =>
    `<span class="star" id="star${i}">${i < score ? '⭐' : '☆'}</span>`
  ).join('');
}

function renderQuestion() {
  const q = questions[order[qIndex]];
  answered = false;

  document.getElementById('questionLabel').textContent = `QUESTION ${qIndex+1} OF ${TOTAL}`;
  document.getElementById('qNum').textContent = `${qIndex+1} / ${TOTAL}`;
  const nameEl = document.getElementById('carNameDisplay');
  nameEl.textContent = q.car;
  nameEl.style.fontSize = q.car.length > 14 ? 'clamp(1rem, 3.8vw, 1.4rem)' : '';
  q.draw(document.getElementById('carSvg'));

  const feedback = document.getElementById('feedbackRow');
  feedback.textContent = '';
  feedback.className = 'feedback-row';
  document.getElementById('nextBtn').style.display = 'none';
  document.getElementById('scoreNum').textContent = score;

  const allOptions = shuffle([
    { ...q.correct, isCorrect: true },
    ...q.wrong.map(w => ({ ...w, isCorrect: false }))
  ]);

  const optContainer = document.getElementById('options');
  optContainer.innerHTML = '';
  allOptions.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'opt-btn';
    btn.innerHTML = `<span class="opt-emoji">${opt.emoji}</span><span class="opt-label">${opt.label}</span>`;
    btn.onclick = () => handleAnswer(btn, opt.isCorrect, q, allOptions, optContainer);
    optContainer.appendChild(btn);
  });

  buildStars();
}

function handleAnswer(btn, isCorrect, q, allOptions, container) {
  if (answered) return;
  answered = true;

  const feedback = document.getElementById('feedbackRow');
  const btns = container.querySelectorAll('.opt-btn');

  if (isCorrect) {
    btn.classList.add('correct');
    feedback.textContent = q.correctMsg;
    feedback.className = 'feedback-row show-correct';
    score++;
    document.getElementById('scoreNum').textContent = score;
    buildStars();
    const starEl = document.getElementById(`star${score-1}`);
    if (starEl) { starEl.textContent = '⭐'; starEl.classList.add('earned'); }
    playCorrect();
    btns.forEach(b => b.disabled = true);
    setTimeout(showNext, 1200);
  } else {
    btn.classList.add('wrong');
    feedback.textContent = q.wrongMsg;
    feedback.className = 'feedback-row show-wrong';
    playWrong();
    setTimeout(() => {
      btn.classList.remove('wrong');
      btn.disabled = true;
      answered = false;
      feedback.textContent = '';
      feedback.className = 'feedback-row';
    }, 900);
  }
}

function showNext() {
  document.getElementById('nextBtn').style.display = 'block';
}

function nextQuestion() {
  qIndex++;
  if (qIndex >= TOTAL) {
    showFinal();
  } else {
    renderQuestion();
  }
}

function showFinal() {
  document.getElementById('card').classList.add('hide');
  const fs = document.getElementById('finalScreen');
  fs.classList.add('show');

  const pct = score / TOTAL;
  document.getElementById('finalScore').textContent = `${score} / ${TOTAL}`;

  let trophy, msg;
  if (pct === 1)      { trophy = '🏆'; msg = 'PERFECT SCORE! You\'re a train GENIUS!'; }
  else if (pct >= 0.8){ trophy = '⭐'; msg = 'You\'re a train expert! Amazing work!'; }
  else if (pct >= 0.6){ trophy = '🚂'; msg = 'Great job! Keep learning about trains!'; }
  else                { trophy = '🎉'; msg = 'Nice try! Play again to learn more!'; }

  document.getElementById('finalTrophy').textContent = trophy;
  document.getElementById('finalMsg').textContent = msg;
  playFanfare();
}

function restartQuiz() {
  score = 0;
  qIndex = 0;
  order = shuffle(questions.map((_,i) => i)).slice(0, TOTAL);
  document.getElementById('card').classList.remove('hide');
  document.getElementById('finalScreen').classList.remove('show');
  renderQuestion();
}

function playCorrect() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    [[523,0],[659,0.12],[784,0.24],[1047,0.36]].forEach(([freq, t]) => {
      const osc = ctx.createOscillator();
      const g = ctx.createGain();
      osc.connect(g); g.connect(ctx.destination);
      osc.frequency.value = freq; osc.type = 'sine';
      g.gain.setValueAtTime(0.18, ctx.currentTime+t);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+t+0.2);
      osc.start(ctx.currentTime+t); osc.stop(ctx.currentTime+t+0.25);
    });
  } catch(e) {}
}

function playWrong() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const g = ctx.createGain();
    osc.connect(g); g.connect(ctx.destination);
    osc.frequency.value = 200; osc.type = 'sawtooth';
    g.gain.setValueAtTime(0.15, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+0.4);
    osc.start(); osc.stop(ctx.currentTime+0.45);
  } catch(e) {}
}

function playFanfare() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    [[523,0],[659,0.15],[784,0.3],[1047,0.45],[784,0.6],[1047,0.75],[1319,0.9]].forEach(([freq, t]) => {
      const osc = ctx.createOscillator();
      const g = ctx.createGain();
      osc.connect(g); g.connect(ctx.destination);
      osc.frequency.value = freq; osc.type = 'sine';
      g.gain.setValueAtTime(0.15, ctx.currentTime+t);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+t+0.25);
      osc.start(ctx.currentTime+t); osc.stop(ctx.currentTime+t+0.3);
    });
  } catch(e) {}
}

order = shuffle(questions.map((_,i) => i)).slice(0, TOTAL);
renderQuestion();
</script>
