<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Train Memory — Train World</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Trebuchet MS', Arial, sans-serif;
  background: linear-gradient(160deg, #0d2e1a 0%, #1a4a2e 50%, #081208 100%);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 60px 14px 48px;
}
.back-link { position:fixed; top:12px; left:14px; font-size:0.7rem; color:rgba(255,255,255,0.5); text-decoration:none; background:rgba(0,0,0,0.4); border:1px solid rgba(255,255,255,0.15); padding:4px 10px; border-radius:6px; letter-spacing:2px; z-index:100; }
h1 { font-size: clamp(1.4rem, 5vw, 2rem); font-weight: 900; letter-spacing: 3px; color: #ffd700; text-shadow: 3px 3px 0 #2a6a00; text-align: center; margin-bottom: 6px; }
.subtitle { font-size: 0.72rem; color: rgba(255,215,0,0.5); letter-spacing: 3px; margin-bottom: 8px; text-align: center; }
.score-bar { display:flex; gap:24px; align-items:center; justify-content:center; background:rgba(0,0,0,0.3); border-radius:12px; padding:8px 24px; margin-bottom:20px; }
.score-item { text-align:center; }
.score-num { font-size:1.4rem; font-weight:900; color:#ffd700; }
.score-lbl { font-size:0.6rem; color:rgba(255,255,255,0.4); letter-spacing:2px; }

.grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
  width: 100%;
  max-width: 460px;
}

.card {
  aspect-ratio: 1;
  border-radius: 10px;
  cursor: pointer;
  perspective: 600px;
  position: relative;
}
.card-inner {
  width: 100%;
  height: 100%;
  position: relative;
  transform-style: preserve-3d;
  transition: transform 0.4s ease;
  border-radius: 10px;
}
.card.flipped .card-inner { transform: rotateY(180deg); }
.card.matched .card-inner { transform: rotateY(180deg); }
.card.matched .card-front { box-shadow: 0 0 0 3px #4ade80; }

.card-back, .card-front {
  position: absolute;
  width: 100%; height: 100%;
  border-radius: 10px;
  backface-visibility: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: clamp(1.4rem, 4vw, 1.8rem);
  overflow: hidden;
}
.card-back {
  background: linear-gradient(135deg, #1a3a5c, #0d1a2e);
  border: 2px solid rgba(255,255,255,0.12);
  font-size: clamp(1.2rem, 3.5vw, 1.6rem);
}
.card-back::after { content:'🚂'; }
.card-front {
  transform: rotateY(180deg);
  border: 2px solid rgba(255,255,255,0.15);
}
.card-front.photo-face img {
  width:100%; height:100%; object-fit:cover; border-radius:8px;
}
.card-front.name-face {
  flex-direction: column;
  gap: 3px;
  padding: 6px;
  text-align: center;
}
.name-face .rwy-name {
  font-size: clamp(0.5rem, 2vw, 0.7rem);
  font-weight: 900;
  letter-spacing: 0.5px;
  color: #fff;
  line-height: 1.2;
}
.name-face .rwy-emoji { font-size: clamp(1rem, 3vw, 1.4rem); }

.hint {
  margin-top: 16px;
  font-size: 0.72rem;
  color: rgba(255,255,255,0.35);
  text-align: center;
  letter-spacing: 2px;
  min-height: 1.2em;
}

.win-screen { display:none; flex-direction:column; align-items:center; gap:18px; text-align:center; }
.win-screen.show { display:flex; }
.win-emoji { font-size:4rem; animation:pop 0.5s ease; }
@keyframes pop { 0%{transform:scale(0)} 70%{transform:scale(1.3)} 100%{transform:scale(1)} }
.win-text { font-size:1.5rem; font-weight:900; color:#ffd700; letter-spacing:3px; text-shadow:3px 3px 0 #2a6a00; }
.play-again { background:#ffd700; color:#1a1a2e; border:none; padding:14px 32px; border-radius:14px; font-size:1rem; font-weight:900; cursor:pointer; letter-spacing:2px; transition:transform 0.15s; }
.play-again:hover { transform:scale(1.05); }
</style>
</head>
<body>

<a class="back-link" href="index.html">← Train World</a>
<h1>🧠 TRAIN MEMORY</h1>
<p class="subtitle">MATCH THE TRAIN TO ITS RAILWAY</p>

<div class="score-bar">
  <div class="score-item"><div class="score-num" id="pairsLeft">6</div><div class="score-lbl">PAIRS LEFT</div></div>
  <div class="score-item"><div class="score-num" id="flipsCount">0</div><div class="score-lbl">FLIPS</div></div>
</div>

<div class="grid" id="grid"></div>
<p class="hint" id="hint">FLIP TWO CARDS TO FIND A MATCH!</p>

<div class="win-screen" id="winScreen">
  <div class="win-emoji">🎉</div>
  <div class="win-text">YOU WIN!</div>
  <p style="color:rgba(255,255,255,0.5);font-size:0.85rem;" id="finalScore"></p>
  <button class="play-again" onclick="initGame()">Play Again!</button>
</div>

<script>
const railways = [
  { id:'cp',       name:'Canadian Pacific',  speak:'Canadian Pacific',   emoji:'🇨🇦', color:'#c41e1e', image:'https://images.unsplash.com/photo-1544314105-71dc83e32865?q=80&w=728&auto=format&fit=crop', pos:'center 40%' },
  { id:'bnsf',     name:'BNSF Railway',      speak:'B N S F Railway',    emoji:'🇺🇸', color:'#e87722', image:'https://images.unsplash.com/photo-1628671044922-33ab6bb77b28?q=80&w=500&auto=format&fit=crop', pos:'center' },
  { id:'via',      name:'VIA Rail',           speak:'VEE-uh Rail',        emoji:'🇨🇦', color:'#003da5', image:'https://images.unsplash.com/photo-1615652437548-dea5540d223f?q=80&w=870&auto=format&fit=crop', pos:'center' },
  { id:'rm',       name:'Rocky Mountaineer', speak:'Rocky Mountaineer',  emoji:'🏔️', color:'#b8960c', image:'https://images.unsplash.com/photo-1758473439537-e5144e93782b?q=80&w=387&auto=format&fit=crop', pos:'center' },
  { id:'amtrak',   name:'Amtrak',            speak:'Amtrak',             emoji:'🇺🇸', color:'#1b4d8e', image:'https://images.unsplash.com/photo-1660016902828-f490c2d1736c?q=80&w=870&auto=format&fit=crop', pos:'center' },
  { id:'ferromex', name:'Ferromex',          speak:'Ferro-mex',          emoji:'🇲🇽', color:'#006847', image:'https://images.unsplash.com/photo-1627674678760-59697663644f?q=80&w=387&auto=format&fit=crop', pos:'center' },
];

let flipped = [], matched = 0, flips = 0, locked = false;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

function initGame() {
  flipped = []; matched = 0; flips = 0; locked = false;
  document.getElementById('pairsLeft').textContent = railways.length;
  document.getElementById('flipsCount').textContent = 0;
  document.getElementById('hint').textContent = 'FLIP TWO CARDS TO FIND A MATCH!';
  document.getElementById('winScreen').classList.remove('show');
  document.getElementById('grid').style.display = '';

  // Build pairs: one photo card + one name card per railway
  const cards = [];
  railways.forEach(r => {
    cards.push({ pairId: r.id, type: 'photo', r });
    cards.push({ pairId: r.id, type: 'name',  r });
  });

  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  shuffle(cards).forEach((c, i) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.dataset.pair = c.pairId;
    card.dataset.idx = i;

    let frontHTML;
    if (c.type === 'photo') {
      frontHTML = `<div class="card-front photo-face"><img src="${c.r.image}" alt="${c.r.name}" style="object-position:${c.r.pos}"></div>`;
    } else {
      frontHTML = `<div class="card-front name-face" style="background:${c.r.color}dd;"><span class="rwy-emoji">${c.r.emoji}</span><span class="rwy-name">${c.r.name}</span></div>`;
    }

    card.dataset.type = c.type;
    card.innerHTML = `<div class="card-inner"><div class="card-back"></div>${frontHTML}</div>`;
    card.onclick = () => flipCard(card);
    grid.appendChild(card);
  });
}

function flipCard(card) {
  if (locked || card.classList.contains('flipped') || card.classList.contains('matched')) return;
  card.classList.add('flipped');
  if (card.dataset.type === 'name') {
    const rwy = railways.find(r => r.id === card.dataset.pair);
    if (rwy) speak(rwy.speak || rwy.name);
  }
  flipped.push(card);
  flips++;
  document.getElementById('flipsCount').textContent = flips;

  if (flipped.length === 2) {
    locked = true;
    const [a, b] = flipped;
    if (a.dataset.pair === b.dataset.pair) {
      // Match!
      setTimeout(() => {
        a.classList.add('matched');
        b.classList.add('matched');
        a.classList.remove('flipped');
        b.classList.remove('flipped');
        flipped = [];
        locked = false;
        matched++;
        document.getElementById('pairsLeft').textContent = railways.length - matched;
        speak('Nice match!');
        document.getElementById('hint').textContent = matched === railways.length ? '' : 'GREAT MATCH! KEEP GOING!';
        if (matched === railways.length) {
          setTimeout(() => {
            document.getElementById('grid').style.display = 'none';
            document.getElementById('finalScore').textContent = `${flips} flips to find all ${railways.length} pairs`;
            document.getElementById('winScreen').classList.add('show');
            speak('Amazing! You matched them all!');
          }, 600);
        }
      }, 400);
    } else {
      // No match
      speak('Not a match, try again!');
      document.getElementById('hint').textContent = 'NOT A MATCH — TRY AGAIN!';
      setTimeout(() => {
        a.classList.remove('flipped');
        b.classList.remove('flipped');
        flipped = [];
        locked = false;
        document.getElementById('hint').textContent = 'FLIP TWO CARDS TO FIND A MATCH!';
      }, 1000);
    }
  }
}

function speak(text) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.rate = 0.9; u.pitch = 1.1; u.volume = 1;
  window.speechSynthesis.speak(u);
}

initGame();
</script>
</body>
</html>
