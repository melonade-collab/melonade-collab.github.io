const FACTS_PER_PAGE = 5;
let engineOrder = [];
let currentIndex = 0;
let activeSpeakBtn = null;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function init() {
  engineOrder = shuffle(ENGINES).slice(0, 10);
  currentIndex = 0;
  renderEngine();
}

function renderEngine() {
  const e = engineOrder[currentIndex];
  const total = engineOrder.length;

  document.getElementById('enginePhoto').src = e.image;
  document.getElementById('enginePhoto').style.objectPosition = e.pos || 'center';
  document.getElementById('engineName').textContent = e.name;
  document.getElementById('counterText').textContent = `ENGINE ${currentIndex + 1} OF ${total}`;

  // pips
  const pipsEl = document.getElementById('pips');
  pipsEl.innerHTML = '';
  for (let i = 0; i < total; i++) {
    const pip = document.createElement('div');
    pip.className = 'pip' + (i === currentIndex ? ' active' : '');
    pipsEl.appendChild(pip);
  }

  // prev / next buttons
  document.getElementById('prevBtn').disabled = currentIndex === 0;
  document.getElementById('nextBtn').disabled = currentIndex === total - 1;

  // pick 10 random facts, shuffled
  const shuffledFacts = shuffle(e.facts).slice(0, FACTS_PER_PAGE);

  const list = document.getElementById('factsList');
  list.innerHTML = '';
  shuffledFacts.forEach((fact, i) => {
    const li = document.createElement('li');
    li.className = 'fact-item';

    const btn = document.createElement('button');
    btn.className = 'fact-speak-btn';
    btn.textContent = '🔊';
    btn.title = 'Hear this fact';
    btn.onclick = () => speakFact(fact, btn);

    const text = document.createElement('span');
    text.className = 'fact-text';
    text.textContent = fact;

    li.appendChild(btn);
    li.appendChild(text);
    list.appendChild(li);
  });

  // auto-read engine name after a short delay
  setTimeout(() => speakName(), 350);
}

function navigate(dir) {
  stopSpeaking();
  currentIndex = Math.max(0, Math.min(engineOrder.length - 1, currentIndex + dir));
  renderEngine();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function speakName() {
  const e = engineOrder[currentIndex];
  speak(e.speak || e.name);
}

function speakFact(text, btn) {
  if (activeSpeakBtn && activeSpeakBtn !== btn) {
    activeSpeakBtn.classList.remove('speaking');
  }
  activeSpeakBtn = btn;
  btn.classList.add('speaking');
  speak(text, () => btn.classList.remove('speaking'));
}

function stopSpeaking() {
  if (window.speechSynthesis) window.speechSynthesis.cancel();
  if (activeSpeakBtn) {
    activeSpeakBtn.classList.remove('speaking');
    activeSpeakBtn = null;
  }
}

function speak(text, onEnd) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const processed = text.replace(/\bVIA Rail\b/gi, 'VEE-uh Rail');
  const u = new SpeechSynthesisUtterance(processed);
  u.rate = 0.88; u.pitch = 1.05; u.volume = 1;
  if (onEnd) u.onend = onEnd;
  window.speechSynthesis.speak(u);
}

init();
</script>
</body>
</html>
