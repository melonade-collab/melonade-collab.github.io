<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Train Spotter Book</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Trebuchet MS', Arial, sans-serif;
  background: linear-gradient(160deg, #0d2137 0%, #1a3a5c 60%, #0a1a2e 100%);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 16px;
  overflow: hidden;
}
header {
  text-align: center;
  margin-bottom: 18px;
}
header h1 {
  font-size: clamp(1.6rem, 5vw, 2.6rem);
  font-weight: 900;
  letter-spacing: 4px;
  color: #ffd700;
  text-shadow: 3px 3px 0 #8a6000;
}
.subtitle {
  font-size: 0.85rem;
  letter-spacing: 5px;
  color: rgba(255,215,0,0.5);
  margin-top: 4px;
}
.card {
  background: white;
  border-radius: 24px;
  width: min(92vw, 560px);
  padding: 22px 20px 18px;
  color: #1a1a2e;
  box-shadow: 0 24px 70px rgba(0,0,0,0.5);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 14px;
}
.car-number {
  font-size: 0.8rem;
  font-weight: 700;
  letter-spacing: 3px;
  color: #aaa;
}
.car-illustration {
  width: 100%;
  cursor: pointer;
  border-radius: 12px;
  background: linear-gradient(180deg, #e8f4fd 0%, #d0e8f8 100%);
  padding: 8px 0 4px;
}
.car-name-btn {
  font-size: clamp(2rem, 7vw, 3rem);
  font-weight: 900;
  letter-spacing: 2px;
  text-align: center;
  cursor: pointer;
  color: #1a1a2e;
  line-height: 1;
  user-select: none;
  border: none;
  background: none;
  padding: 4px 12px;
  border-radius: 10px;
  transition: background 0.15s, color 0.15s;
  font-family: inherit;
}
.car-name-btn:hover { background: #fff3cd; color: #c41e1e; }
.car-name-btn:active { background: #ffd700; }
.carries-box {
  background: #fff8e1;
  border: 3px solid #ffd700;
  border-radius: 14px;
  padding: 12px 18px;
  text-align: center;
  width: 100%;
}
.carries-label {
  font-size: 0.75rem;
  font-weight: 700;
  letter-spacing: 4px;
  color: #aaa;
}
.carries-text {
  font-size: clamp(1rem, 3.5vw, 1.4rem);
  font-weight: 700;
  color: #1a1a2e;
  margin: 4px 0 6px;
}
.carries-emoji { font-size: 1.8rem; letter-spacing: 6px; }
.tap-hint {
  font-size: 0.78rem;
  color: #bbb;
}
.nav-row {
  display: flex;
  align-items: center;
  gap: 18px;
}
.nav-btn {
  background: #1a3a5c;
  color: white;
  border: none;
  border-radius: 50%;
  width: 58px;
  height: 58px;
  font-size: 2.2rem;
  cursor: pointer;
  transition: background 0.15s, transform 0.1s;
  display: flex;
  align-items: center;
  justify-content: center;
  line-height: 1;
}
.nav-btn:hover:not(:disabled) { background: #c41e1e; }
.nav-btn:active:not(:disabled) { transform: scale(0.88); }
.nav-btn:disabled { opacity: 0.25; cursor: default; }
.dots {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  justify-content: center;
  max-width: 140px;
}
.dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: #ddd;
  transition: background 0.2s, transform 0.2s;
  cursor: pointer;
}
.dot.active { background: #1a3a5c; transform: scale(1.3); }
footer {
  margin-top: 16px;
  font-size: 0.7rem;
  color: rgba(255,255,255,0.3);
  letter-spacing: 4px;
}
.fact-btn {
  background: #1a3a5c;
  color: white;
  border: none;
  border-radius: 50%;
  width: 26px;
  height: 26px;
  font-size: 0.85rem;
  font-weight: 700;
  font-style: italic;
  font-family: Georgia, serif;
  cursor: pointer;
  transition: background 0.15s, transform 0.1s;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.fact-btn:hover { background: #c41e1e; }
.fact-btn:active { transform: scale(0.88); }
</style>
</head>
<body>
<header>
  <h1>TRAIN SPOTTER</h1>
  <div class="subtitle">★ TAP TO HEAR ★ SWIPE TO EXPLORE ★</div>
</header>

<div class="card" id="card">
  <div class="car-number" id="carNumber">CAR 1 OF 7</div>
  <svg class="car-illustration" id="carSvg" viewBox="0 0 500 170" xmlns="http://www.w3.org/2000/svg" onclick="speak()"></svg>
  <button class="car-name-btn" id="carName" onclick="speak()">BOXCAR</button>
  <div class="carries-box">
    <div class="carries-label">CARRIES</div>
    <div class="carries-text" id="carriesText">Grain, furniture, car parts</div>
    <div class="carries-emoji" id="carriesEmoji">🌾 📦 🚗</div>
  </div>
  <div style="display:flex;align-items:center;gap:10px;">
    <div class="tap-hint">Tap the name to hear it! 🔊</div>
    <button class="fact-btn" onclick="speakFact()" title="Fun fact">i</button>
  </div>
  <div class="nav-row">
    <button class="nav-btn" id="prevBtn" onclick="navigate(-1)">‹</button>
    <div class="dots" id="dots"></div>
    <button class="nav-btn" id="nextBtn" onclick="navigate(1)">›</button>
  </div>
</div>

<footer>SWIPE LEFT OR RIGHT TO EXPLORE</footer>
<div style="margin-top:10px;text-align:center;color:rgba(255,255,255,0.25);font-size:0.65rem;letter-spacing:2px;line-height:1.8;">
  <div>© 2026 Melanie Wellington-Wiltshire</div>
  <div>For Maddox, built with love, from Mommy.</div>
</div>

    name:'BOXCAR', carries:'Grain, furniture, car parts', emoji:'🌾 📦 🚗',
    facts:['Boxcars are the most common freight car on the railroad! Their big sliding doors can be up to 10 feet wide — wide enough to drive a small car through.','A standard boxcar is about 60 feet long and can carry up to 100 tons of cargo.','Before refrigerated trucks became common, boxcars were the main way groceries traveled across the country.','Some boxcars have special cushioned floors to protect fragile cargo like glass and electronics from bumps on the track.','Boxcars got their name from their simple box shape — they look like a giant rectangular box on wheels!','Some boxcars have doors on both sides so they can be loaded and unloaded from either direction at a warehouse.'],

    draw(svg){ svg.innerHTML = `<image href="https://images.unsplash.com/photo-1670660458119-59b0d1040cb8?w=500&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8Nnx8b2lsJTIwdGFuayUyMHRyYWlufGVufDB8fDB8fHww" x="0" y="0" width="500" height="170" preserveAspectRatio="xMidYMid slice" style="border-radius:8px"/>`;}

  {
    name:'SCHNABEL CAR', carries:'Transformers, generators, boilers', emoji:'⚡ 🔌 🏭',
    facts:['A schnabel car can carry loads weighing over one million pounds — that is heavier than 70 school buses all at once!','Schnabel cars get their name from the German word for beak — the two giant arms that grip the cargo look just like a beak!','Some schnabel cars are over 300 feet long when carrying a full load — longer than a football field!','Moving a transformer by schnabel car is so unusual that it can close roads and require police escorts at every level crossing.','The load itself becomes part of the car on a schnabel — the two end frames literally hang from the cargo as it travels.','There are fewer than 50 schnabel cars in the whole of North America because very few loads are ever big enough to need one.'],
    draw(svg){ svg.innerHTML = `<foreignObject x="0" y="0" width="500" height="170"><img xmlns="http://www.w3.org/1999/xhtml" src="https://images.unsplash.com/photo-1722547858788-82f67b26fa9b?q=80&w=782&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" style="width:500px;height:170px;object-fit:cover;object-position:50% 65%;display:block;border-radius:8px"/></foreignObject>`;}
  }
];

for (let i = cars.length - 1; i > 0; i--) {
  const j = Math.floor(Math.random() * (i + 1));
  [cars[i], cars[j]] = [cars[j], cars[i]];
}

let current = 0;

function render() {
  const car = cars[current];
  document.getElementById('carNumber').textContent = `CAR ${current+1} OF ${cars.length}`;
  const nameBtn = document.getElementById('carName');
  nameBtn.textContent = car.name;
  nameBtn.style.fontSize = car.name.length > 14 ? 'clamp(1rem, 3.8vw, 1.6rem)' : '';
  document.getElementById('carriesText').textContent = car.carries;
  document.getElementById('carriesEmoji').textContent = car.emoji;
  car.draw(document.getElementById('carSvg'));
  document.getElementById('prevBtn').disabled = current === 0;
  document.getElementById('nextBtn').disabled = current === cars.length - 1;
  const dotsEl = document.getElementById('dots');
  dotsEl.innerHTML = cars.map((_,i) =>
    `<div class="dot ${i===current?'active':''}" onclick="jumpTo(${i})"></div>`
  ).join('');
}

function navigate(dir) {
  const n = current + dir;
  if (n >= 0 && n < cars.length) { current = n; render(); }
}

function jumpTo(i) { current = i; render(); }

function speakFact() {
  if (!window.speechSynthesis) return;
  const facts = cars[current].facts;
  const fact = facts[Math.floor(Math.random() * facts.length)];
  const msg = new SpeechSynthesisUtterance(fact);
  msg.rate = 0.85; msg.pitch = 1.1; msg.volume = 1;
  window.speechSynthesis.cancel();
  window.speechSynthesis.speak(msg);
}

function speak() {
  if (!window.speechSynthesis) return;
  const car = cars[current];
  const msg = new SpeechSynthesisUtterance(`${car.name}! It carries ${car.carries}`);
  msg.rate = 0.82; msg.pitch = 1.15; msg.volume = 1;
  window.speechSynthesis.cancel();
  window.speechSynthesis.speak(msg);
}

let tx = 0;
document.getElementById('card').addEventListener('touchstart', e => { tx = e.touches[0].clientX; }, { passive:true });
document.getElementById('card').addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - tx;
  if (Math.abs(dx) > 45) navigate(dx < 0 ? 1 : -1);
}, { passive:true });

render();
</script>
</body>
</html>
