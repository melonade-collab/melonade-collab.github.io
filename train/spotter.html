<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Train Spotter Book</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Trebuchet MS', Arial, sans-serif;
  background: linear-gradient(160deg, #0d2137 0%, #1a3a5c 60%, #0a1a2e 100%);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 16px;
  overflow: hidden;
}
header {
  text-align: center;
  margin-bottom: 18px;
}
header h1 {
  font-size: clamp(1.6rem, 5vw, 2.6rem);
  font-weight: 900;
  letter-spacing: 4px;
  color: #ffd700;
  text-shadow: 3px 3px 0 #8a6000;
}
.subtitle {
  font-size: 0.85rem;
  letter-spacing: 5px;
  color: rgba(255,215,0,0.5);
  margin-top: 4px;
}
.card {
  background: white;
  border-radius: 24px;
  width: min(92vw, 560px);
  padding: 22px 20px 18px;
  color: #1a1a2e;
  box-shadow: 0 24px 70px rgba(0,0,0,0.5);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 14px;
}
.car-number {
  font-size: 0.8rem;
  font-weight: 700;
  letter-spacing: 3px;
  color: #aaa;
}
.car-illustration {
  width: 100%;
  cursor: pointer;
  border-radius: 12px;
  background: linear-gradient(180deg, #e8f4fd 0%, #d0e8f8 100%);
  padding: 8px 0 4px;
}
.car-name-btn {
  font-size: clamp(2rem, 7vw, 3rem);
  font-weight: 900;
  letter-spacing: 2px;
  text-align: center;
  cursor: pointer;
  color: #1a1a2e;
  line-height: 1;
  user-select: none;
  border: none;
  background: none;
  padding: 4px 12px;
  border-radius: 10px;
  transition: background 0.15s, color 0.15s;
  font-family: inherit;
}
.car-name-btn:hover { background: #fff3cd; color: #c41e1e; }
.car-name-btn:active { background: #ffd700; }
.carries-box {
  background: #fff8e1;
  border: 3px solid #ffd700;
  border-radius: 14px;
  padding: 12px 18px;
  text-align: center;
  width: 100%;
}
.carries-label {
  font-size: 0.75rem;
  font-weight: 700;
  letter-spacing: 4px;
  color: #aaa;
}
.carries-text {
  font-size: clamp(1rem, 3.5vw, 1.4rem);
  font-weight: 700;
  color: #1a1a2e;
  margin: 4px 0 6px;
}
.carries-emoji { font-size: 1.8rem; letter-spacing: 6px; }
.tap-hint {
  font-size: 0.78rem;
  color: #bbb;
}
.nav-row {
  display: flex;
  align-items: center;
  gap: 18px;
}
.nav-btn {
  background: #1a3a5c;
  color: white;
  border: none;
  border-radius: 50%;
  width: 58px;
  height: 58px;
  font-size: 2.2rem;
  cursor: pointer;
  transition: background 0.15s, transform 0.1s;
  display: flex;
  align-items: center;
  justify-content: center;
  line-height: 1;
}
.nav-btn:hover:not(:disabled) { background: #c41e1e; }
.nav-btn:active:not(:disabled) { transform: scale(0.88); }
.nav-btn:disabled { opacity: 0.25; cursor: default; }
.dots {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  justify-content: center;
  max-width: 140px;
}
.dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: #ddd;
  transition: background 0.2s, transform 0.2s;
  cursor: pointer;
}
.dot.active { background: #1a3a5c; transform: scale(1.3); }
footer {
  margin-top: 16px;
  font-size: 0.7rem;
  color: rgba(255,255,255,0.3);
  letter-spacing: 4px;
}
</style>
</head>
<body>
<header>
  <h1>TRAIN SPOTTER</h1>
  <div class="subtitle">★ TAP TO HEAR ★ SWIPE TO EXPLORE ★</div>
</header>

<div class="card" id="card">
  <div class="car-number" id="carNumber">CAR 1 OF 7</div>
  <svg class="car-illustration" id="carSvg" viewBox="0 0 500 170" xmlns="http://www.w3.org/2000/svg" onclick="speak()"></svg>
  <button class="car-name-btn" id="carName" onclick="speak()">BOXCAR</button>
  <div class="carries-box">
    <div class="carries-label">CARRIES</div>
    <div class="carries-text" id="carriesText">Grain, furniture, car parts</div>
    <div class="carries-emoji" id="carriesEmoji">🌾 📦 🚗</div>
  </div>
  <div class="tap-hint">Tap the name to hear it! 🔊</div>
  <div class="nav-row">
    <button class="nav-btn" id="prevBtn" onclick="navigate(-1)">‹</button>
    <div class="dots" id="dots"></div>
    <button class="nav-btn" id="nextBtn" onclick="navigate(1)">›</button>
  </div>
</div>

<footer>SWIPE LEFT OR RIGHT TO EXPLORE</footer>

<script>
function wheels() {
  return `
    <g transform="translate(80,118)">
      <rect x="-30" y="-3" width="60" height="8" fill="#2a2a2a" rx="2"/>
      <circle cx="-16" cy="10" r="17" fill="#1e1e1e" stroke="#555" stroke-width="3"/>
      <circle cx="16" cy="10" r="17" fill="#1e1e1e" stroke="#555" stroke-width="3"/>
      <circle cx="-16" cy="10" r="6" fill="#666"/>
      <circle cx="16" cy="10" r="6" fill="#666"/>
    </g>
    <g transform="translate(420,118)">
      <rect x="-30" y="-3" width="60" height="8" fill="#2a2a2a" rx="2"/>
      <circle cx="-16" cy="10" r="17" fill="#1e1e1e" stroke="#555" stroke-width="3"/>
      <circle cx="16" cy="10" r="17" fill="#1e1e1e" stroke="#555" stroke-width="3"/>
      <circle cx="-16" cy="10" r="6" fill="#666"/>
      <circle cx="16" cy="10" r="6" fill="#666"/>
    </g>
    <rect x="18" y="107" width="464" height="13" fill="#111" rx="2"/>
    <rect x="0" y="109" width="20" height="8" fill="#555" rx="2"/>
    <rect x="480" y="109" width="20" height="8" fill="#555" rx="2"/>
    <rect x="0" y="148" width="500" height="5" fill="#7a6a50"/>
    <rect x="0" y="153" width="500" height="8" fill="#5a4a38"/>
    <rect x="30" y="148" width="10" height="14" fill="#4a3a28"/>
    <rect x="90" y="148" width="10" height="14" fill="#4a3a28"/>
    <rect x="150" y="148" width="10" height="14" fill="#4a3a28"/>
    <rect x="210" y="148" width="10" height="14" fill="#4a3a28"/>
    <rect x="270" y="148" width="10" height="14" fill="#4a3a28"/>
    <rect x="330" y="148" width="10" height="14" fill="#4a3a28"/>
    <rect x="390" y="148" width="10" height="14" fill="#4a3a28"/>
    <rect x="450" y="148" width="10" height="14" fill="#4a3a28"/>
  `;
}

const cars = [
  {
    name:'BOXCAR', carries:'Grain, furniture, car parts', emoji:'🌾 📦 🚗',
    draw(svg){ svg.innerHTML = `<foreignObject x="0" y="0" width="500" height="170"><div xmlns="http://www.w3.org/1999/xhtml" style="width:500px;height:170px;overflow:hidden;border-radius:8px;display:flex;align-items:center;justify-content:center"><img src="https://images.unsplash.com/photo-1600148833996-7a426df62edf?w=500&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MTJ8fGJveCUyMGNhciUyMHRyYWlufGVufDB8fDB8fHww" style="width:500px;height:170px;object-fit:cover;transform:scale(0.88);transform-origin:center"/></div></foreignObject>`;}
  },
  {
    name:'TANK CAR', carries:'Oil, milk, chemicals', emoji:'🛢️ 🥛 ⚗️',
    draw(svg){ svg.innerHTML = `<image href="https://images.unsplash.com/photo-1670660458119-59b0d1040cb8?w=500&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8Nnx8b2lsJTIwdGFuayUyMHRyYWlufGVufDB8fDB8fHww" x="0" y="0" width="500" height="170" preserveAspectRatio="xMidYMid slice" style="border-radius:8px"/>`;}
  },
  {
    name:'FLAT CAR', carries:'Lumber, machines, pipes', emoji:'🌲 🚜 🔧',
    draw(svg){ svg.innerHTML = `<image href="https://images.unsplash.com/photo-1582044444283-e0dd8197e6e2?w=500&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MjB8fGZyZWlnaHQlMjB0cmFpbiUyMGZsYXQlMjBjYXJ8ZW58MHx8MHx8fDA%3D" x="0" y="0" width="500" height="170" preserveAspectRatio="xMidYMid slice" style="border-radius:8px"/>`;}
  },
  {
    name:'OPEN-TOP HOPPER', carries:'Coal, sand, rock', emoji:'⚫ 🏖️ ⛏️',
    draw(svg){ svg.innerHTML = `<foreignObject x="0" y="0" width="500" height="170"><img xmlns="http://www.w3.org/1999/xhtml" src="https://images.unsplash.com/photo-1725211874607-4193e918c350?w=500&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MjE0fHxmcmVpZ2h0JTIwdHJhaW4lMjBob3BwZXIlMjBjYXJ8ZW58MHx8MHx8fDA%3D" style="width:500px;height:170px;object-fit:cover;object-position:50% 70%;display:block;border-radius:8px"/></foreignObject>`;}
  },
  {
    name:'COVERED HOPPER', carries:'Coal, sand, grain', emoji:'⚫ 🏖️ 🌾',
    draw(svg){ svg.innerHTML = `<image href="https://images.unsplash.com/photo-1632685384711-7f5608a02f32?w=500&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8Mjk0fHxmcmVpZ2h0JTIwdHJhaW4lMjBjYXJzfGVufDB8fDB8fHww" x="0" y="0" width="500" height="170" preserveAspectRatio="xMidYMid slice" style="border-radius:8px"/>`;}
  },
  {
    name:'GONDOLA', carries:'Scrap metal, ore, coal', emoji:'⚙️ ⛏️ ⚫',
    draw(svg){ svg.innerHTML = `<image href="https://images.unsplash.com/photo-1669902081173-491f86bd6c91?w=500&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MTZ8fGZsYXQlMjBjYXIlMjB0cmFpbnxlbnwwfHwwfHx8MA%3D%3D" x="0" y="0" width="500" height="170" preserveAspectRatio="xMidYMid slice" style="border-radius:8px"/>`;}
  },
  {
    name:'CENTRE BEAM', carries:'Drywall, lumber, railroad ties, fence posts', emoji:'🌲 🏗️ 🛤️',
    draw(svg){ svg.innerHTML = `<image href="https://images.unsplash.com/photo-1630698309706-4b1fefcebb43?q=80&w=869&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" x="0" y="0" width="500" height="170" preserveAspectRatio="xMidYMid slice" style="border-radius:8px"/>`;}
  },
  {
    name:'COIL CAR', carries:'Steel coils, wire rolls', emoji:'🔩 🪛 🏗️',
    draw(svg){ svg.innerHTML = `<foreignObject x="0" y="0" width="500" height="170"><img xmlns="http://www.w3.org/1999/xhtml" src="https://images.unsplash.com/photo-1580064615388-1b1774707209?q=80&w=870&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" style="width:500px;height:170px;object-fit:cover;object-position:50% 65%;display:block;border-radius:8px"/></foreignObject>`;}
  },
  {
    name:'WELL CAR W/ INTERMODALS', carries:'Shipping containers', emoji:'📦 🚢 🌍',
    draw(svg){ svg.innerHTML = `<foreignObject x="0" y="0" width="500" height="170"><img xmlns="http://www.w3.org/1999/xhtml" src="https://images.unsplash.com/photo-1780607768528-822bfbe22364?q=80&w=876&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" style="width:500px;height:170px;object-fit:cover;object-position:50% 65%;display:block;border-radius:8px"/></foreignObject>`;}
  },
  {
    name:'AUTORACK', carries:'Cars, trucks, SUVs', emoji:'🚗 🚐 🚛',
    draw(svg){ svg.innerHTML = `<image href="https://images.unsplash.com/photo-1580862332890-bbfae435682f?w=500&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MjkzfHxmcmVpZ2h0JTIwdHJhaW4lMjBjYXJzfGVufDB8fDB8fHww" x="0" y="0" width="500" height="170" preserveAspectRatio="xMidYMid slice" style="border-radius:8px"/>`;}
  },
  {
    name:'REFRIGERATED BOXCAR', carries:'Vegetables, meat, ice cream', emoji:'🥦 🥩 🍦',
    draw(svg){ svg.innerHTML = `<image href="https://images.unsplash.com/photo-1697347070627-49d367e62fe8?q=80&w=870&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" x="0" y="0" width="500" height="170" preserveAspectRatio="xMidYMid slice" style="border-radius:8px"/>`;}
  },
  {
    name:'CABOOSE', carries:'The train crew!', emoji:'👷 🚂 🏠',
    draw(svg){ svg.innerHTML = `<foreignObject x="0" y="0" width="500" height="170"><img xmlns="http://www.w3.org/1999/xhtml" src="https://images.unsplash.com/photo-1760483467243-9cc10ccab328?w=500&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MTB8fGNhYm9vc2V8ZW58MHx8MHx8fDA%3D" style="width:500px;height:170px;object-fit:cover;object-position:50% 60%;display:block;border-radius:8px"/></foreignObject>`;}
  },
  {
    name:'STOCK CAR', carries:'Pigs, sheep, cattle', emoji:'🐷 🐑 🐄',
    draw(svg){ svg.innerHTML = `<foreignObject x="0" y="0" width="500" height="170"><img xmlns="http://www.w3.org/1999/xhtml" src="https://images.unsplash.com/photo-1727580674819-e3c7822790de?q=80&w=1032&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" style="width:500px;height:170px;object-fit:cover;object-position:50% 50%;display:block;border-radius:8px"/></foreignObject>`;}
  },
  {
    name:'SCHNABEL CAR', carries:'Transformers, generators, boilers', emoji:'⚡ 🔌 🏭',
    draw(svg){ svg.innerHTML = `<foreignObject x="0" y="0" width="500" height="170"><img xmlns="http://www.w3.org/1999/xhtml" src="https://images.unsplash.com/photo-1722547858788-82f67b26fa9b?q=80&w=782&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" style="width:500px;height:170px;object-fit:cover;object-position:50% 65%;display:block;border-radius:8px"/></foreignObject>`;}
  }
];

for (let i = cars.length - 1; i > 0; i--) {
  const j = Math.floor(Math.random() * (i + 1));
  [cars[i], cars[j]] = [cars[j], cars[i]];
}

let current = 0;

function render() {
  const car = cars[current];
  document.getElementById('carNumber').textContent = `CAR ${current+1} OF ${cars.length}`;
  const nameBtn = document.getElementById('carName');
  nameBtn.textContent = car.name;
  nameBtn.style.fontSize = car.name.length > 14 ? 'clamp(1rem, 3.8vw, 1.6rem)' : '';
  document.getElementById('carriesText').textContent = car.carries;
  document.getElementById('carriesEmoji').textContent = car.emoji;
  car.draw(document.getElementById('carSvg'));
  document.getElementById('prevBtn').disabled = current === 0;
  document.getElementById('nextBtn').disabled = current === cars.length - 1;
  const dotsEl = document.getElementById('dots');
  dotsEl.innerHTML = cars.map((_,i) =>
    `<div class="dot ${i===current?'active':''}" onclick="jumpTo(${i})"></div>`
  ).join('');
}

function navigate(dir) {
  const n = current + dir;
  if (n >= 0 && n < cars.length) { current = n; render(); }
}

function jumpTo(i) { current = i; render(); }

function speak() {
  if (!window.speechSynthesis) return;
  const car = cars[current];
  const msg = new SpeechSynthesisUtterance(`${car.name}! It carries ${car.carries}`);
  msg.rate = 0.82; msg.pitch = 1.15; msg.volume = 1;
  window.speechSynthesis.cancel();
  window.speechSynthesis.speak(msg);
}

let tx = 0;
document.getElementById('card').addEventListener('touchstart', e => { tx = e.touches[0].clientX; }, { passive:true });
document.getElementById('card').addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - tx;
  if (Math.abs(dx) > 45) navigate(dx < 0 ? 1 : -1);
}, { passive:true });

render();
</script>
</body>
</html>
