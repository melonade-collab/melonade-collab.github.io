<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Train Spotter Book</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Trebuchet MS', Arial, sans-serif;
  background: linear-gradient(160deg, #0d2137 0%, #1a3a5c 60%, #0a1a2e 100%);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 16px;
  overflow: hidden;
}
header {
  text-align: center;
  margin-bottom: 18px;
}
header h1 {
  font-size: clamp(1.6rem, 5vw, 2.6rem);
  font-weight: 900;
  letter-spacing: 4px;
  color: #ffd700;
  text-shadow: 3px 3px 0 #8a6000;
}
.subtitle {
  font-size: 0.85rem;
  letter-spacing: 5px;
  color: rgba(255,215,0,0.5);
  margin-top: 4px;
}
.card {
  background: white;
  border-radius: 24px;
  width: min(92vw, 560px);
  padding: 22px 20px 18px;
  color: #1a1a2e;
  box-shadow: 0 24px 70px rgba(0,0,0,0.5);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 14px;
}
.car-number {
  font-size: 0.8rem;
  font-weight: 700;
  letter-spacing: 3px;
  color: #aaa;
}
.car-illustration {
  width: 100%;
  cursor: pointer;
  border-radius: 12px;
  background: linear-gradient(180deg, #e8f4fd 0%, #d0e8f8 100%);
  padding: 8px 0 4px;
}
.car-name-btn {
  font-size: clamp(2rem, 7vw, 3rem);
  font-weight: 900;
  letter-spacing: 2px;
  text-align: center;
  cursor: pointer;
  color: #1a1a2e;
  line-height: 1;
  user-select: none;
  border: none;
  background: none;
  padding: 4px 12px;
  border-radius: 10px;
  transition: background 0.15s, color 0.15s;
  font-family: inherit;
}
.car-name-btn:hover { background: #fff3cd; color: #c41e1e; }
.car-name-btn:active { background: #ffd700; }
.carries-box {
  background: #fff8e1;
  border: 3px solid #ffd700;
  border-radius: 14px;
  padding: 12px 18px;
  text-align: center;
  width: 100%;
}
.carries-label {
  font-size: 0.75rem;
  font-weight: 700;
  letter-spacing: 4px;
  color: #aaa;
}
.carries-text {
  font-size: clamp(1rem, 3.5vw, 1.4rem);
  font-weight: 700;
  color: #1a1a2e;
  margin: 4px 0 6px;
}
.carries-emoji { font-size: 1.8rem; letter-spacing: 6px; }
.tap-hint {
  font-size: 0.78rem;
  color: #bbb;
}
.nav-row {
  display: flex;
  align-items: center;
  gap: 18px;
}
.nav-btn {
  background: #1a3a5c;
  color: white;
  border: none;
  border-radius: 50%;
  width: 58px;
  height: 58px;
  font-size: 2.2rem;
  cursor: pointer;
  transition: background 0.15s, transform 0.1s;
  display: flex;
  align-items: center;
  justify-content: center;
  line-height: 1;
}
.nav-btn:hover:not(:disabled) { background: #c41e1e; }
.nav-btn:active:not(:disabled) { transform: scale(0.88); }
.nav-btn:disabled { opacity: 0.25; cursor: default; }
.dots {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  justify-content: center;
  max-width: 140px;
}
.dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: #ddd;
  transition: background 0.2s, transform 0.2s;
  cursor: pointer;
}
.dot.active { background: #1a3a5c; transform: scale(1.3); }
footer {
  margin-top: 16px;
  font-size: 0.7rem;
  color: rgba(255,255,255,0.3);
  letter-spacing: 4px;
}
</style>
</head>
<body>

let current = 0;

function render() {
  const car = cars[current];
  document.getElementById('carNumber').textContent = `CAR ${current+1} OF ${cars.length}`;
  document.getElementById('carName').textContent = car.name;
  document.getElementById('carriesText').textContent = car.carries;
  document.getElementById('carriesEmoji').textContent = car.emoji;
  car.draw(document.getElementById('carSvg'));
  document.getElementById('prevBtn').disabled = current === 0;
  document.getElementById('nextBtn').disabled = current === cars.length - 1;
  const dotsEl = document.getElementById('dots');
  dotsEl.innerHTML = cars.map((_,i) =>
    `<div class="dot ${i===current?'active':''}" onclick="jumpTo(${i})"></div>`
  ).join('');
}

function navigate(dir) {
  const n = current + dir;
  if (n >= 0 && n < cars.length) { current = n; render(); }
}

function jumpTo(i) { current = i; render(); }

function speak() {
  if (!window.speechSynthesis) return;
  const car = cars[current];
  const msg = new SpeechSynthesisUtterance(`${car.name}! It carries ${car.carries}`);
  msg.rate = 0.82; msg.pitch = 1.15; msg.volume = 1;
  window.speechSynthesis.cancel();
  window.speechSynthesis.speak(msg);
}

let tx = 0;
document.getElementById('card').addEventListener('touchstart', e => { tx = e.touches[0].clientX; }, { passive:true });
document.getElementById('card').addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - tx;
  if (Math.abs(dx) > 45) navigate(dx < 0 ? 1 : -1);
}, { passive:true });

render();
</script>

</html>
