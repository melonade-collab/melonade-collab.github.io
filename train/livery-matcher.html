<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Livery Matcher — Train World</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Trebuchet MS', Arial, sans-serif;
  background: linear-gradient(160deg, #0d1a2e 0%, #1a2e4a 50%, #0a1218 100%);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 60px 14px 48px;
}
.back-link { position:fixed; top:12px; left:14px; font-size:0.7rem; color:rgba(255,255,255,0.5); text-decoration:none; background:rgba(0,0,0,0.4); border:1px solid rgba(255,255,255,0.15); padding:4px 10px; border-radius:6px; letter-spacing:2px; z-index:100; }

h1 { font-size:clamp(1.4rem,5vw,2rem); font-weight:900; letter-spacing:3px; color:#ffd700; text-shadow:3px 3px 0 #6a4a00; text-align:center; margin-bottom:6px; }
.subtitle { font-size:0.72rem; color:rgba(255,215,0,0.5); letter-spacing:3px; margin-bottom:14px; text-align:center; }

.stars-row { display:flex; gap:6px; justify-content:center; margin-bottom:10px; min-height:2rem; }
.star { font-size:1.6rem; opacity:0.2; transition:transform 0.3s; }
.star.earned { opacity:1; animation:starPop 0.4s ease; }
@keyframes starPop { 0%{transform:scale(0)} 60%{transform:scale(1.5)} 100%{transform:scale(1)} }

.progress { font-size:0.65rem; font-weight:700; letter-spacing:3px; color:rgba(255,255,255,0.3); text-align:center; margin-bottom:14px; }

.card {
  background: white;
  border-radius: 24px;
  width: min(96vw, 540px);
  box-shadow: 0 24px 70px rgba(0,0,0,0.5);
  display: flex;
  flex-direction: column;
  align-items: center;
  overflow: hidden;
}

.photo-wrap {
  width: 100%;
  height: clamp(220px, 42vw, 300px);
  overflow: hidden;
  position: relative;
  flex-shrink: 0;
}
.photo-wrap img {
  width: 100%; height: 100%;
  object-fit: cover;
  display: block;
  transition: transform 0.3s;
}

.question-label {
  font-size: 0.72rem; font-weight: 700; letter-spacing: 4px;
  color: #aaa; margin: 16px 0 16px; text-align: center;
}
.question-text {
  font-size: clamp(1rem, 3.5vw, 1.25rem);
  font-weight: 900; color: #1a1a2e;
  text-align: center; margin-bottom: 14px;
  padding: 0 16px;
}

.options {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  width: 100%;
  padding: 0 16px 18px;
}
.opt-btn {
  background: #f4f4f4;
  border: 2.5px solid #e0e0e0;
  border-radius: 14px;
  padding: 14px 10px;
  font-size: clamp(0.75rem, 2.8vw, 0.9rem);
  font-weight: 700;
  font-family: inherit;
  color: #1a1a2e;
  cursor: pointer;
  transition: all 0.15s;
  line-height: 1.3;
  text-align: center;
}
.opt-btn:hover:not(:disabled) { background:#e8f0ff; border-color:#6699cc; }
.opt-btn.correct { background:#d4edda; border-color:#28a745; color:#155724; }
.opt-btn.wrong   { background:#f8d7da; border-color:#dc3545; color:#721c24; animation:shake 0.4s ease; }
.opt-btn:disabled { cursor:default; }

@keyframes shake { 0%,100%{transform:translateX(0)} 20%,60%{transform:translateX(-6px)} 40%,80%{transform:translateX(6px)} }

.fact-bubble {
  margin: 0 16px 16px;
  background: #fff8e1;
  border: 1.5px solid #ffe082;
  border-radius: 14px;
  padding: 12px 14px;
  font-size: 0.82rem;
  color: #5a4500;
  line-height: 1.6;
  display: none;
  width: calc(100% - 32px);
}
.fact-bubble.show { display: block; }

.next-btn {
  display: none;
  background: #1a3a5c;
  color: #ffd700;
  border: none;
  padding: 14px 36px;
  border-radius: 14px;
  font-size: 1rem;
  font-weight: 900;
  font-family: inherit;
  cursor: pointer;
  letter-spacing: 2px;
  margin: 0 16px 20px;
  transition: transform 0.15s;
  width: calc(100% - 32px);
}
.next-btn.show { display: block; }
.next-btn:hover { transform: scale(1.03); }

.win-screen { display:none; flex-direction:column; align-items:center; gap:18px; text-align:center; }
.win-screen.show { display:flex; }
.win-emoji { font-size:4.5rem; animation:pop 0.5s ease; }
@keyframes pop { 0%{transform:scale(0)} 70%{transform:scale(1.3)} 100%{transform:scale(1)} }
.win-title { font-size:1.6rem; font-weight:900; color:#ffd700; letter-spacing:3px; text-shadow:3px 3px 0 #6a4a00; }
.win-score { font-size:0.85rem; color:rgba(255,255,255,0.5); letter-spacing:2px; }
.play-again { background:#ffd700; color:#1a1a2e; border:none; padding:14px 36px; border-radius:14px; font-size:1rem; font-weight:900; cursor:pointer; letter-spacing:2px; transition:transform 0.15s; }
.play-again:hover { transform:scale(1.05); }
</style>
</head>
<body>

<a class="back-link" href="index.html">← Train World</a>
<h1>🚂 LIVERY MATCHER</h1>
<p class="subtitle">WHICH RAILWAY IS THIS?</p>

<div class="stars-row" id="starsRow"></div>
<p class="progress" id="progress"></p>

<div class="card" id="gameCard">
  <div class="photo-wrap"><img id="trainPhoto" src="" alt="Train"></div>
  <p class="question-label">WHICH RAILWAY IS THIS?</p>
  <div class="options" id="options"></div>
  <div class="fact-bubble" id="factBubble"></div>
  <button class="next-btn" id="nextBtn" onclick="nextQuestion()">Next →</button>
</div>

<div class="win-screen" id="winScreen">
  <div class="win-emoji">🏆</div>
  <div class="win-title">ALL MATCHED!</div>
  <div class="win-score" id="winScore"></div>
  <div class="stars-row" id="winStars"></div>
  <button class="play-again" onclick="initGame()">Play Again!</button>
</div>

<script>

    pos: 'center', color: '#003da5',
    facts: [
      "VIA Rail's blue and yellow trains travel all the way across Canada — a four-day journey of over 4,400 kilometres from Toronto to Vancouver!",
      "VIA Rail's The Canadian passes through some of the most spectacular scenery on Earth, including the Canadian Shield, the prairies, and the Rocky Mountains — all from your train seat!",

    image: 'https://images.unsplash.com/photo-1758473439537-e5144e93782b?q=80&w=387&auto=format&fit=crop',

    image: 'https://images.unsplash.com/photo-1660016902828-f490c2d1736c?q=80&w=870&auto=format&fit=crop',

  },

    id: 'ferromex', name: 'Ferromex',
    image: 'https://images.unsplash.com/photo-1627674678760-59697663644f?q=80&w=870&auto=format&fit=crop',

    ]
  },
  {
    id: 'cn', name: 'Canadian National',
    image: 'https://images.unsplash.com/photo-1543256691-5d27cc7fbee0?w=400&auto=format&fit=crop&q=60',
    pos: 'center', color: '#cc0000',
    facts: [

  {

    pos: 'center', color: '#e8c200',

const SHOW = 4;
let order, current, score, firstTryMisses;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

function buildStars(count, max) {
  return Array.from({length: max}, (_, i) =>
    `<span class="star ${i < count ? 'earned' : ''}">⭐</span>`
  ).join('');
}

function initGame() {
  order = shuffle(ALL_RAILWAYS).slice(0, SHOW);
  current = 0; score = 0; firstTryMisses = {};
  document.getElementById('winScreen').classList.remove('show');
  document.getElementById('gameCard').style.display = '';
  document.getElementById('starsRow').innerHTML = buildStars(0, SHOW);
  renderQuestion();
}

function renderQuestion() {
  const q = order[current];
  document.getElementById('progress').textContent = `QUESTION ${current+1} OF ${SHOW}`;
  document.getElementById('trainPhoto').src = q.image;
  document.getElementById('trainPhoto').style.objectPosition = q.pos;
  document.getElementById('factBubble').classList.remove('show');
  document.getElementById('nextBtn').classList.remove('show');

  // 4 options: correct + 3 random wrong from full pool
  const wrong = shuffle(ALL_RAILWAYS.filter(r => r.id !== q.id)).slice(0, 3);
  const opts = shuffle([q, ...wrong]);

  const optDiv = document.getElementById('options');
  optDiv.innerHTML = '';
  opts.forEach(r => {
    const btn = document.createElement('button');
    btn.className = 'opt-btn';
    btn.textContent = r.name;
    btn.dataset.speak = r.speak || r.name;
    btn.onclick = () => handleAnswer(btn, r, q);
    optDiv.appendChild(btn);
  });
}

function handleAnswer(btn, chosen, q) {
  speak(btn.dataset.speak || btn.textContent);
  document.querySelectorAll('.opt-btn').forEach(b => b.disabled = true);

  if (chosen.id === q.id) {
    btn.classList.add('correct');
    if (!firstTryMisses[q.id]) score++;
    document.getElementById('starsRow').innerHTML = buildStars(score, SHOW);
    const fact = document.getElementById('factBubble');
    fact.textContent = q.facts[Math.floor(Math.random() * q.facts.length)];
    fact.classList.add('show');
    document.getElementById('nextBtn').classList.add('show');
    playChime();
    setTimeout(() => speak(fact.textContent), 500);
  } else {
    btn.classList.add('wrong');
    firstTryMisses[q.id] = true;
    setTimeout(() => {
      document.querySelectorAll('.opt-btn').forEach(b => {
        if (!b.classList.contains('correct')) b.disabled = false;
      });
      btn.classList.remove('wrong');
    }, 600);
  }
}

function nextQuestion() {
  current++;
  if (current < SHOW) {
    renderQuestion();
  } else {
    document.getElementById('gameCard').style.display = 'none';
    document.getElementById('winStars').innerHTML = buildStars(score, SHOW);
    document.getElementById('winScore').textContent =
      score === SHOW ? 'PERFECT ROUND!' : `${score} OF ${SHOW} ON FIRST TRY`;
    document.getElementById('winScreen').classList.add('show');
    speak(score === SHOW
      ? 'Perfect! You got them all right on the first try! Amazing!'
      : `You matched all ${SHOW} trains! Great job!`
    );
  }
}

function playChime() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    [[0, 523.25], [0.14, 659.25], [0.28, 783.99]].forEach(([t, freq]) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.frequency.value = freq; osc.type = 'sine';
      gain.gain.setValueAtTime(0.28, ctx.currentTime + t);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + t + 0.45);
      osc.start(ctx.currentTime + t); osc.stop(ctx.currentTime + t + 0.5);
    });
  } catch(e) {}
}

function speak(text) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.rate = 0.88; u.pitch = 1.1; u.volume = 1;
  window.speechSynthesis.speak(u);
}

initGame();
</script>
