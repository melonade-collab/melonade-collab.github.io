<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Build-a-Train!</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Trebuchet MS', Arial, sans-serif;
  background: linear-gradient(160deg, #1a2e0a 0%, #2a4a10 50%, #0a1a04 100%);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 16px 12px;
  overflow-x: hidden;
}
h1 {
  font-size: clamp(1.6rem, 5vw, 2.4rem);
  font-weight: 900;
  letter-spacing: 3px;
  color: #ffd700;
  text-shadow: 3px 3px 0 #6a4a00;
  text-align: center;
  margin-bottom: 4px;
}
.subtitle {
  font-size: 0.8rem;
  color: rgba(255,215,0,0.5);
  letter-spacing: 4px;
  text-align: center;
  margin-bottom: 16px;
}
.palette-section {
  background: rgba(0,0,0,0.35);
  border-radius: 20px;
  padding: 16px 14px;
  width: 100%;
  max-width: 680px;
  margin-bottom: 14px;
}
.palette-title {
  font-size: 0.75rem;
  font-weight: 700;
  letter-spacing: 5px;
  color: rgba(255,255,255,0.5);
  margin-bottom: 12px;
  text-align: center;
}
.palette {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 8px;
}
.car-btn {
  background: rgba(255,255,255,0.1);
  border: 2px solid rgba(255,255,255,0.2);
  border-radius: 12px;
  padding: 10px 6px 8px;
  cursor: pointer;
  transition: background 0.15s, transform 0.1s, border-color 0.15s;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  color: white;
  width: 100%;
}
.car-btn:hover { background: rgba(255,215,0,0.2); border-color: #ffd700; }
.car-btn:active { transform: scale(0.93); }
.car-btn svg { width: 100%; height: auto; }
.car-btn span {
  font-size: clamp(0.55rem, 1.8vw, 0.72rem);
  font-weight: 700;
  letter-spacing: 1px;
  color: rgba(255,255,255,0.9);
  text-align: center;
}
.track-section {
  background: rgba(0,0,0,0.4);
  border-radius: 20px;
  padding: 16px 14px;
  width: 100%;
  max-width: 680px;
  margin-bottom: 14px;
}
.track-title {
  font-size: 0.75rem;
  font-weight: 700;
  letter-spacing: 5px;
  color: rgba(255,255,255,0.5);
  margin-bottom: 10px;
  text-align: center;
}
.track-wrapper {
  overflow-x: auto;
  overflow-y: hidden;
  border-radius: 12px;
  background: linear-gradient(180deg, #d8e8f0 0%, #b8d0e8 100%);
  padding: 10px 8px 0;
  min-height: 120px;
  position: relative;
  scrollbar-width: thin;
}
#trainDisplay {
  display: flex;
  align-items: flex-end;
  min-height: 100px;
  width: max-content;
  transition: transform 0s;
  position: relative;
}
.empty-track {
  color: #7090a8;
  font-size: 0.9rem;
  font-weight: 600;
  padding: 28px 20px;
  letter-spacing: 2px;
  width: 100%;
  text-align: center;
  user-select: none;
}
.train-car-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  position: relative;
  cursor: pointer;
}
.train-car-item svg { width: 110px; height: auto; }
.remove-hint {
  font-size: 0.6rem;
  color: #c41e1e;
  opacity: 0;
  transition: opacity 0.2s;
  font-weight: 700;
  letter-spacing: 1px;
  position: absolute;
  top: -16px;
  left: 50%;
  transform: translateX(-50%);
  white-space: nowrap;
}
.train-car-item:hover .remove-hint { opacity: 1; }
.loco svg { width: 140px; height: auto; }
.controls {
  display: flex;
  gap: 12px;
  justify-content: center;
  width: 100%;
  max-width: 680px;
}
.ctrl-btn {
  flex: 1;
  max-width: 200px;
  padding: 14px 10px;
  border: none;
  border-radius: 14px;
  font-size: 1.1rem;
  font-weight: 900;
  letter-spacing: 2px;
  cursor: pointer;
  transition: transform 0.1s, filter 0.15s;
  font-family: inherit;
}
.ctrl-btn:active { transform: scale(0.94); }
#clearBtn { background: #555; color: #ddd; }
#clearBtn:hover { background: #c41e1e; color: white; }
#goBtn { background: #ffd700; color: #1a2e0a; }
#goBtn:hover { filter: brightness(1.1); }
#goBtn:disabled { background: #888; color: #555; cursor: default; filter: none; }
.count-display {
  text-align: center;
  color: rgba(255,255,255,0.6);
  font-size: 0.8rem;
  letter-spacing: 3px;
  font-weight: 600;
  margin-top: 10px;
}
.lb-wrap {
  background: rgba(255,255,255,0.07);
  border: 1px solid rgba(255,215,0,0.25);
  border-radius: 14px;
  padding: 14px 18px;
  margin-top: 14px;
  width: min(90vw, 340px);
  text-align: left;
}
.lb-title { font-size: 0.62rem; font-weight: 700; letter-spacing: 3px; color: rgba(255,215,0,0.55); margin-bottom: 10px; text-align: center; }
.lb-row { display: flex; align-items: center; gap: 10px; padding: 5px 0; border-bottom: 1px solid rgba(255,255,255,0.07); }
.lb-row:last-child { border-bottom: none; }
.lb-medal { font-size: 1.1rem; width: 24px; text-align: center; flex-shrink: 0; }
.lb-dist { font-size: 0.9rem; font-weight: 900; color: #ffd700; flex: 1; }
.lb-tag { font-size: 0.6rem; font-weight: 700; letter-spacing: 1px; background: rgba(255,215,0,0.2); color: #ffd700; border-radius: 6px; padding: 2px 7px; flex-shrink: 0; }
.lb-comp { font-size: 0.62rem; color: rgba(255,255,255,0.45); }
.lb-empty { font-size: 0.75rem; color: rgba(255,255,255,0.3); text-align: center; padding: 6px; }
.length-display {
  text-align: center;
  color: rgba(255,215,0,0.85);
  font-size: 0.78rem;
  font-weight: 700;
  letter-spacing: 1px;
  margin-top: 6px;
  min-height: 1.3em;
  padding: 0 12px;
}
.celebration {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  z-index: 100;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 16px;
}
.celebration.show { display: flex; }
.celeb-text {
  font-size: clamp(2rem, 8vw, 3.5rem);
  font-weight: 900;
  color: #ffd700;
  text-align: center;
  text-shadow: 3px 3px 0 #8a6000;
  letter-spacing: 3px;
  animation: bounce 0.5s ease infinite alternate;
}
@keyframes bounce { from { transform: scale(1); } to { transform: scale(1.08); } }
.celeb-emoji { font-size: 4rem; animation: spin 1.5s linear infinite; }
@keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
.celeb-btn {
  background: #ffd700;
  color: #1a2e0a;
  border: none;
  border-radius: 14px;
  padding: 14px 32px;
  font-size: 1.2rem;
  font-weight: 900;
  cursor: pointer;
  letter-spacing: 2px;
  font-family: inherit;
  margin-top: 10px;
}
.back-link {
  position: fixed;
  top: 12px; left: 14px;
  font-size: 0.7rem;
  color: #aaa;
  text-decoration: none;
  background: rgba(0,0,0,0.55);
  border: 1px solid #444;
  padding: 4px 9px;
  border-radius: 6px;
  letter-spacing: 2px;
}
.engine-picker {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.88);
  z-index: 200;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 18px;
}
.engine-picker.hidden { display: none; }
.engine-picker-title {
  font-size: clamp(1.3rem, 5vw, 2rem);
  font-weight: 900;
  color: #ffd700;
  text-shadow: 3px 3px 0 #6a4a00;
  letter-spacing: 3px;
  text-align: center;
}
.engine-picker-sub {
  font-size: 0.7rem;
  color: rgba(255,215,0,0.45);
  letter-spacing: 3px;
  text-align: center;
  margin-top: -10px;
}
.engine-opts {
  display: flex;
  flex-direction: column;
  gap: 10px;
  width: min(92vw, 400px);
}
.engine-opt {
  background: rgba(255,255,255,0.07);
  border: 2px solid rgba(255,255,255,0.18);
  border-radius: 16px;
  padding: 10px 14px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 14px;
  transition: background 0.15s, border-color 0.15s;
  font-family: inherit;
}
.engine-opt:hover { background: rgba(255,215,0,0.15); border-color: #ffd700; }
.engine-opt:active { transform: scale(0.97); }
.engine-opt svg { width: 108px; height: auto; flex-shrink: 0; }
.engine-opt-label {
  font-size: clamp(0.85rem, 3vw, 1rem);
  font-weight: 900;
  color: white;
  letter-spacing: 2px;
}
</style>
</head>
<body>

<a class="back-link" href="index.html">← Train World</a>
<h1>BUILD-A-TRAIN!</h1>
<div class="subtitle">★ TAP A CAR TO ADD IT ★</div>

<div class="palette-section">
  <div class="palette-title">CHOOSE YOUR CARS</div>
  <div class="palette" id="palette"></div>
</div>

<div class="track-section">
  <div class="track-title">YOUR TRAIN</div>
  <div class="track-wrapper" id="trackWrapper">
    <div id="trainDisplay">
      <div class="empty-track" id="emptyMsg">TAP CARS ABOVE TO BUILD YOUR TRAIN!</div>
    </div>
  </div>
</div>

<div class="controls">
  <button class="ctrl-btn" id="clearBtn" onclick="clearTrain()">CLEAR</button>
  <button class="ctrl-btn" id="goBtn" onclick="goTrain()" disabled>GO! 🚂</button>
</div>
<div class="count-display" id="countDisplay">ADD SOME CARS TO GET STARTED</div>
<div class="length-display" id="lengthDisplay"></div>

<div class="engine-picker" id="enginePicker">
  <div class="engine-picker-title">PICK YOUR ENGINE!</div>
  <div class="engine-picker-sub">THEN ADD YOUR CARS</div>
  <div class="engine-opts" id="engineOpts"></div>
</div>

<div class="celebration" id="celebration">
  <div class="celeb-emoji">🚂</div>
  <div class="celeb-text">CHUGGA CHUGGA<br>CHOO CHOO!</div>
  <div style="color:white;font-size:1.1rem;letter-spacing:2px;margin-bottom:4px">YOUR TRAIN IS ON THE MOVE!</div>
  <div style="color:rgba(255,215,0,0.8);font-size:0.82rem;font-weight:700;letter-spacing:1px" id="celebLength"></div>
  <div class="lb-wrap">
    <div class="lb-title">🏆 LONGEST TRAINS</div>
    <div id="lbRows"></div>
  </div>
  <button class="celeb-btn" onclick="resetAfterGo()">BUILD AGAIN!</button>
</div>

const ENGINES = [
  { name: '🚂  STEAM',  len: 27, svgFn: steamLocoSvg  },
  { name: '🚃  DIESEL', len: 22, svgFn: dieselLocoSvg },
  { name: '🚄  BULLET', len: 25, svgFn: bulletLocoSvg },
];
let currentEngine = 0;

let train = [];

function showEnginePicker() {
  const opts = document.getElementById('engineOpts');
  opts.innerHTML = ENGINES.map((e, i) => `
    <button class="engine-opt" onclick="pickEngine(${i})">
      ${e.svgFn()}
      <span class="engine-opt-label">${e.name}</span>
    </button>`).join('');
  document.getElementById('enginePicker').classList.remove('hidden');
}

function pickEngine(i) {
  currentEngine = i;
  speak(ENGINES[i].name.replace(/[^a-zA-Z ]/g,'').trim());
  document.getElementById('enginePicker').classList.add('hidden');
  train = [];
  renderTrain();
}

function buildPalette() {
  const palette = document.getElementById('palette');
  carDefs.forEach((def, i) => {
    const btn = document.createElement('button');
    btn.className = 'car-btn';
    btn.innerHTML = `${miniCarSvg(def)}<span>${def.name}</span>`;
    btn.onclick = () => addCar(i);
    palette.appendChild(btn);
  });
}

function addCar(i) {
  train.push(i);
  renderTrain();
  playClick();
  const spoken = carDefs[i].spoken || carDefs[i].name.toLowerCase().replace(/\b\w/g, c => c.toUpperCase());
  speak(spoken);
}

function speak(text) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.rate = 0.9; u.pitch = 1.1; u.volume = 1;
  window.speechSynthesis.speak(u);
}

function removeCar(idx) {
  train.splice(idx, 1);
  renderTrain();
}

function renderTrain() {
  const display = document.getElementById('trainDisplay');
  const emptyMsg = document.getElementById('emptyMsg');
  const count = document.getElementById('countDisplay');
  const goBtn = document.getElementById('goBtn');

  const lengthEl = document.getElementById('lengthDisplay');

  if (train.length === 0) {
    display.innerHTML = '<div class="empty-track" id="emptyMsg">TAP CARS ABOVE TO BUILD YOUR TRAIN!</div>';
    count.textContent = 'ADD SOME CARS TO GET STARTED';
    lengthEl.textContent = '';
    goBtn.disabled = true;
    return;
  }

  let html = `<div class="loco">${ENGINES[currentEngine].svgFn()}</div>`;
  train.forEach((carIdx, i) => {
    const def = carDefs[carIdx];
    html += `<div class="train-car-item" onclick="removeCar(${i})">
      <div class="remove-hint">TAP TO REMOVE</div>
      ${miniCarSvg(def)}
    </div>`;
  });
  display.innerHTML = html;
  display.style.transform = '';

  const n = train.length;
  const carWord = n === 1 ? 'CAR' : 'CARS';
  count.textContent = `${n} ${carWord} — READY TO ROLL!`;
  goBtn.disabled = false;

  const m = trainLengthMetres();
  const dist = m >= 1000 ? `${(m / 1000).toFixed(2)} km` : `${m} m`;
  lengthEl.textContent = `📏 ${dist} long — ${trainComparison(m)}`;

  const wrapper = document.getElementById('trackWrapper');
  setTimeout(() => { wrapper.scrollLeft = wrapper.scrollWidth; }, 50);
}

function trainLengthMetres() {
  let m = ENGINES[currentEngine].len;
  train.forEach(i => { m += carDefs[i].len; });
  return m;
}

function trainComparison(m) {
  if (m < 12)      return "shorter than a school bus 🚌";
  if (m < 26)      return "about the length of a blue whale 🐋";
  if (m < 51)      return "about as long as an Olympic swimming pool 🏊";
  if (m < 100)     return "about the length of a football field 🏈";
  if (m < 138)     return "about as tall as the Statue of Liberty lying on its side 🗽";
  if (m < 240)     return "about the length of two football fields 🏈🏈";
  if (m < 390)     return "about the height of the Empire State Building tipped over 🏙️";
  if (m < 553)     return "about as tall as the CN Tower laid on its side 🏙️";
  if (m < 900)     return "about the length of Central Park in New York 🌳";
  if (m < 1609)    return "almost a whole kilometre — that's a serious train! 🚂";
  if (m < 3000)    return "about the length of a real North American freight train 🚂";
  if (m < 5000)    return "about the width of downtown Toronto 🏙️";
  if (m < 12000)   return "about the width of Lake Simcoe 🏞️";
  if (m < 68000)   return "about the distance from Toronto to Hamilton 🏙️";
  if (m < 130000)  return "about the distance from Toronto to Niagara Falls 🌊";
  if (m < 450000)  return "about the distance from Toronto to Ottawa 🍁";
  if (m < 800000)  return "about the distance from Toronto to Québec City ⚜️";
  return                  "about the distance from Toronto to Winnipeg 🌾";
}

function clearTrain() {
  showEnginePicker();
}

const LB_KEY = 'train_builder_top_lengths';

function getLengths() {
  try { return JSON.parse(localStorage.getItem(LB_KEY)) || []; } catch(e) { return []; }
}

function saveLength(m) {
  const arr = getLengths();
  arr.push(m);
  arr.sort((a, b) => b - a);
  localStorage.setItem(LB_KEY, JSON.stringify(arr.slice(0, 5)));
}

function renderLb(newM) {
  const medals = ['🥇','🥈','🥉','4️⃣','5️⃣'];
  const arr = getLengths();
  const el = document.getElementById('lbRows');
  if (!arr.length) { el.innerHTML = '<div class="lb-empty">No records yet!</div>'; return; }
  let markedNew = false;
  el.innerHTML = arr.map((m, i) => {
    const dist = m >= 1000 ? `${(m/1000).toFixed(2)} km` : `${m} m`;
    const isNew = !markedNew && m === newM;
    if (isNew) markedNew = true;
    return `<div class="lb-row">
      <span class="lb-medal">${medals[i]}</span>
      <div style="flex:1">
        <div class="lb-dist">${dist}</div>
        <div class="lb-comp">${trainComparison(m)}</div>
      </div>
      ${isNew ? '<span class="lb-tag">YOU</span>' : ''}
    </div>`;
  }).join('');
}

function goTrain() {
  if (train.length === 0) return;
  const m = trainLengthMetres();
  saveLength(m);
  const dist = m >= 1000 ? `${(m/1000).toFixed(2)} km` : `${m} m`;
  document.getElementById('celebLength').textContent = `📏 ${dist} — ${trainComparison(m)}`;
  renderLb(m);

  const wrapper = document.getElementById('trackWrapper');
  const display = document.getElementById('trainDisplay');
  wrapper.scrollTo({ left: 0, behavior: 'smooth' });
  setTimeout(() => {
    const width = display.scrollWidth + 300;
    const duration = Math.max(2, train.length * 0.5);
    display.style.transition = `transform ${duration}s linear`;
    display.style.transform = `translateX(-${width}px)`;
    playChugging(train.length);
    setTimeout(() => {
      document.getElementById('celebration').classList.add('show');
    }, duration * 1000 - 200);
  }, 700);
}

function resetAfterGo() {
  document.getElementById('celebration').classList.remove('show');
  const display = document.getElementById('trainDisplay');
  display.style.transition = 'none';
  display.style.transform = '';
  showEnginePicker();
}

function playClick() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.frequency.value = 600;
    osc.type = 'square';
    gain.gain.setValueAtTime(0.08, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.08);
    osc.start(); osc.stop(ctx.currentTime + 0.1);
  } catch(e) {}
}

function playChugging(carCount) {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const beats = [];
    const duration = Math.max(2.5, carCount * 0.5 + 1);
    const interval = 0.22;
    for (let t = 0; t < duration; t += interval) beats.push(t);

    beats.forEach((time, i) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.frequency.value = i % 2 === 0 ? 90 : 75;
      osc.type = 'sawtooth';
      gain.gain.setValueAtTime(0, ctx.currentTime + time);
      gain.gain.linearRampToValueAtTime(0.18, ctx.currentTime + time + 0.04);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + time + 0.18);
      osc.start(ctx.currentTime + time);
      osc.stop(ctx.currentTime + time + 0.2);
    });

    // Whistle at the start
    const whistle = ctx.createOscillator();
    const wGain = ctx.createGain();
    whistle.connect(wGain); wGain.connect(ctx.destination);
    whistle.frequency.value = 880;
    whistle.type = 'sine';
    wGain.gain.setValueAtTime(0.15, ctx.currentTime + 0.1);
    wGain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.7);
    whistle.start(ctx.currentTime + 0.1);
    whistle.stop(ctx.currentTime + 0.8);
  } catch(e) {}
}

buildPalette();
showEnginePicker();
</script>
