<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spot the Difference — Train World</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Trebuchet MS', Arial, sans-serif;
  background: linear-gradient(160deg, #1a1a0d 0%, #2e2e0a 50%, #121208 100%);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 60px 14px 48px;
}
.back-link { position:fixed; top:12px; left:14px; font-size:0.7rem; color:rgba(255,255,255,0.5); text-decoration:none; background:rgba(0,0,0,0.4); border:1px solid rgba(255,255,255,0.15); padding:4px 10px; border-radius:6px; letter-spacing:2px; z-index:100; }
h1 { font-size: clamp(1.4rem, 5vw, 2rem); font-weight: 900; letter-spacing: 3px; color: #ffd700; text-shadow: 3px 3px 0 #6a6a00; text-align: center; margin-bottom: 6px; }
.subtitle { font-size: 0.72rem; color: rgba(255,215,0,0.5); letter-spacing: 3px; margin-bottom: 8px; text-align: center; }
.round-badge {
  font-size: 0.7rem; font-weight: 700; letter-spacing: 3px; color: rgba(255,255,255,0.4);
  background: rgba(255,255,255,0.07); border-radius: 20px; padding: 5px 16px;
  margin-bottom: 20px;
}
.question-text {
  font-size: clamp(0.9rem, 3.5vw, 1.1rem);
  font-weight: 700;
  color: #fff;
  text-align: center;
  margin-bottom: 14px;
  min-height: 2.4em;
  line-height: 1.4;
}

.trains-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  width: 100%;
  max-width: 480px;
  margin-bottom: 10px;
}
.train-panel {
  border-radius: 14px;
  overflow: hidden;
  background: #1a2a1a;
  border: 3px solid rgba(255,255,255,0.1);
  position: relative;
  transition: border-color 0.3s;
}
.train-panel.correct  { border-color: #4ade80; }
.train-panel.wrong    { border-color: #f87171; animation: shake 0.4s ease; }
.panel-label {
  font-size: 0.6rem; font-weight: 700; letter-spacing: 2px;
  color: rgba(255,255,255,0.3); text-align: center;
  padding: 5px 0 0;
  background: rgba(0,0,0,0.3);
}
.train-svg-wrap {
  padding: 10px 8px 14px;
  cursor: pointer;
  user-select: none;
}
.panel-result {
  position: absolute; bottom: 6px; right: 8px;
  font-size: 1.4rem;
  opacity: 0;
  transition: opacity 0.3s;
}
.train-panel.correct .panel-result  { opacity: 1; }
.train-panel.wrong   .panel-result  { opacity: 1; }

.hint { font-size:0.72rem; color:rgba(255,255,255,0.35); text-align:center; letter-spacing:2px; margin-bottom:16px; min-height:1.2em; }

.progress-dots { display:flex; gap:10px; justify-content:center; margin-top:4px; }
.dot { width:10px; height:10px; border-radius:50%; background:rgba(255,255,255,0.2); transition:background 0.3s; }
.dot.done { background:#4ade80; }
.dot.active { background:#ffd700; }

.win-screen { display:none; flex-direction:column; align-items:center; gap:18px; text-align:center; }
.win-screen.show { display:flex; }
.win-emoji { font-size:4rem; animation:pop 0.5s ease; }
@keyframes pop { 0%{transform:scale(0)} 70%{transform:scale(1.3)} 100%{transform:scale(1)} }
.win-text { font-size:1.5rem; font-weight:900; color:#ffd700; letter-spacing:3px; text-shadow:3px 3px 0 #6a6a00; }
.play-again { background:#ffd700; color:#1a1a2e; border:none; padding:14px 32px; border-radius:14px; font-size:1rem; font-weight:900; cursor:pointer; letter-spacing:2px; transition:transform 0.15s; }
.play-again:hover { transform:scale(1.05); }

@keyframes shake { 0%,100%{transform:translateX(0)} 20%,60%{transform:translateX(-7px)} 40%,80%{transform:translateX(7px)} }
</style>
</head>
<body>

<a class="back-link" href="index.html">← Train World</a>
<h1>🔍 SPOT THE DIFFERENCE</h1>
<p class="subtitle">FIND WHAT'S DIFFERENT ON TRAIN B</p>

<div id="game">
  <div class="round-badge" id="roundBadge">ROUND 1 OF 3</div>
  <p class="question-text" id="questionText"></p>
  <div class="trains-row">
    <div class="train-panel" id="panelA">
      <div class="panel-label">TRAIN A</div>
      <div class="train-svg-wrap" id="svgA"></div>
      <div class="panel-result" id="resA"></div>
    </div>
    <div class="train-panel" id="panelB">
      <div class="panel-label">TRAIN B</div>
      <div class="train-svg-wrap" id="svgB" style="cursor:pointer;"></div>
      <div class="panel-result" id="resB"></div>
    </div>
  </div>
  <p class="hint" id="hint">TAP TRAIN B TO SPOT WHAT'S DIFFERENT!</p>
  <div class="progress-dots" id="dots"></div>
</div>

<div class="win-screen" id="winScreen">
  <div class="win-emoji">🕵️</div>
  <div class="win-text">EAGLE EYES!</div>
  <button class="play-again" onclick="startGame()">Play Again!</button>
</div>

<script>
// Each round: question, SVG A (normal), SVG B (with difference), correct panel = 'B'
const rounds = [
  {
    question: "One train has a DIFFERENT COLOUR engine.\nWhich train has the red engine?",
    correctPanel: 'A',
    correctMsg: 'Yes! Train A has the red engine!',
    wrongMsg: 'Look at the engine colour — Train A is red!',
    svgA: trainSVG('#c41e1e', '#8a6000', '#8a6000'),
    svgB: trainSVG('#e87722', '#8a6000', '#8a6000'),
  },
  {
    question: "One train is MISSING a car!\nWhich train has only 2 freight cars?",
    correctPanel: 'B',
    correctMsg: 'You spotted it! Train B is missing a car!',
    wrongMsg: 'Count the cars — Train B only has 2!',
    svgA: trainSVG('#1a3a5c', '#8a6000', '#8a6000', true),
    svgB: trainSVG('#1a3a5c', '#8a6000', null,      true),
  },
  {
    question: "One train has a YELLOW engine.\nWhich train is Union Pacific?",
    correctPanel: 'B',
    correctMsg: 'That\'s Union Pacific — famous for yellow engines!',
    wrongMsg: 'Union Pacific engines are bright yellow — that\'s Train B!',
    svgA: trainSVG('#555', '#6a4a00', '#6a4a00'),
    svgB: trainSVG('#e8c200', '#6a4a00', '#6a4a00'),
  },
];

function trainSVG(engineColor, car1Color, car2Color, showThird = false) {
  const car2 = car2Color
    ? `<rect x="155" y="55" width="80" height="50" rx="4" fill="${car2Color}"/>
       <rect x="160" y="60" width="28" height="20" rx="2" fill="rgba(255,255,255,0.15)"/>
       <rect x="191" y="60" width="28" height="20" rx="2" fill="rgba(255,255,255,0.15)"/>
       <circle cx="170" cy="108" r="8" fill="#222" stroke="#555" stroke-width="2"/>
       <circle cx="225" cy="108" r="8" fill="#222" stroke="#555" stroke-width="2"/>`
    : '';

  const thirdCar = showThird
    ? `<rect x="242" y="58" width="72" height="47" rx="4" fill="${car1Color}"/>
       <circle cx="252" cy="108" r="8" fill="#222" stroke="#555" stroke-width="2"/>
       <circle cx="303" cy="108" r="8" fill="#222" stroke="#555" stroke-width="2"/>`
    : '';

  const viewW = car2Color ? (showThird ? 330 : 250) : (showThird ? 250 : 170);

  return `<svg viewBox="0 0 ${viewW} 120" xmlns="http://www.w3.org/2000/svg" style="width:100%;display:block;">
    <!-- Engine -->
    <rect x="4" y="40" width="70" height="65" rx="4" fill="${engineColor}"/>
    <rect x="4" y="40" width="70" height="24" rx="4" fill="${engineColor}" opacity="0.7"/>
    <rect x="8" y="44" width="22" height="14" rx="2" fill="rgba(135,206,235,0.7)"/>
    <rect x="33" y="44" width="22" height="14" rx="2" fill="rgba(135,206,235,0.7)"/>
    <rect x="60" y="30" width="10" height="16" rx="3" fill="rgba(0,0,0,0.4)"/>
    <circle cx="18" cy="108" r="8" fill="#222" stroke="#555" stroke-width="2"/>
    <circle cx="61" cy="108" r="8" fill="#222" stroke="#555" stroke-width="2"/>
    <!-- Car 1 -->
    <rect x="78" y="52" width="74" height="53" rx="4" fill="${car1Color}"/>
    <rect x="82" y="57" width="25" height="18" rx="2" fill="rgba(255,255,255,0.12)"/>
    <circle cx="90" cy="108" r="8" fill="#222" stroke="#555" stroke-width="2"/>
    <circle cx="141" cy="108" r="8" fill="#222" stroke="#555" stroke-width="2"/>
    ${car2}${thirdCar}
    <!-- Rails -->
    <rect x="0" y="114" width="${viewW}" height="4" rx="2" fill="#7a6a50" opacity="0.8"/>
  </svg>`;
}

let current = 0;

function startGame() {
  current = 0;
  document.getElementById('winScreen').classList.remove('show');
  document.getElementById('game').style.display = '';
  renderRound();
}

function renderRound() {
  const r = rounds[current];
  const dots = document.getElementById('dots');
  dots.innerHTML = rounds.map((_, i) =>
    `<div class="dot ${i < current ? 'done' : i === current ? 'active' : ''}"></div>`
  ).join('');

  document.getElementById('roundBadge').textContent = `ROUND ${current+1} OF ${rounds.length}`;
  document.getElementById('questionText').textContent = r.question;
  document.getElementById('hint').textContent = 'TAP THE TRAIN THAT MATCHES THE QUESTION!';
  document.getElementById('svgA').innerHTML = r.svgA;
  document.getElementById('svgB').innerHTML = r.svgB;
  document.getElementById('panelA').className = 'train-panel';
  document.getElementById('panelB').className = 'train-panel';
  document.getElementById('resA').textContent = '';
  document.getElementById('resB').textContent = '';

  document.getElementById('panelA').onclick = () => answer('A', r);
  document.getElementById('panelB').onclick = () => answer('B', r);

  speak(r.question.replace('\n', '. ') + ' Tap your answer!');
}

function answer(panel, r) {
  document.getElementById('panelA').onclick = null;
  document.getElementById('panelB').onclick = null;

  if (panel === r.correctPanel) {
    document.getElementById(`panel${panel}`).classList.add('correct');
    document.getElementById(`res${panel}`).textContent = '✅';
    speak(r.correctMsg);
    document.getElementById('hint').textContent = '✓ ' + r.correctMsg.toUpperCase();
  } else {
    document.getElementById(`panel${panel}`).classList.add('wrong');
    document.getElementById(`res${panel}`).textContent = '❌';
    document.getElementById(`panel${r.correctPanel}`).classList.add('correct');
    document.getElementById(`res${r.correctPanel}`).textContent = '✅';
    speak(r.wrongMsg);
    document.getElementById('hint').textContent = r.wrongMsg.toUpperCase();
  }

  setTimeout(() => {
    current++;
    if (current < rounds.length) {
      renderRound();
    } else {
      document.getElementById('game').style.display = 'none';
      document.getElementById('winScreen').classList.add('show');
      speak('You spotted all the differences! Amazing eyes!');
    }
  }, 1800);
}

function speak(text) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.rate = 0.85; u.pitch = 1.1; u.volume = 1;
  window.speechSynthesis.speak(u);
}

startGame();
</script>
</body>
</html>
