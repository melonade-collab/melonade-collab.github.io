<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trains of the World Quiz</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: linear-gradient(160deg, #0d1a2e 0%, #1a2e4a 50%, #0a1218 100%);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 16px 16px 48px;
}

.back-link {
  position: fixed;
  top: 12px; left: 14px;
  font-size: 0.7rem;
  color: #aaa;
  text-decoration: none;
  background: rgba(0,0,0,0.55);
  border: 1px solid #444;
  padding: 4px 9px;
  z-index: 200;
  border-radius: 4px;
}

.quiz-wrap {
  width: 100%;
  max-width: 500px;
  margin-top: 48px;
}

/* ── Header ── */
.header { text-align: center; margin-bottom: 18px; }
.header-title {
  font-size: 1.75rem;
  font-weight: 900;
  color: #ffd700;
  letter-spacing: 1px;
  text-shadow: 2px 2px 0 #6a4a00;
}
.header-sub { font-size: 0.82rem; color: rgba(255,255,255,0.45); margin-top: 3px; }
.progress-row {
  display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 14px;
}
.pdot {
  width: 10px; height: 10px; border-radius: 50%;
  background: rgba(255,255,255,0.18);
  transition: background 0.3s, transform 0.2s;
}
.pdot.done { background: #4ade80; }
.pdot.current { background: #ffd700; transform: scale(1.2); }
.score-badge {
  display: inline-flex; align-items: center; gap: 5px;
  background: rgba(255,215,0,0.1);
  border: 1px solid rgba(255,215,0,0.25);
  border-radius: 99px; padding: 4px 14px;
  font-size: 0.78rem; font-weight: 700; color: #ffd700; margin-top: 10px;
}

/* ── Card ── */
.card {
  background: #fff; border-radius: 24px; overflow: hidden;
  box-shadow: 0 12px 48px rgba(0,0,0,0.45);
}

/* ── Train image ── */
.train-img {
  width: 100%; aspect-ratio: 16 / 9;
  overflow: hidden; position: relative;
  display: flex; align-items: center; justify-content: center; flex-direction: column;
}
.train-img img { width: 100%; height: 100%; object-fit: cover; display: block; }
.ph-box {
  width: 100%; height: 100%;
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px;
}
.ph-emoji { font-size: 5rem; line-height: 1; filter: drop-shadow(0 2px 8px rgba(0,0,0,0.2)); }
.ph-label {
  font-size: 0.72rem; font-weight: 700; color: rgba(255,255,255,0.8);
  letter-spacing: 1px; text-transform: uppercase; text-shadow: 0 1px 4px rgba(0,0,0,0.3);
}

/* ── Question area ── */
.q-area { padding: 22px 20px 24px; }
.q-text {
  font-size: 1.1rem; font-weight: 800; color: #0F172A;
  text-align: center; margin-bottom: 18px; line-height: 1.35;
}

/* ── Option buttons ── */
.options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.opt {
  padding: 18px 12px; border-radius: 16px; border: none;
  font-size: 1rem; font-weight: 800; font-family: inherit;
  cursor: pointer; color: #fff; text-align: center; line-height: 1.25;
  box-shadow: 0 3px 10px rgba(0,0,0,0.15);
  transition: transform 0.12s, box-shadow 0.12s;
}
.opt:active:not(:disabled) { transform: scale(0.94); box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
.opt.c0 { background: #EF4444; }
.opt.c1 { background: #3B82F6; }
.opt.c2 { background: #10B981; }
.opt.c3 { background: #F59E0B; }
.opt.correct {
  background: #16A34A !important;
  box-shadow: 0 0 0 4px #BBF7D0, 0 3px 10px rgba(0,0,0,0.15) !important;
  transform: scale(1.03) !important;
}
.opt.wrong {
  background: #991B1B !important;
  animation: shake 0.42s ease;
  box-shadow: 0 0 0 3px #FCA5A5 !important;
}
.opt:disabled { opacity: 0.32; cursor: default; }
.opt.selected {
  outline: 4px solid #fff;
  transform: scale(1.04);
  box-shadow: 0 0 0 4px rgba(255,255,255,0.5), 0 3px 10px rgba(0,0,0,0.15);
}
.btn-submit {
  width: 100%; padding: 15px; margin-top: 12px;
  background: #ffd700; color: #0d1a2e;
  border: none; border-radius: 14px;
  font-size: 1rem; font-weight: 800; font-family: inherit;
  cursor: pointer; letter-spacing: 0.3px;
  transition: background 0.15s, transform 0.1s, opacity 0.2s;
}
.btn-submit:disabled { opacity: 0.28; cursor: default; }
.btn-submit:not(:disabled):hover { background: #f0c800; }
.btn-submit:not(:disabled):active { transform: scale(0.98); }

@keyframes shake {
  0%,100% { transform: translateX(0); }
  20% { transform: translateX(-8px); }
  40% { transform: translateX(8px); }
  60% { transform: translateX(-5px); }
  80% { transform: translateX(5px); }
}

.wrong-msg {
  text-align: center; font-size: 0.82rem; font-weight: 700;
  color: #DC2626; margin-top: 12px; min-height: 18px;
}

/* ── Celebration overlay ── */
.celebrate {
  position: fixed; inset: 0; pointer-events: none; z-index: 999;
  display: flex; align-items: center; justify-content: center;
}
.burst-em {
  position: absolute; font-size: 2rem;
  animation: burstFly 1.1s cubic-bezier(0.22,1,0.36,1) forwards;
}
@keyframes burstFly {
  0%   { transform: translate(0,0) scale(0) rotate(0deg); opacity: 1; }
  40%  { opacity: 1; }
  100% { transform: translate(var(--tx), var(--ty)) scale(0.5) rotate(var(--r)); opacity: 0; }
}

/* ── Result screen ── */
.result-banner {
  background: linear-gradient(135deg, #16A34A, #15803D);
  padding: 20px 22px; display: flex; align-items: center; gap: 14px;
}
.result-check {
  width: 44px; height: 44px;
  background: rgba(255,255,255,0.2); border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.4rem; flex-shrink: 0;
}
.result-correct { font-size: 1.2rem; font-weight: 900; color: #fff; }
.result-country { font-size: 0.82rem; color: rgba(255,255,255,0.8); margin-top: 3px; }
.result-map { width: 100%; height: 220px; border: none; display: block; }
.result-body { padding: 18px 20px 22px; }
.fact-tag {
  display: inline-block; font-size: 0.6rem; font-weight: 800;
  letter-spacing: 1.5px; text-transform: uppercase;
  color: #64748B; background: #F1F5F9; border-radius: 99px;
  padding: 3px 10px; margin-bottom: 10px;
}
.fact-text { font-size: 0.9rem; color: #334155; line-height: 1.75; margin-bottom: 20px; }
.btn-next {
  width: 100%; padding: 16px;
  background: #1a2e4a; color: #ffd700;
  border: 2px solid #ffd700; border-radius: 14px;
  font-size: 1rem; font-weight: 800; font-family: inherit;
  cursor: pointer; letter-spacing: 0.3px;
  transition: background 0.15s, transform 0.1s;
}
.btn-next:hover { background: #0d1a2e; }
.btn-next:active { transform: scale(0.98); }

/* ── Final screen ── */
.final-inner { text-align: center; padding: 50px 28px 44px; }
.final-em { font-size: 5rem; line-height: 1; margin-bottom: 20px; }
.final-title { font-size: 1.6rem; font-weight: 900; color: #0F172A; margin-bottom: 8px; }
.final-score { font-size: 1rem; color: #64748B; margin-bottom: 30px; line-height: 1.5; }
.btn-restart {
  padding: 16px 40px;
  background: #1a2e4a; color: #ffd700;
  border: 2px solid #ffd700; border-radius: 14px;
  font-size: 1rem; font-weight: 800; font-family: inherit;
  cursor: pointer; letter-spacing: 0.3px;
  transition: background 0.15s, transform 0.1s;
}
.btn-restart:hover { background: #0d1a2e; }
.btn-restart:active { transform: scale(0.98); }
</style>
</head>

<a class="back-link" href="index.html">← Train World</a>

<div class="quiz-wrap">

  <div class="header">
    <div class="header-title">🌍 Trains of the World</div>
    <div class="header-sub">Guess which country each train is from</div>
    <div class="progress-row" id="progressRow"></div>
    <div><span class="score-badge">⭐ <span id="scoreNum">0</span> correct</span></div>
  </div>

  <!-- Question -->
  <div id="screenQ">
    <div class="card">
      <div class="train-img" id="trainImg"></div>
      <div class="q-area">
        <div class="q-text">Which country is this train from?</div>
        <div class="options-grid" id="optGrid"></div>
        <div class="wrong-msg" id="wrongMsg"></div>
        <button class="btn-submit" id="submitBtn" disabled onclick="submitAnswer()">Check answer →</button>
      </div>
    </div>
  </div>

  <!-- Result -->
  <div id="screenR" style="display:none">
    <div class="card">
      <div class="result-banner">
        <div class="result-check">✓</div>
        <div>
          <div class="result-correct">Correct!</div>
          <div class="result-country" id="rCountry"></div>
        </div>
      </div>
      <iframe class="result-map" id="rMap" loading="lazy" title="Map"></iframe>
      <div class="result-body">
        <span class="fact-tag">Fun fact</span>
        <div class="fact-text" id="rBlurb"></div>
        <button class="btn-next" onclick="nextQ()"><span id="nextLbl">Next train →</span></button>
      </div>
    </div>
  </div>

  <!-- Final -->
  <div id="screenF" style="display:none">
    <div class="card">
      <div class="final-inner">
        <div class="final-em" id="fEm"></div>
        <div class="final-title" id="fTitle"></div>
        <div class="final-score" id="fScore"></div>
        <button class="btn-restart" onclick="restart()">Play again →</button>
      </div>
    </div>
  </div>

</div>

      "GO Transit is the massive commuter rail network that connects Toronto to cities all across the Greater Toronto Area! Double-decker trains carry workers from places like Hamilton, Oakville, and Oshawa into the city every morning — some passengers travel over 100 kilometres each way. GO trains are so popular that the network is being expanded to run all-day, every day.",
      "The UP Express — Union Pearson Express — is a dedicated airport train that whisks passengers from downtown Toronto to Pearson International Airport in just 25 minutes! It opened in 2015 and was the first dedicated airport rail link in Canada. Pearson handles over 50 million passengers a year, making it the busiest airport in the whole country.",
      "Toronto's rail network is growing faster than almost any other city in North America! The city is building new subway lines, extending existing ones, and adding light rail routes all at the same time. More people are moving to Toronto every year than almost any other city on the continent, and the trains are racing to keep up with them all!"

      "VIA Rail's flagship route is The Canadian — a legendary four-day journey from Toronto to Vancouver covering 4,466 kilometres! The train winds through the Canadian Shield's ancient granite, across the vast prairies, and finally through the spectacular Rocky Mountains. Passengers sleep in private cabins, eat in a dining car, and watch the whole country roll past through enormous dome windows.",
      "VIA Rail's Quebec City–Windsor corridor is the busiest passenger rail corridor in Canada, connecting Montreal, Ottawa, Toronto, and the cities between them. Trains run so frequently between Montreal and Toronto that many travellers choose the train over flying — no airport security, no baggage fees, and you arrive right in the heart of the city.",

      "Saskatchewan's prairies are so flat and vast that from a CP train you can sometimes see the locomotive at the very front from the back of the train — the track stretches perfectly straight to the horizon for kilometre after kilometre! The prairie landscape made laying track much easier than the mountains, and CP crews once laid over 10 kilometres of new track in a single day across the Saskatchewan plains.",
      "Saskatchewan is one of the greatest grain-growing regions on Earth, and CP Railway is how most of that grain gets to the world! Enormous hopper trains — some over two kilometres long — roll across the prairies loaded with wheat, canola, and lentils destined for ports in Vancouver and Thunder Bay. From there, ships carry Saskatchewan grain to bread bakeries and noodle factories in dozens of countries.",
      "CP Railway transformed Saskatchewan from empty prairie into one of Canada's most important provinces! In the early 1900s, CP actively recruited settlers from Ukraine, Poland, Germany, and Britain, offering cheap land alongside the railway. Hundreds of thousands of immigrants arrived by train, stepping off onto the open prairie to build farms from scratch. Most of Saskatchewan's towns exist today because CP built a station there.",
      "Saskatchewan's iconic grain elevators — tall wooden towers that stand beside railway tracks in almost every small town — were built to load grain directly onto CP trains as quickly as possible. At their peak, there were over 3,000 grain elevators dotting the Saskatchewan prairie, each one a landmark for train crews navigating the vast flat landscape. Today most have been replaced by larger modern facilities, but a few heritage elevators still stand.",
      "CP's main line across Saskatchewan follows almost exactly the same route chosen by surveyors in the 1880s — a remarkably straight path across the southern prairies chosen to avoid the northern forests. Train crews on overnight runs across Saskatchewan in winter sometimes experience temperatures of minus 40 degrees, when metal becomes brittle and even diesel fuel can start to gel. Keeping trains running through a prairie winter is a serious engineering challenge!"

      "Canadian Pacific Railway — CP — was founded in 1881 with one extraordinary mission: build a railway from sea to sea and hold the brand-new country of Canada together! The government promised CP millions of acres of land and millions of dollars to get it done. Without the railway, many historians believe Canada as we know it simply would not exist — the western provinces might have drifted into the United States instead.",
      "CP's route through Quebec passes through the beautiful Eastern Townships — rolling hills, dairy farms, covered bridges, and French-speaking villages that feel quite different from the rest of Canada. Sherbrooke sits right at the heart of this region, and CP trains have rumbled through it for well over a century, connecting Quebec to the rest of the country.",
      "In 2023, CP merged with Kansas City Southern railway to become CPKC — Canadian Pacific Kansas City — creating the first and only single railway to connect Canada, the United States, and Mexico! A train can now travel from the port of Prince Rupert in British Columbia all the way to the port of Lázaro Cárdenas in Mexico without ever changing railways. It's one of the biggest railway mergers in North American history.",
      "Every December, CP runs its famous Holiday Train — a freight train decorated with thousands of twinkling lights and a flatcar stage at the back! The train travels thousands of kilometres across Canada and the United States, stopping in towns along the way for free concerts. At every stop, CP collects food and donations for local food banks. Since 1999, the Holiday Train has raised millions of meals for families in need.",
      "CP's red and white locomotives are one of the most recognisable sights in Canada! The company's colours and beaver logo have been part of the Canadian landscape for over 140 years. CP also operates the Royal Canadian Pacific, a luxury train that takes passengers on private journeys through the Rocky Mountains in restored vintage carriages that once belonged to Canadian railway presidents and royalty."

      "CN's main line through Ontario is one of the busiest freight corridors in all of Canada! Enormous trains loaded with cars, grain, potash, and containers roll through Ontario's cities and farmland around the clock, connecting the port of Halifax on the Atlantic with the ports of Vancouver and Prince Rupert on the Pacific. Ontario sits right in the middle of this incredible coast-to-coast network.",
      "CN is famous for operating some of the longest and most efficiently run freight trains in the world! The company pioneered a system called Precision Scheduled Railroading, which treats freight trains more like airline flights — running on fixed schedules rather than waiting until trains are full. This approach made CN so efficient that railways all over the world copied the idea.",
      "Canadian National Railway played a huge role in opening up northern Canada! CN's lines pushed into remote areas of Ontario, Quebec, and the prairies that had no roads at all, allowing settlers, miners, and loggers to reach places that were previously completely inaccessible. Entire communities in northern Ontario exist today only because CN built a railway line through the wilderness to reach them.",
      "CN runs through the heart of Ontario past some of the most dramatic scenery in Canada — the rugged granite of the Canadian Shield, the shores of the Great Lakes, and endless boreal forest stretching to the horizon. Freight crews on long overnight runs through northern Ontario sometimes see the Northern Lights shimmering above the treeline as their locomotives thunder through the darkness."

      "GO Train coaches are double-deckers — two full levels of seating stacked on top of each other! This clever design means each train can carry far more passengers without needing to be any longer. The upper deck gives riders a brilliant elevated view across the Lake Ontario shoreline, the Toronto skyline, and the flat farmland of southern Ontario rolling past the windows.",
      "The Lakeshore corridor — the GO Train line that hugs the northern shore of Lake Ontario between Oakville and Oshawa — is the busiest commuter rail corridor in all of Canada! During rush hour, trains run so frequently that some stations see a GO Train every few minutes. On the clearest days, passengers can look south across the lake and just make out the shoreline on the other side.",

      "Canada has a train that runs to Churchill, Manitoba — one of the only places in the world where you can watch polar bears from a train window! The route crosses hundreds of kilometres of remote boreal forest and tundra with no roads at all. For the communities along the line, the train is the only land link to the outside world.",
      "The Agawa Canyon Tour Train in northern Ontario takes passengers deep into a wilderness that cannot be reached by road at all! In autumn, the canyon fills with the most spectacular red, orange, and gold colours as the maple and birch trees change. It's one of the best places in the world to see fall foliage — and the only way in is by train.",

      "The Rocky Mountaineer travels only in daylight — the company guarantees passengers won't miss a single moment of the Canadian Rockies scenery! The train stops each evening so passengers sleep in a hotel, then boards again fresh the next morning. Every seat has been designed with the view in mind, and the glass-dome roof lets passengers look straight up at the towering peaks above.",
      "The Rocky Mountaineer passes through the famous Spiral Tunnels near Field, on the Alberta-British Columbia border! These two corkscrew tunnels were drilled through the mountains in 1909 to replace a dangerously steep section of track. When a long train enters a spiral tunnel, passengers at the back can look out the window and see the front of the same train emerging from the mountain above them — a mind-bending sight!",
      "Wildlife sightings from the Rocky Mountaineer are so common that the train carries onboard guides whose whole job is to spot animals and announce them over the speakers! Passengers regularly see grizzly bears, black bears, elk, moose, mountain goats, and bald eagles from their seats. Staff keep a tally of every animal spotted on each journey, and some trips clock up dozens of different species.",
      "The Rocky Mountaineer was born in 1990 after the Canadian government cut VIA Rail's passenger service through the Rockies to save money. A private company stepped in, bought the route, and rebuilt it into one of the most celebrated luxury train journeys on Earth. What was almost lost forever became one of Canada's greatest tourism success stories.",
      "Banff National Park — Canada's oldest national park, established in 1885 — exists largely because of the railway! Canadian Pacific Railway discovered the hot springs at Banff while building the transcontinental line, and the federal government quickly set aside the land to protect it and attract tourists by train. The railway built the famous Banff Springs Hotel in 1888, and the Rocky Mountains became one of the world's great travel destinations."

      "The Pikes Peak Cog Railway climbs to the summit of Pikes Peak — over 4,300 metres above sea level — making it one of the highest railways in North America! The mountain inspired the song 'America the Beautiful' after a poet rode to the top and was so overwhelmed by the view that she wrote the words on the spot.",

      "The Mojave Desert in California is one of the busiest freight railway corridors in all of North America! The BNSF and Union Pacific railways both run parallel tracks through the desert, carrying enormous trains loaded with goods from the ports of Los Angeles and Long Beach — the two busiest ports in America — inland to the rest of the country.",
      "Trains crossing the Mojave Desert face some of the most extreme conditions on the entire American rail network! Summer temperatures regularly soar above 50 degrees Celsius, which can cause the steel rails themselves to expand and buckle. Railway workers monitor the tracks constantly in summer, and trains sometimes have to slow down on the hottest days to keep everyone safe.",
      "The desert crossing was one of the most challenging stretches of the famous 1860s railway building era. Workers had to haul water, food, and all their supplies across vast waterless distances. Some sections of the Mojave had no water source for over 100 kilometres — every drop needed by the steam locomotives had to be brought in by train from elsewhere.",
      "Some of the longest freight trains in the world roll through the Mojave Desert! Double-stack container trains — where shipping containers are stacked two high — can stretch for over three kilometres and carry the equivalent of hundreds of lorry loads in a single journey. Watching one pass a desert crossing can take several minutes from first locomotive to last wagon.",
      "The Mojave Desert is also home to some of America's most historic railway ghost towns — settlements that sprang up as railway depots and water stops in the 1800s but were abandoned when steam locomotives were replaced by diesel engines that didn't need to stop for water every hundred kilometres. The desert has preserved many of these ghost stations almost perfectly.",
      "BNSF — Burlington Northern Santa Fe — is one of the largest freight railways in all of North America, operating over 32,000 kilometres of track across 28 US states and two Canadian provinces! It was formed in 1995 when two great railways merged, combining the old Santa Fe route through the Mojave with the Burlington Northern's vast northern network. Its famous orange and black locomotives are a familiar sight across the American West.",
      "BNSF's route through the Mojave Desert is part of its famous Transcon — short for Transcontinental — one of the single busiest freight railway corridors on Earth! Up to 100 trains a day thunder along this stretch of desert, carrying goods from the giant ports of Los Angeles to cities across America. BNSF moves more cargo by weight than any airline in the world — all on the ground, by train!"

      "Charlotte's LYNX Blue Line light rail is one of the fastest-growing transit systems in the United States! It runs from the university in the north all the way through downtown and into the southern suburbs, and ridership has grown so fast that the city keeps extending it further. Trains run so frequently that many riders don't even check the timetable — they just show up and wait.",
      "The Carolinian and Piedmont Amtrak trains connect Charlotte to Raleigh and on to New York City, following railway corridors that have carried passengers through the Carolinas for over 150 years. The journey north passes through tobacco farmland, historic small towns, and the rolling foothills of the Appalachian Mountains.",
      "Charlotte is one of the biggest freight railway hubs in the southeastern United States! Two of America's largest freight companies — Norfolk Southern and CSX — run major lines through the city. Enormous trains loaded with cars, timber, and manufactured goods roll through Charlotte around the clock, connecting the Carolinas to the rest of the continent.",

      "Atlanta, Georgia is one of the most important railway cities in all of America! Two of the biggest freight railway companies in the country — CSX and Norfolk Southern — have their headquarters there. Hundreds of freight trains pass through Georgia every single day carrying cars, food, chemicals, and coal across the entire eastern United States.",

      "Savannah, Georgia's beautiful coastal city, became one of the most important railway and port cities in the American South. Cotton and goods from across Georgia were carried by train to Savannah's harbour, then loaded onto ships heading all around the world. The railway made Savannah incredibly wealthy in the 1800s.",
      "Atlanta's MARTA rapid transit system carries hundreds of thousands of passengers every day through tunnels under the city and elevated tracks above the streets. One of its lines runs directly to Atlanta's international airport — one of the busiest airports on Earth — so travellers can jump straight from the plane onto a train into the city!"

      "Goa's main railway station is called Vasco da Gama, named after the famous Portuguese explorer who sailed to India over 500 years ago! Goa was a Portuguese colony for 450 years — longer than most countries in the world were ever colonised — and echoes of that history are woven into everything, including the railway station names.",
      "The train journey into Goa crosses the wide Zuari and Mandovi rivers on long railway bridges, with views of fishing boats, mangrove forests, and golden beaches stretching out to the Arabian Sea. Arriving in Goa by train gives passengers one of the most beautiful approaches to any destination in all of India.",
      "During Goa's busy tourist season, special trains run from cities all across India bringing visitors to the beaches. Some trains travel over 2,000 kilometres — from as far away as Delhi and Kolkata — taking passengers on overnight journeys through forests, mountains, and rice paddies before arriving at the seaside.",
      "The Konkan Railway passes through some of the most biodiverse forest in all of Asia — the Western Ghats are a UNESCO World Heritage Site and home to tigers, leopards, elephants, and hundreds of species found nowhere else on Earth. Passengers on night trains sometimes glimpse animals at the forest edge in the beam of the locomotive's headlight!"

      "Puducherry — also called Pondicherry — is a tiny seaside territory on India's southeastern coast that was a French colony for over 300 years! Its railway station is a charming heritage building, and the town still has French-style boulevards running alongside the Indian railway tracks. It's one of the most unique places to arrive by train in all of India.",
      "The train journey along India's southeastern coast to Puducherry passes through lush green rice paddies, coconut palm groves, and fishing villages right beside the Bay of Bengal. It's one of the most beautiful coastal rail routes in southern India, and local passengers often travel with baskets of freshly caught fish!",
      "Puducherry sits on the Villupuram–Puducherry branch railway line, a route that has been carrying passengers since the 1870s during the British colonial era. The line is only about 36 kilometres long — one of the shorter branch lines in India — but it connects the territory to the great Indian rail network beyond.",
      "Southern India has some of the most colourful and lively railway stations anywhere in the world! Vendors sell fresh coconut water, jasmine garlands, and hot spiced chai right on the platforms. Trains arriving in this part of India are always full of colour, noise, and amazing smells from the food stalls.",
      "The Nilgiri Mountain Railway, not far from Puducherry, is one of India's UNESCO World Heritage railways. It uses a special cog system to climb steep mountain slopes, just like Switzerland's mountain trains! The little blue train chugs through tea plantations and misty forests all the way up into the cool Nilgiri Hills."

      "San Francisco's famous cable cars are a type of train — and they've been climbing the city's steep hills since 1873! Instead of an engine, they grip onto a moving underground cable that never stops running beneath the street. They're the last manually operated cable car system in the entire world and are a National Historic Landmark.",
      "The Pacific Surfliner is one of the most scenic train routes in America, running along the California coast between San Luis Obispo and San Diego. For long stretches, the train travels right along the edge of the Pacific Ocean — passengers can watch surfers, dolphins, and crashing waves from their seats!",
      "California is building a brand-new high-speed railway that will eventually connect Los Angeles and San Francisco in under three hours! The route runs through the middle of California's Central Valley, one of the most important farming regions in the world. When it's finished, it will be the first true high-speed rail line in the United States.",
      "The Bay Area Rapid Transit — known as BART — opened in 1972 and was one of the most futuristic railways in the world at the time. Part of it runs under San Francisco Bay in a tunnel beneath the water! BART now carries over 400,000 passengers a day across the greater San Francisco area."

      "Poland sits right at the crossroads of Europe, and its railways connect the continent from east to west! Trains from Paris, Berlin, and Vienna all pass through Poland on their way to Moscow, Kyiv, and beyond. Warsaw's central station is one of the busiest international railway hubs in all of eastern Europe, with trains arriving from a dozen different countries every day.",
      "Poland introduced its Pendolino high-speed trains in 2014, cutting journey times dramatically across the country. The Pendolino tilts as it goes around bends — just like a motorcycle leaning into a corner — so passengers barely feel the curves. Warsaw to Kraków, a distance of nearly 300 kilometres, now takes just over two hours.",
      "Kraków's beautiful main railway station sits right next to the medieval Old Town, a UNESCO World Heritage Site. Stepping off the train, passengers walk straight into one of the best-preserved medieval city centres in all of Europe — with a 13th-century market square, a royal castle, and cobbled streets that have barely changed in 700 years.",
      "Poland's railways played an enormous role in connecting the country after it was reunified in 1918, having been divided between three different empires for 123 years! Each empire had built railways to different standards, so Polish engineers had the huge task of connecting three incompatible railway networks into one working system — an incredible feat of organisation.",
      "Warsaw has one of the most extensive tram networks in Europe, with over 250 kilometres of track weaving through the city! The trams survived the almost total destruction of Warsaw in World War II and were rebuilt along with the city. Today Warsaw's bright yellow trams are as iconic a part of the city as its reconstructed Old Town."

      "Russia is home to the longest railway in the entire world — the Trans-Siberian Railway! It stretches 9,289 kilometres from Moscow all the way to Vladivostok on the Pacific Ocean. The full journey takes about six days and nights, crossing eight different time zones. That means by the time you arrive, it's a completely different time of day than when you left!",
      "The Moscow Metro is famous for being one of the most beautiful underground railways anywhere on Earth! Many of its stations look like grand palaces, with marble columns, glittering chandeliers, and enormous mosaic artworks covering the walls and ceilings. Soviet architects wanted the metro to feel like a 'palace for the people' — and they certainly delivered!",
      "Building the Trans-Siberian Railway was one of the greatest construction projects in human history. Workers had to lay tracks across frozen Siberian tundra, dense taiga forest, and the shores of Lake Baikal — the world's deepest lake. At one point, trains were loaded onto ferries and floated across the lake because the lakeside cliffs were too steep to build through!",
      "The Circum-Baikal Railway hugs the southern shore of Lake Baikal for 89 kilometres, passing through 38 tunnels and over 470 bridges and viaducts. Lake Baikal holds more fresh water than all of North America's Great Lakes combined! The railway was once the only link in the entire Trans-Siberian route, making it one of the most important stretches of track ever built.",
      "Russia's railways use a wider track gauge than most of Europe — a deliberate choice made in the 1800s so that foreign trains couldn't simply roll in and be used by an invading army! This means that at Russia's borders, trains have to stop and have their wheels swapped out, or passengers change to a different train — a fascinating quirk of railway history that still exists today."

      "Ohio sits right at the crossroads of America's eastern railway network, and CSX trains roll through it constantly! The state connects the industrial Midwest to the ports and cities of the East Coast, and freight trains carrying steel, coal, cars, and chemicals thunder through Ohio towns around the clock. More railway track passes through Ohio than almost any other state in America.",
      "CSX's famous National Gateway corridor runs right through Ohio, linking the massive port of Baltimore on the Atlantic coast to the heart of the Midwest! CSX spent billions of dollars raising tunnel heights and upgrading bridges along this route so that double-stack container trains — with shipping containers stacked two high — could pass through without scraping the top. It was one of the biggest freight railway investments in American history.",
      "Ohio was the birthplace of some of America's greatest railway pioneers! The state produced inventors, engineers, and businessmen who shaped the railway industry across the entire country. Ohio's central location meant that nearly every major east-west railway line passed through it, making cities like Cleveland, Columbus, and Cincinnati into some of the most important railway hubs in 19th century America.",
      "The city of Fostoria in northwestern Ohio is known as the 'Iron Triangle' — the point where three major CSX lines cross each other! Train spotters travel from all over America to watch the constant parade of freight trains passing through, sometimes seeing over 100 trains in a single day. It's one of the busiest freight railway intersections anywhere in the United States.",
      "Ohio's industrial history is deeply tied to its railways. The steel mills of Cleveland, the rubber factories of Akron, and the car plants of Toledo all relied on CSX and its predecessor railways to bring in raw materials and ship out finished goods. Without the railways threading through Ohio's cities and towns, the great American industrial boom of the 1900s simply could not have happened."

      "Harpers Ferry in West Virginia is one of the most historically important railway locations in all of America! The Baltimore and Ohio Railroad — one of the very first railways in the United States — crossed the Potomac River here in the 1830s. The bridge at Harpers Ferry sits at the dramatic meeting point of the Potomac and Shenandoah rivers, surrounded by steep cliffs and forested hills.",
      "CSX — the railway whose trains roll through Harpers Ferry today — is one of the largest freight railways in the eastern United States! It operates over 32,000 kilometres of track connecting cities and ports from Miami to Montreal. CSX trains carry coal, chemicals, cars, and containers through some of the most historic landscapes in America, including the beautiful Shenandoah Valley.",
      "The railway at Harpers Ferry was so strategically important during the American Civil War that both sides fought fiercely to control it! Whoever held the bridge controlled the movement of troops and supplies across the Potomac River. The bridge was destroyed and rebuilt multiple times during the war — armies raced to blow it up or repair it depending on which direction the fighting was going.",
      "CSX is famous for its fuel efficiency — one CSX train can move a tonne of freight over 700 kilometres on just one litre of fuel! That makes trains roughly four times more fuel-efficient than lorries on the highway. CSX calculates that its network keeps millions of lorry journeys off American roads every single year, reducing traffic and cutting pollution across the eastern United States.",
      "The B&O Railroad Museum in nearby Baltimore preserves the incredible history of the Baltimore and Ohio Railroad — the line that first passed through Harpers Ferry. The museum houses some of the oldest surviving locomotives in America, including engines that were already antiques before the Civil War began. It sits inside the original 1884 roundhouse where locomotives were once repaired and serviced."

      "Union Pacific is one of the oldest and most iconic railways in American history! It was founded in 1862 by President Abraham Lincoln himself, who signed the law creating it during the Civil War. Union Pacific built westward from Omaha, Nebraska while the Central Pacific built eastward from California — and the two lines famously met in Utah in 1869 to complete the first Transcontinental Railroad.",
      "Union Pacific's Big Boy locomotives are the largest steam engines ever built — anywhere on Earth! These enormous machines were constructed in the 1940s to haul heavy freight over the Rocky Mountains in Wyoming. Each one weighed over 540 tonnes and stretched nearly 40 metres long. Union Pacific has restored several Big Boys to working order and they still appear at special events today, drawing enormous crowds wherever they go.",
      "Union Pacific's headquarters has been in Omaha, Nebraska since the very beginning — over 160 years ago! Omaha grew from a frontier settlement into a major city largely because it was chosen as the starting point of the Transcontinental Railroad. Today Union Pacific operates over 32,000 kilometres of track across 23 American states, and its yellow and grey locomotives are one of the most recognised sights in the American West.",
      "Union Pacific's route over Sherman Hill in Wyoming climbs to over 2,400 metres above sea level — one of the highest points on the entire American rail network! In winter, powerful snow blowers and flangers work around the clock to keep the tracks clear. Trains sometimes need three or four locomotives just to push through the deep Wyoming snowdrifts and freezing mountain winds.",
      "Every single day, Union Pacific moves enough freight to fill over 500,000 lorries — taking an enormous number of trucks off America's highways! The railway carries coal, grain, chemicals, cars, and container loads of imported goods from Pacific ports. Moving cargo by train uses far less fuel than by lorry, making Union Pacific one of the more environmentally friendly ways to shift goods across a continent."

      "The Boone & Scenic Valley Railroad in Iowa is one of America's most beloved heritage steam railways! It runs through the gorgeous Des Moines River valley, crossing high above the river on a dramatic trestle bridge. The little steam train puffs through forests and farmland that look almost exactly as they did a hundred years ago, when steam locomotives ruled the American countryside.",
      "Here's something surprising — the steam locomotives at the Boone & Scenic Valley Railroad were built in China! After American railways switched to diesel engines, China continued building steam locomotives for decades longer. The Boone railroad bought Chinese-built JS class steam engines, making them some of the last traditionally built steam locomotives still running in the United States.",
      "Near Boone, Iowa, a young girl named Kate Shelley became one of the greatest heroes in American railway history! In 1881, during a ferocious storm, 15-year-old Kate heard a railroad bridge collapse nearby. She crawled alone across a damaged bridge in the dark and pouring rain to warn the station — saving a passenger train full of people from disaster. A bridge near Boone is named the Kate Shelley High Bridge in her honour.",
      "The Kate Shelley High Bridge near Boone was once the highest double-track railroad bridge in the entire United States! It towers over 60 metres above the Des Moines River — taller than a 20-storey building. When freight trains cross it, passengers below can look straight up at the enormous steel structure carrying thousands of tonnes of train high overhead.",
      "Iowa might seem like a quiet farming state, but it sits right at the heart of America's freight railway network! Enormous trains carrying corn, soybeans, and ethanol roll across Iowa every single day, feeding people and fuelling cars all across the country. The railways helped transform Iowa's rich prairie soil into one of the most productive farming regions on the entire planet."

    blurbs: [
      "Panama was home to the very first transcontinental railway in all of the Americas! The Panama Railway opened in 1855, cutting across the narrow isthmus to connect the Atlantic and Pacific oceans by rail for the first time ever. It was built during the California Gold Rush to carry thousands of fortune-seekers from the east coast of America to the west — years before any railway crossed North America.",
      "The Panama Railway runs right alongside one of the greatest engineering wonders of the world — the Panama Canal! Passengers on the train can watch enormous container ships from all over the world travelling through the canal locks just metres away, being lifted and lowered between the Atlantic and Pacific oceans. It's one of the most extraordinary views from any train window anywhere on Earth.",
      "Building the original Panama Railway in the early 1850s was one of the deadliest construction projects in history. The jungle heat, disease, and swamps were so brutal that it's said a worker died for every railway tie laid — though the true number was in the thousands. Despite the terrible conditions, it was completed in just five years and immediately became one of the most profitable railways ever built.",
      "At its peak in the 1850s and 60s, the Panama Railway was the busiest and most valuable stretch of railway per kilometre in the entire world! It charged passengers enormous fares because it was the only reliable route between the Atlantic and Pacific, and ships from all over the world sent their cargo across by train rather than sailing all the way around the tip of South America.",
      "Today the Panama Canal Railway still carries both passengers and freight across the isthmus in just one hour! A journey that once took days by mule track or weeks by sea now takes 60 minutes by train. The route passes through tropical rainforest, across Gatun Lake — an enormous artificial lake created to supply the canal — and through some of the most biodiverse jungle in the western hemisphere."
    ]

      "Italy's Frecciarossa — which means 'Red Arrow' — is one of the fastest and most stylish trains in Europe! It rockets between Rome and Milan in just under three hours, covering nearly 600 kilometres. The trains are bright red and sleek, with a first class so luxurious that passengers are served restaurant-quality meals at their seats as the Italian countryside flashes past the windows.",
      "Arriving in Venice by train is one of the most magical experiences in all of Europe! The railway crosses a long causeway built over the lagoon, and as the train reaches the end, the ancient city of Venice suddenly appears rising out of the water — no roads, no cars, just canals and centuries-old buildings. Venice's Santa Lucia station is the only place in the world where you step off a train and straight onto a boat!",
      "The Cinque Terre railway runs along one of the most dramatic coastlines in the world, threading through five tiny clifftop villages on the Ligurian Sea! The villages are so steep and rocky that the train is the main way residents get around — the railway is literally carved into the cliffside, popping in and out of tunnels with flashes of turquoise sea between them.",
      "Building a metro in Rome is one of the hardest jobs in the world — because wherever workers dig, they find ancient Roman ruins! Construction of Rome's underground has been halted dozens of times over the decades when diggers uncovered mosaics, temples, and even an entire ancient street. Rome's metro is one of the smallest of any major European capital, entirely because of what lies beneath!",
      "Italy opened its very first railway in 1839, running between Naples and the royal palace at Portici — just 7 kilometres long! King Ferdinand II of the Two Sicilies rode it on opening day and was reportedly terrified by the speed. Within a few decades, railways had spread across the whole Italian peninsula, helping to unite the country for the first time in its history."

      "Ferromex — short for Ferrocarril Mexicano — is the largest freight railway in all of Mexico! It operates over 8,000 kilometres of track across the country, hauling everything from cars and steel to grain and minerals. Ferromex's powerful locomotives are a common sight rumbling through the state of Jalisco, connecting central Mexico to the border with the United States.",
      "Jalisco's capital, Guadalajara, is one of the most important railway junctions in all of Mexico! Rail lines from Mexico City, the Pacific coast ports, and the northern border all converge here, making it a crucial hub for moving goods across the country. Guadalajara is Mexico's second-largest city, and its railways have helped it grow into a major industrial and tech centre.",

let gameQ = [], cur = 0, score = 0, selectedOpt = null;

function speak(text) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.rate = 0.88; u.pitch = 1.05;
  window.speechSynthesis.speak(u);
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function buildProgress() {
  document.getElementById('progressRow').innerHTML = gameQ.map((_, i) => {
    const c = i < cur ? 'done' : i === cur ? 'current' : '';
    return `<div class="pdot ${c}"></div>`;
  }).join('');
}

function playCorrectSound() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    [523.25, 659.25, 783.99].forEach((freq, i) => {
      const osc  = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.type = 'sine';
      osc.frequency.value = freq;
      const t = ctx.currentTime + i * 0.13;
      gain.gain.setValueAtTime(0, t);
      gain.gain.linearRampToValueAtTime(0.22, t + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.55);
      osc.start(t);
      osc.stop(t + 0.55);
    });
  } catch(e) {}
}

function celebrate() {
  const el = document.createElement('div');
  el.className = 'celebrate';
  const emojis = ['⭐','🌟','✨','🎉','🎊','🏆','💫'];
  for (let i = 0; i < 22; i++) {
    const em = document.createElement('div');
    em.className = 'burst-em';
    em.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    const angle = (Math.random() * 360) * (Math.PI / 180);
    const dist  = 80 + Math.random() * 180;
    em.style.cssText = `
      --tx: ${Math.cos(angle) * dist}px;
      --ty: ${Math.sin(angle) * dist}px;
      --r:  ${Math.random() * 720 - 360}deg;
      animation-delay: ${Math.random() * 0.15}s;
      font-size: ${1.2 + Math.random() * 1.5}rem;
    `;
    el.appendChild(em);
  }
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1400);
}

function startQ(idx) {
  const q = gameQ[idx];
  const shuffledOpts = shuffle(q.options);

  document.getElementById('screenQ').style.display = 'block';
  document.getElementById('screenR').style.display = 'none';
  document.getElementById('screenF').style.display = 'none';
  document.getElementById('wrongMsg').textContent = '';
  document.getElementById('scoreNum').textContent = score;
  selectedOpt = null;
  document.getElementById('submitBtn').disabled = true;
  buildProgress();

  const img = document.getElementById('trainImg');
  if (q.image) {
    img.innerHTML = `<img src="${q.image}" alt="${q.country} train" style="object-position:${q.imgPosition||'center'}">`;
    img.style.background = '';
  } else {
    img.style.background = q.bg;
    img.innerHTML = `<div class="ph-box"><div class="ph-emoji">${q.emoji}</div><div class="ph-label">${q.label}</div></div>`;
  }

  document.getElementById('optGrid').innerHTML = shuffledOpts.map((opt, i) =>
    `<button class="opt c${i}" data-val="${opt}" onclick="selectOpt(this)">${opt}</button>`
  ).join('');
}

function selectOpt(btn) {
  if (btn.disabled) return;
  document.querySelectorAll('.opt').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  selectedOpt = btn;
  speak(btn.dataset.val);
  document.getElementById('submitBtn').disabled = false;
}

function submitAnswer() {
  if (!selectedOpt) return;
  const btn = selectedOpt;
  const val = btn.dataset.val;
  const q   = gameQ[cur];
  document.getElementById('submitBtn').disabled = true;

  if (val === q.country) {
    btn.classList.remove('selected');
    btn.classList.add('correct');
    document.querySelectorAll('.opt').forEach(b => { if (b !== btn) b.disabled = true; });
    score++;
    document.getElementById('scoreNum').textContent = score;
    playCorrectSound();
    celebrate();
    setTimeout(() => showResult(q), 950);
  } else {
    btn.classList.add('wrong');
    setTimeout(() => {
      btn.classList.remove('wrong', 'selected');
      btn.disabled = true;
      selectedOpt = null;
    }, 600);
    const msg = document.getElementById('wrongMsg');
    msg.textContent = 'Not quite — try again!';
    setTimeout(() => { if (msg.textContent.startsWith('Not')) msg.textContent = ''; }, 1800);
  }
}

function showResult(q) {
  document.getElementById('screenQ').style.display = 'none';
  document.getElementById('screenR').style.display = 'block';
  document.getElementById('rCountry').textContent = q.country;
  document.getElementById('rMap').src =
    `https://www.openstreetmap.org/export/embed.html?bbox=${q.bbox}&layer=mapnik&marker=${q.marker}`;

  const blurb = q.blurbs[Math.floor(Math.random() * q.blurbs.length)];
  document.getElementById('rBlurb').textContent = blurb;
  document.getElementById('nextLbl').textContent =
    cur === gameQ.length - 1 ? 'See my score →' : 'Next train →';
  buildProgress();
  setTimeout(() => speak(blurb), 700);
}

function nextQ() {
  window.speechSynthesis && window.speechSynthesis.cancel();
  if (cur === gameQ.length - 1) showFinal();
  else { cur++; startQ(cur); }
}

function showFinal() {
  document.getElementById('screenR').style.display = 'none';
  document.getElementById('screenF').style.display = 'block';
  const pct = score / gameQ.length;
  const [em, title] =
    pct === 1  ? ['🏆', 'Perfect score!']  :
    pct >= 0.8 ? ['⭐', 'Amazing job!']     :
    pct >= 0.6 ? ['👍', 'Great effort!']    :
                 ['🚂', 'Keep exploring!'];
  document.getElementById('fEm').textContent = em;
  document.getElementById('fTitle').textContent = title;
  document.getElementById('fScore').textContent = `You got ${score} out of ${gameQ.length} right!`;
  setTimeout(() => speak(`${title} You got ${score} out of ${gameQ.length} right!`), 300);
}

function restart() {
  cur = 0; score = 0;
  window.speechSynthesis && window.speechSynthesis.cancel();
  gameQ = shuffle(QUESTIONS).slice(0, 5);
  startQ(0);
}

// Start
gameQ = shuffle(QUESTIONS).slice(0, 5);
startQ(0);
</script>
