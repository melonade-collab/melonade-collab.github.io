<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trains of the World Quiz</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: linear-gradient(160deg, #0d1a2e 0%, #1a2e4a 50%, #0a1218 100%);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 16px 16px 48px;
}

.back-link {
  position: fixed;
  top: 12px; left: 14px;
  font-size: 0.7rem;
  color: #aaa;
  text-decoration: none;
  background: rgba(0,0,0,0.55);
  border: 1px solid #444;
  padding: 4px 9px;
  z-index: 200;
  border-radius: 4px;
}

.quiz-wrap {
  width: 100%;
  max-width: 500px;
  margin-top: 48px;
}

/* ── Header ── */
.header { text-align: center; margin-bottom: 18px; }
.header-title {
  font-size: 1.75rem;
  font-weight: 900;
  color: #ffd700;
  letter-spacing: 1px;
  text-shadow: 2px 2px 0 #6a4a00;
}
.header-sub { font-size: 0.82rem; color: rgba(255,255,255,0.45); margin-top: 3px; }
.progress-row {
  display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 14px;
}
.pdot {
  width: 10px; height: 10px; border-radius: 50%;
  background: rgba(255,255,255,0.18);
  transition: background 0.3s, transform 0.2s;
}
.pdot.done { background: #4ade80; }
.pdot.current { background: #ffd700; transform: scale(1.2); }
.score-badge {
  display: inline-flex; align-items: center; gap: 5px;
  background: rgba(255,215,0,0.1);
  border: 1px solid rgba(255,215,0,0.25);
  border-radius: 99px; padding: 4px 14px;
  font-size: 0.78rem; font-weight: 700; color: #ffd700; margin-top: 10px;
}

/* ── Card ── */
.card {
  background: #fff; border-radius: 24px; overflow: hidden;
  box-shadow: 0 12px 48px rgba(0,0,0,0.45);
}

/* ── Train image ── */
.train-img {
  width: 100%; aspect-ratio: 16 / 9;
  overflow: hidden; position: relative;
  display: flex; align-items: center; justify-content: center; flex-direction: column;
}
.train-img img { width: 100%; height: 100%; object-fit: cover; display: block; }
.ph-box {
  width: 100%; height: 100%;
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px;
}
.ph-emoji { font-size: 5rem; line-height: 1; filter: drop-shadow(0 2px 8px rgba(0,0,0,0.2)); }
.ph-label {
  font-size: 0.72rem; font-weight: 700; color: rgba(255,255,255,0.8);
  letter-spacing: 1px; text-transform: uppercase; text-shadow: 0 1px 4px rgba(0,0,0,0.3);
}

/* ── Question area ── */
.q-area { padding: 22px 20px 24px; }
.q-text {
  font-size: 1.1rem; font-weight: 800; color: #0F172A;
  text-align: center; margin-bottom: 18px; line-height: 1.35;
}

/* ── Option buttons ── */
.options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.opt {
  padding: 18px 12px; border-radius: 16px; border: none;
  font-size: 1rem; font-weight: 800; font-family: inherit;
  cursor: pointer; color: #fff; text-align: center; line-height: 1.25;
  box-shadow: 0 3px 10px rgba(0,0,0,0.15);
  transition: transform 0.12s, box-shadow 0.12s;
}
.opt:active:not(:disabled) { transform: scale(0.94); box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
.opt.c0 { background: #EF4444; }
.opt.c1 { background: #3B82F6; }
.opt.c2 { background: #10B981; }
.opt.c3 { background: #F59E0B; }
.opt.correct {
  background: #16A34A !important;
  box-shadow: 0 0 0 4px #BBF7D0, 0 3px 10px rgba(0,0,0,0.15) !important;
  transform: scale(1.03) !important;
}
.opt.wrong {
  background: #991B1B !important;
  animation: shake 0.42s ease;
  box-shadow: 0 0 0 3px #FCA5A5 !important;
}
.opt:disabled { opacity: 0.32; cursor: default; }

@keyframes shake {
  0%,100% { transform: translateX(0); }
  20% { transform: translateX(-8px); }
  40% { transform: translateX(8px); }
  60% { transform: translateX(-5px); }
  80% { transform: translateX(5px); }
}

.wrong-msg {
  text-align: center; font-size: 0.82rem; font-weight: 700;
  color: #DC2626; margin-top: 12px; min-height: 18px;
}

/* ── Celebration overlay ── */
.celebrate {
  position: fixed; inset: 0; pointer-events: none; z-index: 999;
  display: flex; align-items: center; justify-content: center;
}
.burst-em {
  position: absolute; font-size: 2rem;
  animation: burstFly 1.1s cubic-bezier(0.22,1,0.36,1) forwards;
}
@keyframes burstFly {
  0%   { transform: translate(0,0) scale(0) rotate(0deg); opacity: 1; }
  40%  { opacity: 1; }
  100% { transform: translate(var(--tx), var(--ty)) scale(0.5) rotate(var(--r)); opacity: 0; }
}

/* ── Result screen ── */
.result-banner {
  background: linear-gradient(135deg, #16A34A, #15803D);
  padding: 20px 22px; display: flex; align-items: center; gap: 14px;
}
.result-check {
  width: 44px; height: 44px;
  background: rgba(255,255,255,0.2); border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.4rem; flex-shrink: 0;
}
.result-correct { font-size: 1.2rem; font-weight: 900; color: #fff; }
.result-country { font-size: 0.82rem; color: rgba(255,255,255,0.8); margin-top: 3px; }
.result-map { width: 100%; height: 220px; border: none; display: block; }
.result-body { padding: 18px 20px 22px; }
.fact-tag {
  display: inline-block; font-size: 0.6rem; font-weight: 800;
  letter-spacing: 1.5px; text-transform: uppercase;
  color: #64748B; background: #F1F5F9; border-radius: 99px;
  padding: 3px 10px; margin-bottom: 10px;
}
.fact-text { font-size: 0.9rem; color: #334155; line-height: 1.75; margin-bottom: 20px; }
.btn-next {
  width: 100%; padding: 16px;
  background: #1a2e4a; color: #ffd700;
  border: 2px solid #ffd700; border-radius: 14px;
  font-size: 1rem; font-weight: 800; font-family: inherit;
  cursor: pointer; letter-spacing: 0.3px;
  transition: background 0.15s, transform 0.1s;
}
.btn-next:hover { background: #0d1a2e; }
.btn-next:active { transform: scale(0.98); }

/* ── Final screen ── */
.final-inner { text-align: center; padding: 50px 28px 44px; }
.final-em { font-size: 5rem; line-height: 1; margin-bottom: 20px; }
.final-title { font-size: 1.6rem; font-weight: 900; color: #0F172A; margin-bottom: 8px; }
.final-score { font-size: 1rem; color: #64748B; margin-bottom: 30px; line-height: 1.5; }
.btn-restart {
  padding: 16px 40px;
  background: #1a2e4a; color: #ffd700;
  border: 2px solid #ffd700; border-radius: 14px;
  font-size: 1rem; font-weight: 800; font-family: inherit;
  cursor: pointer; letter-spacing: 0.3px;
  transition: background 0.15s, transform 0.1s;
}
.btn-restart:hover { background: #0d1a2e; }
.btn-restart:active { transform: scale(0.98); }
</style>
</head>
<body>

<a class="back-link" href="index.html">← Train World</a>

<div class="quiz-wrap">

  <div class="header">
    <div class="header-title">🌍 Trains of the World</div>
    <div class="header-sub">Guess which country each train is from</div>
    <div class="progress-row" id="progressRow"></div>
    <div><span class="score-badge">⭐ <span id="scoreNum">0</span> correct</span></div>
  </div>

  <!-- Question -->
  <div id="screenQ">
    <div class="card">
      <div class="train-img" id="trainImg"></div>
      <div class="q-area">
        <div class="q-text">Which country is this train from?</div>
        <div class="options-grid" id="optGrid"></div>
        <div class="wrong-msg" id="wrongMsg"></div>
      </div>
    </div>
  </div>

  <!-- Result -->
  <div id="screenR" style="display:none">
    <div class="card">
      <div class="result-banner">
        <div class="result-check">✓</div>
        <div>
          <div class="result-correct">Correct!</div>
          <div class="result-country" id="rCountry"></div>
        </div>
      </div>
      <iframe class="result-map" id="rMap" loading="lazy" title="Map"></iframe>
      <div class="result-body">
        <span class="fact-tag">Fun fact</span>
        <div class="fact-text" id="rBlurb"></div>
        <button class="btn-next" onclick="nextQ()"><span id="nextLbl">Next train →</span></button>
      </div>
    </div>
  </div>

  <!-- Final -->
  <div id="screenF" style="display:none">
    <div class="card">
      <div class="final-inner">
        <div class="final-em" id="fEm"></div>
        <div class="final-title" id="fTitle"></div>
        <div class="final-score" id="fScore"></div>
        <button class="btn-restart" onclick="restart()">Play again →</button>
      </div>
    </div>
  </div>

</div>

<script>
const QUESTIONS = [
  {
    country: 'Japan',
    emoji: '🚄',
    bg: 'linear-gradient(160deg, #B91C1C 0%, #7F1D1D 100%)',
    label: 'Shinkansen · Japan',
    // image: 'images/japan-shinkansen.jpg',
    options: ['Japan', 'China', 'South Korea', 'France'],
    bbox: '128.0,30.0,147.0,46.0', marker: '35.68,139.69',
    blurbs: [
      "Japan's Shinkansen bullet trains are famous for being incredibly fast and always on time! The first Shinkansen opened in 1964, just before the Tokyo Olympics. These trains zoom at over 320 kilometres per hour — fast enough to cross the whole of England in under an hour!",
      "The Shinkansen has carried over 10 billion passengers since it opened in 1964, and in all that time there has never been a single passenger fatality from a crash! Japan's bullet trains are not just fast — they're extraordinarily safe.",
      "Japan's trains are so punctual that if one arrives more than a minute late, the train company gives passengers a certificate explaining why! The average Shinkansen delay is just 36 seconds across the whole year.",
      "Japan's newest Maglev trains use magnets to float above the track — they don't even touch the rails! During a test run, one reached 603 kilometres per hour. That's faster than a small aircraft taking off!",
      "You can travel between Tokyo and Osaka — nearly 500 kilometres — in just two and a half hours on the Shinkansen. That's the same distance as flying from London to Edinburgh, but the train drops you right in the city centre!"
    ]
  },
  {
    country: 'France',
    emoji: '🚂',
    bg: 'linear-gradient(160deg, #1D4ED8 0%, #1E3A8A 100%)',
    label: 'TGV · France',
    // image: 'images/france-tgv.jpg',
    options: ['Germany', 'France', 'Spain', 'Italy'],
    bbox: '-5.0,41.0,10.0,52.0', marker: '48.85,2.35',
    blurbs: [
      "France's TGV stands for Train à Grande Vitesse, which means 'very fast train'! France has such a brilliant rail network that you can travel from Paris to Lyon — over 400 kilometres away — in just two hours. Trains are a huge part of everyday life in France.",
      "In 2007, a French TGV set a world speed record on conventional rail tracks, reaching 574 kilometres per hour during a special test run! The drivers wore special suits and helmets, just like racing car drivers, for the big occasion.",
      "France built its first high-speed railway in 1981 between Paris and Lyon. It was such a success that France now has over 2,700 kilometres of high-speed rail connecting cities all across the country.",
      "You can board a train in Paris and arrive in London in just over two hours — travelling under the English Channel the whole way through the Channel Tunnel! The tunnel is 50 kilometres long and sits under the sea.",
      "Paris's Gare du Nord is the busiest railway station in Europe, with over 700,000 passengers every single day! That's more people than live in the entire city of Edmonton passing through one station."
    ]
  },
  {
    country: 'Germany',
    image: 'https://images.unsplash.com/photo-1527295110-5145f6b148d0?q=80&w=1131&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D',
    options: ['Germany', 'Austria', 'Belgium', 'Netherlands'],
    bbox: '5.9,47.3,15.1,55.1', marker: '51.16,10.45',
    blurbs: [
      "Germany's ICE trains — which stands for InterCityExpress — are some of the fastest and smoothest in Europe! Germany has over 33,000 kilometres of railway, one of the biggest rail networks in the world, and over 40,000 trains run across it every single day.",
      "Germany invented the world's first electric railway! In 1881, the very first electric tram opened in Berlin. Germany has been a railway pioneer ever since, and its modern ICE trains can now travel at up to 300 kilometres per hour.",
      "Germany's trains are so efficient that many Germans prefer the train to flying for short and medium distances. The ICE from Munich to Nuremberg — about 170 kilometres — takes just 65 minutes and drops you right in the city centre.",
      "Berlin's underground railway, the U-Bahn, opened in 1902 and is now over 150 kilometres long with 173 stations! It runs 24 hours a day on weekends so Berliners can travel any time, day or night.",
      "Frankfurt's main railway station is one of the busiest in Europe, with over 500 train departures every single day — that's a train leaving roughly every three minutes! It has 24 platforms and handles over 350,000 passengers daily."
    ]
  },
  {
    country: 'India',
    emoji: '🚃',
    bg: 'linear-gradient(160deg, #C2410C 0%, #7C2D12 100%)',
    label: 'Express train · India',
    // image: 'images/india-express.jpg',
    options: ['India', 'China', 'Brazil', 'Russia'],
    bbox: '68.0,7.0,98.0,38.0', marker: '20.59,78.96',
    blurbs: [
      "India has one of the biggest railway networks on the entire planet, with over 67,000 kilometres of track! Every single day, around 23 million people ride Indian trains. That's more people than live in the whole of Australia — all travelling by train in just one day!",
      "Indian Railways employs over 1.3 million people, making it one of the largest employers in the world! If all of Indian Railways' workers lived in the same city, it would be one of the biggest cities in Canada.",
      "The Darjeeling Himalayan Railway is nicknamed the 'Toy Train' because it's so small and cute! It chugs through the mountains at just 20 kilometres per hour and was built way back in 1881. It's now a UNESCO World Heritage Site!",
      "India's longest train journey covers a whopping 4,235 kilometres — from the northeast corner of the country all the way down to the very southern tip. The journey takes about 72 hours. That's three whole days on a train!",
      "The Fairy Queen steam locomotive is still running in India today, and it was built in 1855 — over 170 years ago! It still takes passengers on special heritage tours and holds the world record for being the oldest working steam locomotive."
    ]
  },
  {
    country: 'Switzerland',
    emoji: '🚞',
    bg: 'linear-gradient(160deg, #DC2626 0%, #991B1B 100%)',
    label: 'Mountain railway · Switzerland',
    // image: 'images/switzerland-mountain-train.jpg',
    options: ['Austria', 'Norway', 'Switzerland', 'Germany'],
    bbox: '5.9,45.8,10.5,47.9', marker: '46.82,8.23',
    blurbs: [
      "Switzerland is famous for trains that run perfectly on time — Swiss watches and Swiss trains are both known for incredible precision! The Jungfrau Railway takes you high into the Alps, to the highest railway station in all of Europe, surrounded by snow and glaciers!",
      "Switzerland has one of the highest railway densities in the world — more track per person than almost anywhere else on Earth. You're almost never more than a short walk from a train station anywhere in the entire country!",
      "The Glacier Express is known as 'the slowest express train in the world'! It travels for 8 hours through the most beautiful mountain scenery on Earth, crossing 291 bridges and going through 91 tunnels. Every single seat has a view.",
      "Almost all of Switzerland's trains run on clean electricity from waterfalls! Switzerland's rail network is powered almost entirely by hydroelectric power, making it one of the most environmentally friendly ways to travel in the world.",
      "The Bernina Express crosses the Alps between Switzerland and Italy, climbing higher than 2,000 metres above sea level. That's higher than any mountain in the whole of the United Kingdom! The views are absolutely breathtaking."
    ]
  },
  {
    country: 'USA',
    emoji: '🚂',
    bg: 'linear-gradient(160deg, #1D4ED8 0%, #7C3AED 100%)',
    label: 'Steam locomotive · USA',
    // image: 'images/usa-steam-train.jpg',
    options: ['USA', 'Canada', 'Australia', 'United Kingdom'],
    bbox: '-128.0,23.0,-65.0,51.0', marker: '39.5,-98.4',
    blurbs: [
      "The United States has legendary railway history! In 1869, the Transcontinental Railroad connected the east and west coasts of America for the very first time. Workers celebrated by driving a Golden Spike at the joining point. Today, trains still cross vast deserts, mountain ranges, and wide open plains!",
      "America's first passenger railway opened in 1830 in Baltimore — and the first train was pulled by a horse! When a steam locomotive raced a horse at the opening, the horse actually won. But steam trains quickly got much, much faster after that.",
      "New York's Grand Central Terminal has 44 platforms — more than any other train station in the whole world! Over 750,000 people pass through it every single day. It's so famous it has appeared in hundreds of movies and TV shows.",
      "Some freight trains in America are over 3 kilometres long — that's longer than 33 football fields lined up end to end! These massive trains carry coal, grain, and cars across the entire continent, day and night.",
      "The California Zephyr travels from Chicago all the way to San Francisco — a journey of over 3,900 kilometres taking 51 hours! Along the way, you pass through the Rocky Mountains, the desert, and the Sierra Nevada mountain range."
    ]
  },
];

let gameQ = [], cur = 0, score = 0;

function speak(text) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.rate = 0.88; u.pitch = 1.05;
  window.speechSynthesis.speak(u);
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function buildProgress() {
  document.getElementById('progressRow').innerHTML = gameQ.map((_, i) => {
    const c = i < cur ? 'done' : i === cur ? 'current' : '';
    return `<div class="pdot ${c}"></div>`;
  }).join('');
}

function celebrate() {
  const el = document.createElement('div');
  el.className = 'celebrate';
  const emojis = ['⭐','🌟','✨','🎉','🎊','🏆','💫'];
  for (let i = 0; i < 22; i++) {
    const em = document.createElement('div');
    em.className = 'burst-em';
    em.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    const angle = (Math.random() * 360) * (Math.PI / 180);
    const dist  = 80 + Math.random() * 180;
    em.style.cssText = `
      --tx: ${Math.cos(angle) * dist}px;
      --ty: ${Math.sin(angle) * dist}px;
      --r:  ${Math.random() * 720 - 360}deg;
      animation-delay: ${Math.random() * 0.15}s;
      font-size: ${1.2 + Math.random() * 1.5}rem;
    `;
    el.appendChild(em);
  }
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1400);
}

function startQ(idx) {
  const q = gameQ[idx];
  const shuffledOpts = shuffle(q.options);

  document.getElementById('screenQ').style.display = 'block';
  document.getElementById('screenR').style.display = 'none';
  document.getElementById('screenF').style.display = 'none';
  document.getElementById('wrongMsg').textContent = '';
  document.getElementById('scoreNum').textContent = score;
  buildProgress();

  const img = document.getElementById('trainImg');
  if (q.image) {
    img.innerHTML = `<img src="${q.image}" alt="${q.country} train">`;
    img.style.background = '';
  } else {
    img.style.background = q.bg;
    img.innerHTML = `<div class="ph-box"><div class="ph-emoji">${q.emoji}</div><div class="ph-label">${q.label}</div></div>`;
  }

  document.getElementById('optGrid').innerHTML = shuffledOpts.map((opt, i) =>
    `<button class="opt c${i}" data-val="${opt}" onclick="pick(this)">${opt}</button>`
  ).join('');
}

function pick(btn) {
  const val = btn.dataset.val;
  const q   = gameQ[cur];
  speak(val);

  if (val === q.country) {
    btn.classList.add('correct');
    document.querySelectorAll('.opt').forEach(b => { if (b !== btn) b.disabled = true; });
    score++;
    document.getElementById('scoreNum').textContent = score;
    celebrate();
    setTimeout(() => showResult(q), 950);
  } else {
    btn.classList.add('wrong');
    setTimeout(() => { btn.classList.remove('wrong'); btn.disabled = true; }, 600);
    const msg = document.getElementById('wrongMsg');
    msg.textContent = 'Not quite — try again!';
    setTimeout(() => { if (msg.textContent.startsWith('Not')) msg.textContent = ''; }, 1800);
  }
}

function showResult(q) {
  document.getElementById('screenQ').style.display = 'none';
  document.getElementById('screenR').style.display = 'block';
  document.getElementById('rCountry').textContent = q.country;
  document.getElementById('rMap').src =
    `https://www.openstreetmap.org/export/embed.html?bbox=${q.bbox}&layer=mapnik&marker=${q.marker}`;

  const blurb = q.blurbs[Math.floor(Math.random() * q.blurbs.length)];
  document.getElementById('rBlurb').textContent = blurb;
  document.getElementById('nextLbl').textContent =
    cur === gameQ.length - 1 ? 'See my score →' : 'Next train →';
  buildProgress();
  setTimeout(() => speak(blurb), 700);
}

function nextQ() {
  window.speechSynthesis && window.speechSynthesis.cancel();
  if (cur === gameQ.length - 1) showFinal();
  else { cur++; startQ(cur); }
}

function showFinal() {
  document.getElementById('screenR').style.display = 'none';
  document.getElementById('screenF').style.display = 'block';
  const pct = score / gameQ.length;
  const [em, title] =
    pct === 1  ? ['🏆', 'Perfect score!']  :
    pct >= 0.8 ? ['⭐', 'Amazing job!']     :
    pct >= 0.6 ? ['👍', 'Great effort!']    :
                 ['🚂', 'Keep exploring!'];
  document.getElementById('fEm').textContent = em;
  document.getElementById('fTitle').textContent = title;
  document.getElementById('fScore').textContent = `You got ${score} out of ${gameQ.length} right!`;
  setTimeout(() => speak(`${title} You got ${score} out of ${gameQ.length} right!`), 300);
}

function restart() {
  cur = 0; score = 0;
  window.speechSynthesis && window.speechSynthesis.cancel();
  gameQ = shuffle(QUESTIONS);
  startQ(0);
}

// Start
gameQ = shuffle(QUESTIONS);
startQ(0);
</script>
</body>
</html>
