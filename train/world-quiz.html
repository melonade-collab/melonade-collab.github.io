<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trains of the World Quiz</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: linear-gradient(160deg, #0d1a2e 0%, #1a2e4a 50%, #0a1218 100%);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 16px 16px 48px;
}

.back-link {
  position: fixed;
  top: 12px; left: 14px;
  font-size: 0.7rem;
  color: #aaa;
  text-decoration: none;
  background: rgba(0,0,0,0.55);
  border: 1px solid #444;
  padding: 4px 9px;
  z-index: 200;
  border-radius: 4px;
}

.quiz-wrap {
  width: 100%;
  max-width: 500px;
  margin-top: 48px;
}

/* ── Header ── */
.header { text-align: center; margin-bottom: 18px; }
.header-title {
  font-size: 1.75rem;
  font-weight: 900;
  color: #ffd700;
  letter-spacing: 1px;
  text-shadow: 2px 2px 0 #6a4a00;
}
.header-sub { font-size: 0.82rem; color: rgba(255,255,255,0.45); margin-top: 3px; }
.progress-row {
  display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 14px;
}
.pdot {
  width: 10px; height: 10px; border-radius: 50%;
  background: rgba(255,255,255,0.18);
  transition: background 0.3s, transform 0.2s;
}
.pdot.done { background: #4ade80; }
.pdot.current { background: #ffd700; transform: scale(1.2); }
.score-badge {
  display: inline-flex; align-items: center; gap: 5px;
  background: rgba(255,215,0,0.1);
  border: 1px solid rgba(255,215,0,0.25);
  border-radius: 99px; padding: 4px 14px;
  font-size: 0.78rem; font-weight: 700; color: #ffd700; margin-top: 10px;
}

/* ── Card ── */
.card {
  background: #fff; border-radius: 24px; overflow: hidden;
  box-shadow: 0 12px 48px rgba(0,0,0,0.45);
}

/* ── Train image ── */
.train-img {
  width: 100%; aspect-ratio: 16 / 9;
  overflow: hidden; position: relative;
  display: flex; align-items: center; justify-content: center; flex-direction: column;
}
.train-img img { width: 100%; height: 100%; object-fit: cover; display: block; }
.ph-box {
  width: 100%; height: 100%;
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px;
}
.ph-emoji { font-size: 5rem; line-height: 1; filter: drop-shadow(0 2px 8px rgba(0,0,0,0.2)); }
.ph-label {
  font-size: 0.72rem; font-weight: 700; color: rgba(255,255,255,0.8);
  letter-spacing: 1px; text-transform: uppercase; text-shadow: 0 1px 4px rgba(0,0,0,0.3);
}

/* ── Question area ── */
.q-area { padding: 22px 20px 24px; }
.q-text {
  font-size: 1.1rem; font-weight: 800; color: #0F172A;
  text-align: center; margin-bottom: 18px; line-height: 1.35;
}

/* ── Option buttons ── */
.options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.opt {
  padding: 18px 12px; border-radius: 16px; border: none;
  font-size: 1rem; font-weight: 800; font-family: inherit;
  cursor: pointer; color: #fff; text-align: center; line-height: 1.25;
  box-shadow: 0 3px 10px rgba(0,0,0,0.15);
  transition: transform 0.12s, box-shadow 0.12s;
}
.opt:active:not(:disabled) { transform: scale(0.94); box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
.opt.c0 { background: #EF4444; }
.opt.c1 { background: #3B82F6; }
.opt.c2 { background: #10B981; }
.opt.c3 { background: #F59E0B; }
.opt.correct {
  background: #16A34A !important;
  box-shadow: 0 0 0 4px #BBF7D0, 0 3px 10px rgba(0,0,0,0.15) !important;
  transform: scale(1.03) !important;
}
.opt.wrong {
  background: #991B1B !important;
  animation: shake 0.42s ease;
  box-shadow: 0 0 0 3px #FCA5A5 !important;
}
.opt:disabled { opacity: 0.32; cursor: default; }

@keyframes shake {
  0%,100% { transform: translateX(0); }
  20% { transform: translateX(-8px); }
  40% { transform: translateX(8px); }
  60% { transform: translateX(-5px); }
  80% { transform: translateX(5px); }
}

.wrong-msg {
  text-align: center; font-size: 0.82rem; font-weight: 700;
  color: #DC2626; margin-top: 12px; min-height: 18px;
}

/* ── Celebration overlay ── */
.celebrate {
  position: fixed; inset: 0; pointer-events: none; z-index: 999;
  display: flex; align-items: center; justify-content: center;
}
.burst-em {
  position: absolute; font-size: 2rem;
  animation: burstFly 1.1s cubic-bezier(0.22,1,0.36,1) forwards;
}
@keyframes burstFly {
  0%   { transform: translate(0,0) scale(0) rotate(0deg); opacity: 1; }
  40%  { opacity: 1; }
  100% { transform: translate(var(--tx), var(--ty)) scale(0.5) rotate(var(--r)); opacity: 0; }
}

/* ── Result screen ── */
.result-banner {
  background: linear-gradient(135deg, #16A34A, #15803D);
  padding: 20px 22px; display: flex; align-items: center; gap: 14px;
}
.result-check {
  width: 44px; height: 44px;
  background: rgba(255,255,255,0.2); border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.4rem; flex-shrink: 0;
}
.result-correct { font-size: 1.2rem; font-weight: 900; color: #fff; }
.result-country { font-size: 0.82rem; color: rgba(255,255,255,0.8); margin-top: 3px; }
.result-map { width: 100%; height: 220px; border: none; display: block; }
.result-body { padding: 18px 20px 22px; }
.fact-tag {
  display: inline-block; font-size: 0.6rem; font-weight: 800;
  letter-spacing: 1.5px; text-transform: uppercase;
  color: #64748B; background: #F1F5F9; border-radius: 99px;
  padding: 3px 10px; margin-bottom: 10px;
}
.fact-text { font-size: 0.9rem; color: #334155; line-height: 1.75; margin-bottom: 20px; }
.btn-next {
  width: 100%; padding: 16px;
  background: #1a2e4a; color: #ffd700;
  border: 2px solid #ffd700; border-radius: 14px;
  font-size: 1rem; font-weight: 800; font-family: inherit;
  cursor: pointer; letter-spacing: 0.3px;
  transition: background 0.15s, transform 0.1s;
}
.btn-next:hover { background: #0d1a2e; }
.btn-next:active { transform: scale(0.98); }

/* ── Final screen ── */
.final-inner { text-align: center; padding: 50px 28px 44px; }
.final-em { font-size: 5rem; line-height: 1; margin-bottom: 20px; }
.final-title { font-size: 1.6rem; font-weight: 900; color: #0F172A; margin-bottom: 8px; }
.final-score { font-size: 1rem; color: #64748B; margin-bottom: 30px; line-height: 1.5; }
.btn-restart {
  padding: 16px 40px;
  background: #1a2e4a; color: #ffd700;
  border: 2px solid #ffd700; border-radius: 14px;
  font-size: 1rem; font-weight: 800; font-family: inherit;
  cursor: pointer; letter-spacing: 0.3px;
  transition: background 0.15s, transform 0.1s;
}
.btn-restart:hover { background: #0d1a2e; }
.btn-restart:active { transform: scale(0.98); }
</style>
</head>
<body>

<a class="back-link" href="index.html">← Train World</a>

<div class="quiz-wrap">

  <div class="header">
    <div class="header-title">🌍 Trains of the World</div>
    <div class="header-sub">Guess which country each train is from</div>
    <div class="progress-row" id="progressRow"></div>
    <div><span class="score-badge">⭐ <span id="scoreNum">0</span> correct</span></div>
  </div>

  <!-- Question -->
  <div id="screenQ">
    <div class="card">
      <div class="train-img" id="trainImg"></div>
      <div class="q-area">
        <div class="q-text">Which country is this train from?</div>
        <div class="options-grid" id="optGrid"></div>
        <div class="wrong-msg" id="wrongMsg"></div>
      </div>
    </div>
  </div>

  <!-- Result -->
  <div id="screenR" style="display:none">
    <div class="card">
      <div class="result-banner">
        <div class="result-check">✓</div>
        <div>
          <div class="result-correct">Correct!</div>
          <div class="result-country" id="rCountry"></div>
        </div>
      </div>
      <iframe class="result-map" id="rMap" loading="lazy" title="Map"></iframe>
      <div class="result-body">
        <span class="fact-tag">Fun fact</span>
        <div class="fact-text" id="rBlurb"></div>
        <button class="btn-next" onclick="nextQ()"><span id="nextLbl">Next train →</span></button>
      </div>
    </div>
  </div>

  <!-- Final -->
  <div id="screenF" style="display:none">
    <div class="card">
      <div class="final-inner">
        <div class="final-em" id="fEm"></div>
        <div class="final-title" id="fTitle"></div>
        <div class="final-score" id="fScore"></div>
        <button class="btn-restart" onclick="restart()">Play again →</button>
      </div>
    </div>
  </div>

</div>

  {

      "Portugal built a high-speed rail line called the Alfa Pendular that tilts as it goes around corners — so passengers barely feel the bends! It travels between Lisbon and Porto in about two hours and fifteen minutes, running through rolling hills, cork oak forests, and ancient university towns.",

let gameQ = [], cur = 0, score = 0;

function speak(text) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.rate = 0.88; u.pitch = 1.05;
  window.speechSynthesis.speak(u);
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function buildProgress() {
  document.getElementById('progressRow').innerHTML = gameQ.map((_, i) => {
    const c = i < cur ? 'done' : i === cur ? 'current' : '';
    return `<div class="pdot ${c}"></div>`;
  }).join('');
}

function playCorrectSound() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    [523.25, 659.25, 783.99].forEach((freq, i) => {
      const osc  = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.type = 'sine';
      osc.frequency.value = freq;
      const t = ctx.currentTime + i * 0.13;
      gain.gain.setValueAtTime(0, t);
      gain.gain.linearRampToValueAtTime(0.22, t + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.55);
      osc.start(t);
      osc.stop(t + 0.55);
    });
  } catch(e) {}
}

function celebrate() {
  const el = document.createElement('div');
  el.className = 'celebrate';
  const emojis = ['⭐','🌟','✨','🎉','🎊','🏆','💫'];
  for (let i = 0; i < 22; i++) {
    const em = document.createElement('div');
    em.className = 'burst-em';
    em.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    const angle = (Math.random() * 360) * (Math.PI / 180);
    const dist  = 80 + Math.random() * 180;
    em.style.cssText = `
      --tx: ${Math.cos(angle) * dist}px;
      --ty: ${Math.sin(angle) * dist}px;
      --r:  ${Math.random() * 720 - 360}deg;
      animation-delay: ${Math.random() * 0.15}s;
      font-size: ${1.2 + Math.random() * 1.5}rem;
    `;
    el.appendChild(em);
  }
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1400);
}

function startQ(idx) {
  const q = gameQ[idx];
  const shuffledOpts = shuffle(q.options);

  document.getElementById('screenQ').style.display = 'block';
  document.getElementById('screenR').style.display = 'none';
  document.getElementById('screenF').style.display = 'none';
  document.getElementById('wrongMsg').textContent = '';
  document.getElementById('scoreNum').textContent = score;
  buildProgress();

  const img = document.getElementById('trainImg');
  if (q.image) {
    img.innerHTML = `<img src="${q.image}" alt="${q.country} train" style="object-position:${q.imgPosition||'center'}">`;
    img.style.background = '';
  } else {
    img.style.background = q.bg;
    img.innerHTML = `<div class="ph-box"><div class="ph-emoji">${q.emoji}</div><div class="ph-label">${q.label}</div></div>`;
  }

  document.getElementById('optGrid').innerHTML = shuffledOpts.map((opt, i) =>
    `<button class="opt c${i}" data-val="${opt}" onclick="pick(this)">${opt}</button>`
  ).join('');
}

function pick(btn) {
  const val = btn.dataset.val;
  const q   = gameQ[cur];
  speak(val);

  if (val === q.country) {
    btn.classList.add('correct');
    document.querySelectorAll('.opt').forEach(b => { if (b !== btn) b.disabled = true; });
    score++;
    document.getElementById('scoreNum').textContent = score;
    playCorrectSound();
    celebrate();
    setTimeout(() => showResult(q), 950);
  } else {
    btn.classList.add('wrong');
    setTimeout(() => { btn.classList.remove('wrong'); btn.disabled = true; }, 600);
    const msg = document.getElementById('wrongMsg');
    msg.textContent = 'Not quite — try again!';
    setTimeout(() => { if (msg.textContent.startsWith('Not')) msg.textContent = ''; }, 1800);
  }
}

function showResult(q) {
  document.getElementById('screenQ').style.display = 'none';
  document.getElementById('screenR').style.display = 'block';
  document.getElementById('rCountry').textContent = q.country;
  document.getElementById('rMap').src =
    `https://www.openstreetmap.org/export/embed.html?bbox=${q.bbox}&layer=mapnik&marker=${q.marker}`;

  const blurb = q.blurbs[Math.floor(Math.random() * q.blurbs.length)];
  document.getElementById('rBlurb').textContent = blurb;
  document.getElementById('nextLbl').textContent =
    cur === gameQ.length - 1 ? 'See my score →' : 'Next train →';
  buildProgress();
  setTimeout(() => speak(blurb), 700);
}

function nextQ() {
  window.speechSynthesis && window.speechSynthesis.cancel();
  if (cur === gameQ.length - 1) showFinal();
  else { cur++; startQ(cur); }
}

function showFinal() {
  document.getElementById('screenR').style.display = 'none';
  document.getElementById('screenF').style.display = 'block';
  const pct = score / gameQ.length;
  const [em, title] =
    pct === 1  ? ['🏆', 'Perfect score!']  :
    pct >= 0.8 ? ['⭐', 'Amazing job!']     :
    pct >= 0.6 ? ['👍', 'Great effort!']    :
                 ['🚂', 'Keep exploring!'];
  document.getElementById('fEm').textContent = em;
  document.getElementById('fTitle').textContent = title;
  document.getElementById('fScore').textContent = `You got ${score} out of ${gameQ.length} right!`;
  setTimeout(() => speak(`${title} You got ${score} out of ${gameQ.length} right!`), 300);
}

function restart() {
  cur = 0; score = 0;
  window.speechSynthesis && window.speechSynthesis.cancel();
  gameQ = shuffle(QUESTIONS);
  startQ(0);
}

// Start
gameQ = shuffle(QUESTIONS);
startQ(0);
</script>
