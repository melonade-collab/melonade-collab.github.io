<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dress the Panda!</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Nunito', 'Trebuchet MS', sans-serif;
  background: linear-gradient(160deg, #FFE4F0 0%, #EDE4FF 100%);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 14px 16px 48px;
}
.back {
  align-self: flex-start;
  text-decoration: none;
  color: #D63384;
  font-weight: 700;
  font-size: 0.9rem;
  margin-bottom: 12px;
  padding: 6px 16px;
  background: white;
  border-radius: 20px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}
.back:hover { background: #FFF0F8; }
h1 {
  font-size: clamp(1.6rem, 5vw, 2.4rem);
  font-weight: 900;
  color: #D63384;
  text-shadow: 2px 2px 0 #FFB3CC;
  margin-bottom: 14px;
}
.panda-wrap {
  background: white;
  border-radius: 28px;
  box-shadow: 0 8px 30px rgba(200,100,200,0.18);
  padding: 12px 12px 4px;
  margin-bottom: 18px;
  width: min(290px, 88vw);
}
#pandaSvg { width: 100%; height: auto; display: block; }
.section-label {
  font-size: 0.7rem;
  font-weight: 900;
  letter-spacing: 4px;
  color: #C0A0C0;
  margin-bottom: 9px;
  text-align: center;
}
.outfit-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
  max-width: 320px;
  width: 100%;
  margin-bottom: 18px;
}
.outfit-btn {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  padding: 9px 4px;
  border-radius: 14px;
  border: 3px solid transparent;
  background: white;
  cursor: pointer;
  transition: all 0.14s;
  font-family: 'Nunito', sans-serif;
  font-weight: 700;
  font-size: 0.68rem;
  color: #8B6BAE;
  box-shadow: 0 2px 10px rgba(180,100,200,0.1);
}
.outfit-btn .icon { font-size: 1.45rem; line-height: 1; }
.outfit-btn:hover { transform: scale(1.06); }
.outfit-btn.active { border-color: #D63384; background: #FFF0F8; color: #D63384; }
.acc-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 9px;
  max-width: 320px;
  width: 100%;
  margin-bottom: 18px;
}
.acc-btn {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  padding: 10px 6px;
  border-radius: 16px;
  border: 3px solid transparent;
  background: white;
  cursor: pointer;
  transition: all 0.14s;
  font-family: 'Nunito', sans-serif;
  font-weight: 700;
  font-size: 0.76rem;
  color: #8B6BAE;
  box-shadow: 0 2px 10px rgba(180,100,200,0.1);
}
.acc-btn .icon { font-size: 1.75rem; line-height: 1; }
.acc-btn:hover { transform: scale(1.06); }
.acc-btn.active { border-color: #D63384; background: #FFF0F8; color: #D63384; }
.reset-btn {
  padding: 10px 28px;
  border-radius: 14px;
  border: none;
  font-family: 'Nunito', sans-serif;
  font-weight: 700;
  font-size: 0.9rem;
  cursor: pointer;
  background: #F3E8FF;
  color: #7C3AED;
  box-shadow: 0 2px 10px rgba(124,58,237,0.15);
  transition: transform 0.1s;
}
.reset-btn:active { transform: scale(0.94); }
</style>
</head>

<div class="section-label">OUTFIT</div>

  <button class="outfit-btn active" id="obtn-none"       onclick="setOutfit('none',this)">      <span class="icon">🐼</span><span>None</span></button>

  <button class="acc-btn" id="btn-blush"      onclick="toggle('blush')">      <span class="icon">🌸</span><span>Blush</span></button>
  <button class="acc-btn" id="btn-glasses"    onclick="toggle('glasses')">    <span class="icon">👓</span><span>Glasses</span></button>
  <button class="acc-btn" id="btn-sunglasses" onclick="toggle('sunglasses')"> <span class="icon">🕶️</span><span>Sunnies</span></button>
  <button class="acc-btn" id="btn-crown"      onclick="toggle('crown')">      <span class="icon">👑</span><span>Crown</span></button>
  <button class="acc-btn" id="btn-tiara"      onclick="toggle('tiara')">      <span class="icon">✨</span><span>Tiara</span></button>

<button class="reset-btn" onclick="resetAll()">✕ Reset All</button>

<script>
const ACCS    = ['blush','glasses','sunglasses','crown','tiara','bow','flower','hat','bunny','wings','necklace','scarf','bowtie','wand'];
const OUTFITS = ['pink','blue','purple','strawberry','rainbow','mint'];

function toggle(id) {
  const el  = document.getElementById('acc-' + id);
  const btn = document.getElementById('btn-' + id);
  const show = el.style.display === 'none';
  el.style.display = show ? '' : 'none';
  btn.classList.toggle('active', show);
}

function setOutfit(name, btn) {
  OUTFITS.forEach(o => { document.getElementById('outfit-' + o).style.display = 'none'; });
  document.querySelectorAll('.outfit-btn').forEach(b => b.classList.remove('active'));
  if (name !== 'none') document.getElementById('outfit-' + name).style.display = '';
  btn.classList.add('active');
}

function resetAll() {
  ACCS.forEach(id => {
    document.getElementById('acc-' + id).style.display = 'none';
    document.getElementById('btn-' + id).classList.remove('active');
  });
  setOutfit('none', document.getElementById('obtn-none'));
}
</script>
