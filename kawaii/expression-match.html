<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Expression Match 😊</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Nunito', sans-serif;
  background: linear-gradient(160deg, #FFE4F0 0%, #EDE4FF 100%);
  min-height: 100vh;
  display: flex; flex-direction: column; align-items: center;
  padding: 14px 14px 40px;
}
.back {
  align-self: flex-start;
  text-decoration: none; color: #D63384; font-weight: 700; font-size: 0.9rem;
  padding: 6px 16px; background: white; border-radius: 20px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 12px;
}
.back:hover { background: #FFF0F8; }
h1 {
  font-size: clamp(1.5rem, 5vw, 2.2rem); font-weight: 900;
  color: #D63384; text-shadow: 2px 2px 0 #FFB3CC; margin-bottom: 16px;
}

/* SCREENS */
.screen { display: none; width: 100%; max-width: 420px; flex-direction: column; align-items: center; }
.screen.on { display: flex; }

/* HOME */
.home-card {
  background: white; border-radius: 28px; padding: 32px 28px 36px;
  text-align: center; box-shadow: 0 8px 32px rgba(200,100,180,0.2);
  border: 3px solid #FFB3CC; width: 100%;
}
.home-faces { font-size: 3.2rem; letter-spacing: 4px; margin-bottom: 16px; }
.home-title { font-size: 1.3rem; font-weight: 900; color: #5B4E77; margin-bottom: 8px; }
.home-desc { font-size: 0.9rem; color: #9B8AB8; font-weight: 700; line-height: 1.5; margin-bottom: 28px; }
.start-btn {
  width: 100%; padding: 16px; border-radius: 20px; border: none;
  background: linear-gradient(135deg, #FF85A1, #D63384); color: white;
  font-family: 'Nunito', sans-serif; font-weight: 900; font-size: 1.1rem;
  cursor: pointer; transition: transform 0.1s;
  box-shadow: 0 6px 20px rgba(214,51,132,0.35);
}
.start-btn:active { transform: scale(0.96); }

/* QUIZ */
.score-bar {
  display: flex; align-items: center; gap: 10px;
  width: 100%; margin-bottom: 14px;
}
.score-pip-row { display: flex; gap: 5px; flex: 1; }
.pip {
  flex: 1; height: 8px; border-radius: 4px;
  background: rgba(255,255,255,0.5);
  transition: background 0.3s;
}
.pip.correct { background: #34D399; }
.pip.wrong   { background: #F87171; }
.score-txt { font-size: 0.88rem; font-weight: 900; color: #D63384;
  background: white; padding: 4px 12px; border-radius: 20px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1); white-space: nowrap; }

.face-card {
  background: white; border-radius: 28px;
  width: 100%;
  padding: 28px 20px 24px;
  text-align: center;
  box-shadow: 0 10px 36px rgba(200,100,180,0.2);
  border: 3px solid #FFB3CC;
  margin-bottom: 18px;
  position: relative;
  overflow: hidden;
  transition: transform 0.15s;
}
.face-card.pop { animation: cardpop 0.25s; }
@keyframes cardpop { 0%{transform:scale(0.92)} 60%{transform:scale(1.04)} 100%{transform:scale(1)} }
.manga-flash {
  position: absolute; inset: 0;
  background: repeating-conic-gradient(rgba(255,179,204,0.14) 0% 10%, transparent 10% 20%);
  opacity: 0; transition: opacity 0.2s;
  pointer-events: none;
}
.manga-flash.show { opacity: 1; }
.face-emoji { font-size: clamp(5rem,18vw,7rem); line-height: 1.1; margin-bottom: 10px; display: block; }
.face-tag { font-size: 0.65rem; font-weight: 900; letter-spacing: 2px;
  color: rgba(91,78,119,0.4); text-transform: uppercase; }
.face-hint { font-size: 0.78rem; font-weight: 700; color: #C8A0C0;
  margin-top: 6px; min-height: 1.2em; }

.choices { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; }
.choice-btn {
  padding: 16px 10px; border-radius: 18px; border: 3px solid #FFB3CC;
  background: white; font-family: 'Nunito', sans-serif;
  font-weight: 900; font-size: clamp(0.88rem,3vw,1.05rem);
  color: #5B4E77; cursor: pointer; transition: transform 0.1s, border-color 0.1s, background 0.1s;
  box-shadow: 0 4px 14px rgba(200,100,180,0.1);
  -webkit-tap-highlight-color: transparent;
}
.choice-btn:active { transform: scale(0.94); }
.choice-btn.correct { background: #D1FAE5; border-color: #34D399; color: #065F46; }
.choice-btn.wrong   { background: #FEE2E2; border-color: #F87171; color: #991B1B; }
.choice-btn.reveal  { background: #EDE4FF; border-color: #A78BFA; }
.choice-btn:disabled { cursor: default; }

/* WIN */
.win-card {
  background: white; border-radius: 28px; padding: 40px 36px;
  text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.2);
  border: 3px solid #FFB3CC; width: 100%;
}
.win-emoji { font-size: 4rem; }
.win-title { font-size: 2rem; font-weight: 900; color: #D63384; margin: 12px 0 6px; }
.win-score { font-size: 1.1rem; font-weight: 700; color: #8B7BA8; margin-bottom: 8px; }
.win-msg   { font-size: 0.9rem; color: #B8A0C0; font-weight: 700; margin-bottom: 28px; }
.win-btn {
  width: 100%; padding: 14px; border-radius: 18px; border: none;
  background: linear-gradient(135deg, #FF85A1, #D63384); color: white;
  font-family: 'Nunito', sans-serif; font-weight: 900; font-size: 1rem;
  cursor: pointer; box-shadow: 0 6px 18px rgba(214,51,132,0.3);
}
.win-btn:active { transform: scale(0.96); }
</style>
</head>
<body>

<a class="back" href="index.html">← Back to Kawaii World</a>
<h1>😊 Expression Match</h1>

<!-- HOME -->
<div class="screen on" id="s-home">
  <div class="home-card">
    <div class="home-faces">😢 😠 🤩 😳</div>
    <div class="home-title">Learn Manga Expressions!</div>
    <div class="home-desc">Look at each face and pick the right emotion. How many can you get right? 🌸</div>
    <button class="start-btn" onclick="startGame()">✨ Let's Play!</button>
  </div>
</div>

<!-- QUIZ -->
<div class="screen" id="s-quiz">
  <div class="score-bar">
    <div class="score-pip-row" id="pipRow"></div>
    <div class="score-txt" id="scoreTxt">0 / 10</div>
  </div>
  <div class="face-card" id="faceCard">
    <div class="manga-flash" id="mangaFlash"></div>
    <span class="face-emoji" id="faceEmoji">😊</span>
    <div class="face-tag">WHAT FEELING IS THIS?</div>
    <div class="face-hint" id="faceHint"></div>
  </div>
  <div class="choices" id="choices"></div>
</div>

<!-- WIN -->
<div class="screen" id="s-win">
  <div class="win-card">
    <div class="win-emoji" id="winEmoji">🎉</div>
    <div class="win-title" id="winTitle">Amazing!</div>
    <div class="win-score" id="winScore"></div>
    <div class="win-msg"  id="winMsg"></div>
    <button class="win-btn" onclick="startGame()">🌸 Play Again</button>
  </div>
</div>

<script>
const EXPRESSIONS = [
  { emoji:'😊', label:'Happy',       hint:'Smiling, eyes curved up',           alts:['Sad','Angry','Surprised'] },
  { emoji:'😢', label:'Sad',         hint:'Tears falling, mouth turned down',   alts:['Happy','Confused','Scared'] },
  { emoji:'😠', label:'Angry',       hint:'Eyebrows down, frowning hard',       alts:['Sad','Determined','Shocked'] },
  { emoji:'😲', label:'Shocked',     hint:'Eyes and mouth wide open',           alts:['Happy','Excited','Scared'] },
  { emoji:'😨', label:'Scared',      hint:'Eyes wide, sweating a little',       alts:['Shocked','Confused','Shy'] },
  { emoji:'🤩', label:'Excited',     hint:'Stars in the eyes!',                 alts:['Happy','In Love','Shocked'] },
  { emoji:'😳', label:'Shy',         hint:'Blushing cheeks, looking away',      alts:['Embarrassed','Confused','Scared'] },
  { emoji:'😕', label:'Confused',    hint:'One eyebrow up, mouth twisted',      alts:['Sad','Thinking','Nervous'] },
  { emoji:'😴', label:'Sleepy',      hint:'Eyes half closed, yawning',          alts:['Bored','Calm','Sad'] },
  { emoji:'😍', label:'In Love',     hint:'Heart eyes, big smile',              alts:['Happy','Excited','Shy'] },
  { emoji:'😤', label:'Determined',  hint:'Puffing steam, serious face',        alts:['Angry','Frustrated','Confident'] },
  { emoji:'😭', label:'Crying',      hint:'Big dramatic tears everywhere!',     alts:['Sad','Shocked','Scared'] },
  { emoji:'🤔', label:'Thinking',    hint:'Hand on chin, one eye squinting',    alts:['Confused','Curious','Bored'] },
  { emoji:'😏', label:'Smug',        hint:'Half smile, one eyebrow up',         alts:['Confident','Happy','Thinking'] },
  { emoji:'😬', label:'Nervous',     hint:'Teeth clenched, eyes worried',       alts:['Scared','Confused','Shy'] },
  { emoji:'😌', label:'Relieved',    hint:'Eyes closed, soft smile, phew!',     alts:['Happy','Calm','Sleepy'] },
  { emoji:'😋', label:'Pleased',     hint:'Tongue out, eyes sparkling',         alts:['Happy','Excited','Silly'] },
  { emoji:'🥺', label:'Pleading',    hint:'Big puppy eyes, trembling lip',      alts:['Sad','Shy','Scared'] },
];

const Q = 10;
let queue = [], qIdx = 0, score = 0, results = [];
let locked = false;

function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('on'));
  document.getElementById(id).classList.add('on');
}

function startGame() {
  queue   = shuffle([...EXPRESSIONS]).slice(0, Q);
  qIdx    = 0;
  score   = 0;
  results = [];
  locked  = false;
  buildPips();
  show('s-quiz');
  showQuestion();
}

function buildPips() {
  const row = document.getElementById('pipRow');
  row.innerHTML = '';
  for (let i = 0; i < Q; i++) {
    const p = document.createElement('div');
    p.className = 'pip'; p.id = 'pip_'+i;
    row.appendChild(p);
  }
  document.getElementById('scoreTxt').textContent = `0 / ${Q}`;
}

function showQuestion() {
  locked = false;
  const expr = queue[qIdx];
  document.getElementById('faceEmoji').textContent = expr.emoji;
  document.getElementById('faceHint').textContent  = '';
  document.getElementById('mangaFlash').classList.remove('show');

  const card = document.getElementById('faceCard');
  card.classList.remove('pop');
  void card.offsetWidth;
  card.classList.add('pop');

  const allLabels = buildChoices(expr);
  const choiceEl  = document.getElementById('choices');
  choiceEl.innerHTML = '';
  allLabels.forEach(label => {
    const btn = document.createElement('button');
    btn.className   = 'choice-btn';
    btn.textContent = label;
    btn.onclick = () => pick(btn, label, expr);
    choiceEl.appendChild(btn);
  });
}

function buildChoices(expr) {
  const wrong = shuffle(expr.alts).slice(0, 3);
  return shuffle([expr.label, ...wrong]);
}

function pick(btn, label, expr) {
  if (locked) return;
  locked = true;
  const correct = label === expr.label;
  btn.classList.add(correct ? 'correct' : 'wrong');

  if (!correct) {
    document.querySelectorAll('.choice-btn').forEach(b => {
      if (b.textContent === expr.label) b.classList.add('reveal');
    });
  }

  document.getElementById('faceHint').textContent = expr.hint;

  if (correct) {
    document.getElementById('mangaFlash').classList.add('show');
    score++;
  }

  results.push(correct);
  const pip = document.getElementById('pip_' + qIdx);
  if (pip) pip.classList.add(correct ? 'correct' : 'wrong');
  document.getElementById('scoreTxt').textContent = `${score} / ${Q}`;

  document.querySelectorAll('.choice-btn').forEach(b => b.disabled = true);

  setTimeout(() => {
    qIdx++;
    if (qIdx >= Q) { showWin(); } else { showQuestion(); }
  }, correct ? 900 : 1400);
}

function showWin() {
  const pct = score / Q;
  let emoji, title, msg;
  if (pct === 1)       { emoji='🌟'; title='Perfect Score!';  msg='You know every manga expression! You\'re a manga master! ✨'; }
  else if (pct >= 0.8) { emoji='🎉'; title='Awesome!';        msg='You really understand how manga characters feel! So cool! 🌸'; }
  else if (pct >= 0.6) { emoji='😊'; title='Great job!';      msg='You\'re learning the manga emotions! Keep practising! 💕'; }
  else if (pct >= 0.4) { emoji='🌸'; title='Keep going!';     msg='Some faces are tricky! Play again and you\'ll get even better! 💪'; }
  else                 { emoji='💕'; title='Nice try!';        msg='Manga emotions can be hard to read. Play again and keep learning! ⭐'; }

  document.getElementById('winEmoji').textContent = emoji;
  document.getElementById('winTitle').textContent = title;
  document.getElementById('winScore').textContent = `${score} out of ${Q} correct`;
  document.getElementById('winMsg').textContent   = msg;
  show('s-win');
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}
</script>
</body>
</html>
