<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memory Match</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Nunito', 'Trebuchet MS', sans-serif;
  background: linear-gradient(160deg, #FFE4F0 0%, #EDE4FF 100%);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 14px 16px 40px;
}
.back {
  align-self: flex-start;
  text-decoration: none;
  color: #D63384;
  font-weight: 700;
  font-size: 0.9rem;
  margin-bottom: 12px;
  padding: 6px 16px;
  background: white;
  border-radius: 20px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}
.back:hover { background: #FFF0F8; }
h1 {
  font-size: clamp(1.6rem, 5vw, 2.4rem);
  font-weight: 900;
  color: #D63384;
  text-shadow: 2px 2px 0 #FFB3CC;
  margin-bottom: 10px;
}
.stats {
  display: flex; gap: 28px; margin-bottom: 14px;
}
.stat { text-align: center; }
.stat-label { font-size: 0.7rem; font-weight: 900; letter-spacing: 2px; color: #C0A0C0; }
.stat-val { font-size: 1.7rem; font-weight: 900; color: #5B4E77; }
.grid {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: clamp(5px, 1.8vw, 8px);
  max-width: 480px;
  width: 100%;
}
.card {
  aspect-ratio: 1;
  perspective: 600px;
  cursor: pointer;
}
.inner {
  width: 100%; height: 100%;
  position: relative;
  transform-style: preserve-3d;
  transition: transform 0.38s;
}
.card.flipped .inner,
.card.matched .inner { transform: rotateY(180deg); }
.face {
  position: absolute; inset: 0;
  border-radius: clamp(10px, 3vw, 16px);
  display: flex; align-items: center; justify-content: center;
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
}
.front {
  background: linear-gradient(135deg, #A78BFA, #D63384);
  font-size: clamp(1.4rem, 4.5vw, 1.9rem);
  box-shadow: 0 4px 14px rgba(180,60,180,0.18);
}
.back-face {
  background: white;
  font-size: clamp(1.4rem, 4vw, 2rem);
  transform: rotateY(180deg);
  box-shadow: 0 4px 14px rgba(180,60,180,0.12);
  overflow: hidden;
}
.back-face img {
  width: 100%; height: 100%;
  object-fit: cover;
  border-radius: inherit;
  pointer-events: none;
}
.card.matched .back-face {
  background: linear-gradient(135deg, #FFF0F8, #FFE4F0);
}
.btn {
  margin-top: 18px;
  padding: 11px 26px;
  border-radius: 14px;
  border: none;
  font-family: 'Nunito', sans-serif;
  font-weight: 700;
  font-size: 0.95rem;
  cursor: pointer;
  background: linear-gradient(135deg, #FF85A1, #D63384);
  color: white;
  box-shadow: 0 4px 14px rgba(214,51,132,0.28);
  transition: transform 0.1s;
}
.btn:active { transform: scale(0.94); }
.scores-section {
  margin-top: 18px;
  width: 100%;
  max-width: 480px;
  background: white;
  border-radius: 20px;
  padding: 16px 20px;
  box-shadow: 0 4px 20px rgba(200,100,200,0.12);
}
.scores-title {
  font-size: 0.75rem;
  font-weight: 900;
  letter-spacing: 4px;
  color: #C0A0C0;
  text-align: center;
  margin-bottom: 12px;
}
.scores-table { width: 100%; border-collapse: collapse; }
.scores-table td { padding: 5px 6px; font-size: 0.9rem; font-weight: 700; color: #5B4E77; }
.scores-table td:first-child { color: #C0A0C0; width: 28px; }
.scores-table td:last-child { text-align: right; color: #D63384; }
.scores-table tr.new-score td { color: #D63384; }
.win {
  display: none;
  background: white;
  border-radius: 22px;
  padding: 26px 32px;
  text-align: center;
  margin-top: 16px;
  box-shadow: 0 8px 30px rgba(200,100,200,0.18);
  max-width: 380px; width: 100%;
}
.win.show { display: block; }
</style>
</head>
<body>
<a class="back" href="index.html">← Anime World</a>
<h1>🃏 Memory Match</h1>

<div class="stats">
  <div class="stat"><div class="stat-label">MOVES</div><div class="stat-val" id="moves">0</div></div>
  <div class="stat"><div class="stat-label">PAIRS</div><div class="stat-val" id="pairs">0 / 12</div></div>
  <div class="stat"><div class="stat-label">BEST</div><div class="stat-val" id="best">—</div></div>
</div>

<div class="grid" id="grid"></div>
<button class="btn" onclick="newGame()">🔀 New Game</button>

<div class="scores-section" id="scoresSection" style="display:none">
  <div class="scores-title">TOP SCORES</div>
  <table class="scores-table" id="scoresTable"></table>
</div>

<div class="win" id="win">
  <div style="font-size:3rem">🎉</div>
  <div style="font-size:1.8rem;font-weight:900;color:#D63384;margin:8px 0 4px">All matched!</div>
  <div style="color:#8B7BA8;font-weight:700" id="winSub"></div>
  <br>
  <button class="btn" onclick="newGame()">🔀 Play Again</button>
</div>

<script>
const TOTAL_PAIRS = 12;
const FALLBACK = ['🐱','🐰','🦋','🌸','⭐','🍭','🌈','🦄','🎀','🍓','🌙','🐸'];
let IMAGES = [];
let flipped = [], pairsFound = 0, moves = 0, best = null, locked = false;

async function loadImages() {
  try {
    const res  = await fetch(`https://nekos.best/api/v2/neko?amount=${TOTAL_PAIRS}`);
    const data = await res.json();
    IMAGES = data.results.map(r => r.url);
  } catch(e) {
    IMAGES = FALLBACK;
  }
}

async function newGame() {
  flipped = []; pairsFound = 0; moves = 0; locked = false;
  document.getElementById('moves').textContent = '0';
  document.getElementById('pairs').textContent = `0 / ${TOTAL_PAIRS}`;
  document.getElementById('win').classList.remove('show');

  const grid = document.getElementById('grid');
  grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:30px;color:#C0A0C0;font-weight:700">Loading… ✨</div>`;

  await loadImages();

  const tiles = [];
  IMAGES.forEach((src, i) => { tiles.push({ src, id: i }); tiles.push({ src, id: i }); });
  for (let i = tiles.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [tiles[i], tiles[j]] = [tiles[j], tiles[i]];
  }

  grid.innerHTML = '';
  tiles.forEach(tile => {
    const card = document.createElement('div');
    card.className = 'card';
    card.dataset.id = tile.id;
    const face = tile.src.startsWith('http')
      ? `<img src="${tile.src}" alt="character">`
      : tile.src;
    card.innerHTML = `
      <div class="inner">
        <div class="face front">✨</div>
        <div class="face back-face">${face}</div>
      </div>`;
    card.addEventListener('click', () => flip(card));
    grid.appendChild(card);
  });
}

function flip(card) {
  if (locked || card.classList.contains('flipped') || card.classList.contains('matched')) return;
  card.classList.add('flipped');
  flipped.push(card);
  if (flipped.length < 2) return;

  moves++;
  document.getElementById('moves').textContent = moves;
  locked = true;

  const [a, b] = flipped;
  if (a.dataset.id === b.dataset.id) {
    a.classList.add('matched'); b.classList.add('matched');
    pairsFound++;
    document.getElementById('pairs').textContent = `${pairsFound} / ${TOTAL_PAIRS}`;
    flipped = []; locked = false;
    if (pairsFound === TOTAL_PAIRS) {
      if (best === null || moves < best) best = moves;
      document.getElementById('best').textContent = best;
      document.getElementById('winSub').textContent =
        `${moves} move${moves !== 1 ? 's' : ''}` + (best === moves ? ' 🏆 Best yet!' : '!');
      saveScore(moves);
      renderScores(moves);
      setTimeout(() => document.getElementById('win').classList.add('show'), 400);
    }
  } else {
    setTimeout(() => {
      a.classList.remove('flipped'); b.classList.remove('flipped');
      flipped = []; locked = false;
    }, 900);
  }
}

function saveScore(m) {
  const key = 'memory_scores';
  const scores = JSON.parse(localStorage.getItem(key) || '[]');
  scores.push(m);
  scores.sort((a, b) => a - b);
  scores.splice(5);
  localStorage.setItem(key, JSON.stringify(scores));
}

function renderScores(latestScore) {
  const scores = JSON.parse(localStorage.getItem('memory_scores') || '[]');
  if (!scores.length) return;
  const medals = ['🥇','🥈','🥉','4.','5.'];
  const firstMatch = latestScore !== null ? scores.indexOf(latestScore) : -1;
  document.getElementById('scoresTable').innerHTML = scores.map((s, i) => `
    <tr class="${i === firstMatch ? 'new-score' : ''}">
      <td>${medals[i]}</td>
      <td>${i === firstMatch ? '✨ You!' : ''}</td>
      <td>${s} move${s !== 1 ? 's' : ''}</td>
    </tr>`).join('');
  document.getElementById('scoresSection').style.display = '';
}

renderScores(null);
newGame();
</script>
</body>
</html>
