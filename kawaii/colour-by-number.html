<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Colour by Number 🎨</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Nunito', sans-serif;
  background: linear-gradient(160deg, #EDE4FF 0%, #FFE4F0 100%);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 14px 12px 40px;
  user-select: none;
}
.back {
  align-self: flex-start;
  text-decoration: none; color: #6A28CC; font-weight: 700; font-size: 0.9rem;
  margin-bottom: 14px; padding: 6px 16px;
  background: white; border-radius: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}
h1 {
  font-size: clamp(1.4rem, 5vw, 2rem); font-weight: 900;
  color: #6A28CC; text-shadow: 2px 2px 0 #C8B5FF;
  margin-bottom: 6px; text-align: center;
}
.subtitle { font-size: 0.78rem; color: #9B8AB8; font-weight: 700; letter-spacing: 1px; margin-bottom: 14px; text-align: center; }

/* SCENE PICKER */
.scene-row { display: flex; gap: 10px; justify-content: center; margin-bottom: 16px; flex-wrap: wrap; }
.scene-btn {
  padding: 10px 20px; border-radius: 22px; cursor: pointer;
  font-family: 'Nunito', sans-serif; font-weight: 900; font-size: 0.92rem;
  background: white; color: #D63384; border: 3px solid #FFB3D9;
  box-shadow: 0 3px 10px rgba(200,100,200,0.14);
  transition: transform 0.12s, background 0.12s, color 0.12s, border-color 0.12s;
}
.scene-btn:hover { transform: scale(1.05); }
.scene-btn.active { background: #FFE0F0; color: #D63384; border-color: #D63384; }

/* PALETTE */
.palette-wrap { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-bottom: 16px; max-width: 520px; }
.swatch {
  width: 56px; height: 56px; border-radius: 14px; cursor: pointer;
  border: 3px solid transparent; display: flex; align-items: center; justify-content: center;
  font-size: 0.9rem; font-weight: 900; color: rgba(0,0,0,0.5);
  box-shadow: 0 3px 10px rgba(0,0,0,0.18); transition: transform 0.12s, border-color 0.12s;
  flex-shrink: 0;
}
.swatch:hover { transform: scale(1.1); }
.swatch.sel { border-color: #333; transform: scale(1.15); box-shadow: 0 0 0 4px rgba(0,0,0,0.25), 0 3px 10px rgba(0,0,0,0.18); }

/* CANVAS */
.canvas-wrap {
  background: white; border-radius: 22px;
  box-shadow: 0 8px 30px rgba(100,50,200,0.18);
  padding: 10px; max-width: 480px; width: 100%;
}
#artwork { width: 100%; height: auto; display: block; }

/* Regions */
.region {
  cursor: pointer;
  transition: filter 0.1s;
  stroke: #222; stroke-width: 2;
}
.region:hover { filter: brightness(0.9); }
.region.filled { stroke: #222; stroke-width: 1.5; }
.region.shake  { animation: shake 0.3s ease; }
@keyframes shake { 0%,100%{transform:translate(0)} 25%{transform:translate(-3px,0)} 75%{transform:translate(3px,0)} }

/* number labels (shown when unfilled) */
.num-label { pointer-events: none; font-size: 13px; font-weight: 900; fill: #555; font-family: 'Nunito', sans-serif; }
.num-label.hidden { display: none; }

/* Controls */
.controls { display: flex; gap: 10px; margin-top: 14px; flex-wrap: wrap; justify-content: center; }
.ctrl-btn {
  padding: 10px 22px; border-radius: 14px; border: none; cursor: pointer;
  font-family: 'Nunito', sans-serif; font-weight: 900; font-size: 0.88rem;
  transition: transform 0.1s;
}
.ctrl-btn:active { transform: scale(0.94); }
.btn-reset { background: white; color: #6A28CC; border: 2px solid #C8B5FF; }
.btn-reveal { background: linear-gradient(135deg, #A78BFA, #7C3AED); color: white; }

/* Progress */
.progress-bar-wrap { width: 100%; max-width: 480px; background: rgba(255,255,255,0.5); border-radius: 20px; height: 10px; margin: 14px 0 4px; overflow: hidden; }
.progress-bar { height: 100%; background: linear-gradient(90deg, #A78BFA, #D63384); border-radius: 20px; transition: width 0.4s ease; }
.progress-label { font-size: 0.72rem; color: #9B8AB8; font-weight: 700; text-align: center; margin-bottom: 10px; }

/* WIN */
.win-overlay { display: none; position: fixed; inset: 0; background: rgba(80,30,180,0.55); z-index: 100; align-items: center; justify-content: center; }
.win-overlay.show { display: flex; }
.win-card { background: white; border-radius: 28px; padding: 36px 40px; text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.3); max-width: 320px; width: 90%; }
.win-card h2 { font-size: 2rem; color: #D63384; font-weight: 900; margin: 12px 0 6px; }
.win-card p  { color: #8B7BA8; font-weight: 700; margin-bottom: 22px; }
.win-btns { display: flex; flex-direction: column; gap: 10px; }
.big-btn { padding: 12px 30px; border-radius: 16px; border: none; font-family: 'Nunito', sans-serif; font-weight: 900; font-size: 1rem; cursor: pointer; background: linear-gradient(135deg, #A78BFA, #7C3AED); color: white; }
.alt-btn { padding: 12px 30px; border-radius: 16px; border: 2px solid #FFB3D9; font-family: 'Nunito', sans-serif; font-weight: 900; font-size: 1rem; cursor: pointer; background: white; color: #D63384; }
</style>
</head>

/* ══════════════════════ STATE + LOGIC ══════════════════════ */
let currentScene = 'panda';
let selColor = null;
let filled = {};
let regionColors = {};        // region number → correct colour, for reveal
const artwork = document.getElementById('artwork');

function buildRegionColorMap(scene) {
  regionColors = {};
  scene.palette.forEach(p => p.regions.forEach(r => { regionColors[r] = p.color; }));
}

function buildPalette(scene) {
  const wrap = document.getElementById('palette');
  wrap.innerHTML = '';
  scene.palette.forEach(u => {
    const sw = document.createElement('div');
    sw.className = 'swatch';
    sw.style.background = u.color;
    sw.style.color = u.textColor || 'rgba(0,0,0,0.5)';
    if (u.border) sw.style.borderColor = u.border;
    sw.textContent = u.label;
    sw.title = u.desc || '';
    sw.onclick = () => selectColor(u, sw);
    wrap.appendChild(sw);
  });
}

function selectColor(u, sw) {
  selColor = u;
  document.querySelectorAll('.swatch').forEach(s => s.classList.remove('sel'));
  sw.classList.add('sel');
}

function shake(el) {
  el.classList.add('shake');
  setTimeout(() => el.classList.remove('shake'), 300);
}

function fillRegion(n, color) {
  artwork.querySelectorAll(`.region[data-region="${n}"]`).forEach(e => {
    e.style.fill = color;
    e.classList.add('filled');
  });
  filled[n] = true;
  artwork.querySelector(`.num-label[data-label="${n}"]`)?.classList.add('hidden');
}

function attachListeners() {
  artwork.querySelectorAll('.region').forEach(el => {
    el.addEventListener('click', () => {
      const n = parseInt(el.dataset.region);
      if (!selColor) { shake(el); return; }
      if (selColor.regions.includes(n)) {
        fillRegion(n, selColor.color);
        updateProgress();
      } else {
        shake(el);
      }
    });
  });
}

function updateProgress() {
  const total = SCENES[currentScene].totalRegions;
  const done = Object.keys(filled).length;
  const pct = Math.round(done / total * 100);
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = `${done} of ${total} regions filled`;
  if (done === total) setTimeout(showWin, 600);
}

function showWin() {
  const scene = SCENES[currentScene];
  const other = currentScene === 'panda' ? 'neko' : 'panda';
  const otherScene = SCENES[other];
  const card = document.getElementById('winCard');
  card.innerHTML =
    `<div style="font-size:3.5rem">${scene.emoji}✨</div>` +
    `<h2>Beautiful!</h2>` +
    `<p>${scene.winMsg}</p>` +
    `<div class="win-btns">` +
      `<button class="big-btn" onclick="closeWin(); resetAll();">🎨 Colour Again</button>` +
      `<button class="alt-btn" onclick="loadScene('${other}')">${otherScene.emoji} Try the ${otherScene.name}!</button>` +
    `</div>`;
  document.getElementById('winOverlay').classList.add('show');
}

function closeWin() {
  document.getElementById('winOverlay').classList.remove('show');
}

function resetAll() {
  filled = {};
  selColor = null;
  document.querySelectorAll('.swatch').forEach(s => s.classList.remove('sel'));
  artwork.querySelectorAll('.region').forEach(el => {
    el.style.fill = '#ffffff';
    el.classList.remove('filled');
  });
  artwork.querySelectorAll('.num-label').forEach(el => el.classList.remove('hidden'));
  updateProgress();
}

function revealAll() {
  artwork.querySelectorAll('.region').forEach(el => {
    const n = parseInt(el.dataset.region);
    el.style.fill = regionColors[n];
    el.classList.add('filled');
    filled[n] = true;
    artwork.querySelector(`.num-label[data-label="${n}"]`)?.classList.add('hidden');
  });
  updateProgress();
}

function loadScene(key, btn) {
  currentScene = key;
  const scene = SCENES[key];
  document.querySelectorAll('.scene-btn').forEach(b => b.classList.remove('active'));
  (btn || document.querySelector(`.scene-btn[data-scene="${key}"]`)).classList.add('active');

  artwork.setAttribute('viewBox', scene.svgViewBox);
  artwork.innerHTML = scene.svgContent;

  buildRegionColorMap(scene);
  buildPalette(scene);

  filled = {};
  selColor = null;
  attachListeners();
  updateProgress();
  closeWin();
}

// Boot
loadScene('panda');
