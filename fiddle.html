<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fiddle Leaf Fig care</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #b5cdb5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 40px 20px;
    }

    .phone-frame {
      width: 320px;
      height: min(780px, calc(100vh - 60px));
      background: #fff;
      border-radius: 50px;
      box-shadow: 0 0 0 10px #1c1c1e, 0 0 0 11px #3a3a3c, 0 40px 100px rgba(0,0,0,0.55);
      overflow: hidden;
      position: relative;
      display: flex;
      flex-direction: column;
    }

    .phone-frame::before {
      content: '';
      position: absolute;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      width: 120px;
      height: 34px;
      background: #1c1c1e;
      border-radius: 20px;
      z-index: 20;
      pointer-events: none;
    }

    .status-bar {
      flex-shrink: 0;
      padding: 16px 28px 6px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #fff;
    }

    .status-time { font-size: 0.92rem; font-weight: 700; color: #1c1c1e; letter-spacing: -0.3px; padding-left: 4px; }
    .status-icons { display: flex; align-items: center; gap: 7px; padding-right: 4px; }

    .app-nav {
      flex-shrink: 0;
      background: #fff;
      border-bottom: 1px solid #f0f0f0;
      padding: 8px 16px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: relative;
    }

    .nav-back {
      font-size: 0.85rem;
      font-weight: 500;
      color: #4caf50;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 3px;
      min-width: 72px;
    }

    .nav-title { font-size: 0.9rem; font-weight: 700; color: #1c1c1e; letter-spacing: -0.2px; }

    .nav-settings-wrap { min-width: 72px; display: flex; justify-content: flex-end; position: relative; }

    .nav-settings-btn {
      background: none; border: none; cursor: pointer; padding: 4px;
      display: flex; align-items: center; color: #4caf50;
    }

    .nav-settings-menu {
      display: none;
      position: absolute;
      right: 0;
      top: calc(100% + 8px);
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.16);
      min-width: 188px;
      overflow: hidden;
      border: 1px solid rgba(0,0,0,0.07);
      z-index: 100;
    }

    .nav-settings-menu a {
      display: flex; align-items: center; gap: 10px;
      padding: 13px 16px;
      font-size: 0.85rem; font-weight: 500; color: #2e7d32;
      text-decoration: none; font-family: inherit;
      border-top: 1px solid #f0f0f0;
    }
    .nav-settings-menu a:first-child { border-top: none; }

    .app-content { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }

    .plant-image {
      height: 220px;
      background: #e8f5e9;
      overflow: hidden;
    }
    .plant-image img { width: 100%; height: 100%; object-fit: cover; display: block; }

    .card-body { padding: 20px 20px 36px; }

    .plant-name { font-size: 1.35rem; font-weight: 700; color: #1b5e20; letter-spacing: -0.3px; }
    .plant-species { font-size: 0.85rem; color: #9e9e9e; font-style: italic; margin-top: 2px; margin-bottom: 20px; }

    .care-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }

    .care-item { background: #f5f5f5; border-radius: 12px; padding: 14px 8px 12px; text-align: center; }
    .care-icon { display: flex; justify-content: center; margin-bottom: 8px; }
    .care-label { font-size: 0.65rem; font-weight: 600; color: #bdbdbd; text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 3px; }
    .care-value { font-size: 0.78rem; font-weight: 600; color: #2e7d32; line-height: 1.3; }

    .water-widget {
      display: flex; align-items: center; gap: 10px;
      background: #f5f5f5; border-radius: 12px; padding: 12px 14px; margin-top: 14px;
    }
    .water-widget-info { flex: 1; min-width: 0; }
    .water-widget-text { font-size: 0.8rem; font-weight: 600; color: #424242; line-height: 1.3; }
    .water-widget-sub { font-size: 0.7rem; margin-top: 2px; font-weight: 600; }
    .water-widget-sub.good    { color: #2e7d32; }
    .water-widget-sub.soon    { color: #f57f17; }
    .water-widget-sub.overdue { color: #e65100; }

    .water-now-btn {
      padding: 8px 12px; border: none; border-radius: 8px;
      background: #2e7d32; color: #fff;
      font-size: 0.78rem; font-weight: 700; font-family: inherit;
      cursor: pointer; white-space: nowrap; flex-shrink: 0;
      transition: background 0.15s, transform 0.1s;
    }
    .water-now-btn:hover  { background: #1b5e20; }
    .water-now-btn:active { transform: scale(0.97); }
    .water-now-btn.done   { background: #a5d6a7; color: #2e7d32; cursor: default; }
    .water-now-btn.done:hover { background: #a5d6a7; }

    .water-bar-wrap { height: 3px; background: #ececec; border-radius: 2px; margin-top: 8px; overflow: hidden; }
    .water-bar-fill { height: 100%; border-radius: 2px; transition: width 0.4s ease; }
    .water-bar-fill.good    { background: #66bb6a; }
    .water-bar-fill.soon    { background: #ffb300; }
    .water-bar-fill.overdue { background: #ef6c00; }

    .weather-widget {
      background: #f0f4f0; border-radius: 12px; padding: 12px 14px;
      margin-top: 14px; display: flex; align-items: center; gap: 12px;
    }
    .weather-icon { font-size: 1.6rem; line-height: 1; flex-shrink: 0; }
    .weather-info { flex: 1; min-width: 0; }
    .weather-temp { font-size: 1.1rem; font-weight: 700; color: #1b5e20; line-height: 1.1; }
    .weather-desc { font-size: 0.72rem; color: #757575; margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .weather-location { font-size: 0.68rem; color: #9e9e9e; text-align: right; flex-shrink: 0; }
    .weather-error { font-size: 0.75rem; color: #9e9e9e; }

    .ai-insight {
      margin-top: 16px; padding: 12px 14px;
      background: rgba(46, 125, 50, 0.04);
      border-radius: 12px; border: 1px solid rgba(46, 125, 50, 0.1);
      display: none;
    }
    .ai-insight-header { display: flex; align-items: center; gap: 5px; margin-bottom: 5px; }
    .ai-insight-label { font-size: 0.65rem; font-weight: 700; color: #a5d6a7; text-transform: uppercase; letter-spacing: 0.6px; }
    .ai-insight-text { font-size: 0.78rem; color: #616161; line-height: 1.55; margin: 0; }

    @media (max-width: 440px) {
      body { padding: 0; align-items: flex-start; background: #fff; }
      .phone-frame { width: 100%; border-radius: 0; box-shadow: none; max-height: 100dvh; }
      .phone-frame::before { display: none; }
      .status-bar { display: none; }
    }
  </style>
</head>

  <script>
    function toggleSettings(e) {
      e.stopPropagation();
      const m = document.getElementById('settingsMenu');
      m.style.display = m.style.display === 'none' ? 'block' : 'none';
    }
    document.addEventListener('click', () => { document.getElementById('settingsMenu').style.display = 'none'; });
    function clearWatering(e) {
      e.preventDefault();
      document.getElementById('settingsMenu').style.display = 'none';
      localStorage.removeItem('fiddle-watering-history');
      location.reload();
    }
    function deletePlant() {
      localStorage.removeItem('plant-fiddle-added');
      localStorage.removeItem('fiddle-watering-history');
      localStorage.removeItem('fiddle-watering-interval');
      location.href = 'plants.html';
    }
  </script>

  <script>
    const widget = document.getElementById('weatherWidget');

    const cities = {
      'Brampton': { lat:43.7315,lon:-79.7624,prov:'ON',tz:'America/Toronto' }, 'Calgary': { lat:51.0447,lon:-114.0719,prov:'AB',tz:'America/Edmonton' },

      'Saskatoon': { lat:52.1332,lon:-106.6700,prov:'SK',tz:'America/Regina' }, "St. John's": { lat:47.5615,lon:-52.7126,prov:'NL',tz:'America/St_Johns' },
      'Sudbury': { lat:46.4900,lon:-80.9910,prov:'ON',tz:'America/Toronto' }, 'Thunder Bay': { lat:48.3809,lon:-89.2477,prov:'ON',tz:'America/Toronto' },
      'Toronto': { lat:43.7001,lon:-79.4163,prov:'ON',tz:'America/Toronto' }, 'Vancouver': { lat:49.2827,lon:-123.1207,prov:'BC',tz:'America/Vancouver' },
      'Victoria': { lat:48.4284,lon:-123.3656,prov:'BC',tz:'America/Vancouver' }, 'Windsor': { lat:42.3149,lon:-83.0364,prov:'ON',tz:'America/Toronto' },
      'Winnipeg': { lat:49.8951,lon:-97.1384,prov:'MB',tz:'America/Winnipeg' },
    };

    const weatherIcons = { 0:'☀️',1:'🌤️',2:'⛅',3:'☁️',45:'🌫️',48:'🌫️',51:'🌦️',53:'🌦️',55:'🌧️',61:'🌧️',63:'🌧️',65:'🌧️',71:'🌨️',73:'🌨️',75:'❄️',80:'🌦️',81:'🌧️',82:'⛈️',95:'⛈️',96:'⛈️',99:'⛈️' };
    const weatherDescs = { 0:'Clear sky',1:'Mainly clear',2:'Partly cloudy',3:'Overcast',45:'Foggy',48:'Freezing fog',51:'Light drizzle',53:'Drizzle',55:'Heavy drizzle',61:'Light rain',63:'Rain',65:'Heavy rain',71:'Light snow',73:'Snow',75:'Heavy snow',80:'Showers',81:'Rain showers',82:'Violent showers',95:'Thunderstorm',96:'Thunderstorm',99:'Thunderstorm' };

    const cityName = localStorage.getItem('plant-city') || 'Toronto';
    const city = cities[cityName] || cities['Toronto'];
    const { lat, lon, prov, tz } = city;

    function generateInsight(weatherCode, temp, humidity, uvIndex, windSpeed) {
      const w = window._waterStatus;
      if (!w || !w.ready) return;

      const insightEl = document.getElementById('aiInsight');
      const textEl    = document.getElementById('aiInsightText');

      const isSunny  = weatherCode !== null && [0, 1].includes(weatherCode);
      const isHot    = temp !== null && temp >= 28;
      const isCloudy = weatherCode !== null && [2, 3, 45, 48].includes(weatherCode);
      const isRainy  = weatherCode !== null && [51,53,55,61,63,65,80,81,82,95,96,99].includes(weatherCode);
      const driesOut = isSunny || isHot;
      const moist    = isCloudy || isRainy;

      // FLF prefers 30-65% humidity; sensitive to both extremes
      const isHighOutdoorHum = humidity !== null && humidity >= 65;
      const isLowOutdoorHum  = humidity !== null && humidity < 30;
      const humidTip = isHighOutdoorHum
        ? `Outdoor humidity is high (${humidity}%) — FLFs can be sensitive to excess moisture, so ensure good airflow around the pot.`
        : isLowOutdoorHum
          ? `Outdoor humidity is very low (${humidity}%). Indoor air will be even drier — a humidifier can prevent brown leaf edges.`
          : '';

      // FLF hates direct sun — UV warning
      const uvHigh     = uvIndex !== null && uvIndex >= 5;
      const uvVeryHigh = uvIndex !== null && uvIndex >= 8;
      const uvTip = uvHigh
        ? `UV is ${uvVeryHigh ? 'very high' : 'high'} today (index ${uvIndex}). Keep your Fiddle Leaf away from direct sun — leaves burn easily and won't recover.`
        : '';

      // FLF hates drafts more than most plants
      const isWindy = windSpeed !== null && windSpeed >= 25;
      const windTip = isWindy
        ? `It's windy out (${windSpeed} km/h) — Fiddle Leaf Figs are extremely sensitive to drafts. Close windows near the plant to avoid leaf drop.`
        : '';

      const rainTip = isRainy
        ? `It's raining — a great time to collect some rainwater for your next watering. Plants prefer it over tap water, which often contains chlorine that can build up in the soil.`
        : '';

      const month = new Date().getMonth();
      const isHeatingMonth  = [9, 10, 11, 0, 1, 2, 3].includes(month);
      const isHeatingLikely = isHeatingMonth && (temp === null || temp < 15);
      const heatingTip = isHeatingLikely
        ? `Indoor heating dries out the air significantly in these months. Fiddle Leaf Figs are sensitive to low humidity — keep it away from vents and avoid cold drafts near windows.`
        : '';

      let text = '';

      if (w.noHistory) {
        text = 'Tap "Water today" to start tracking. Fiddle Leaf Figs need consistent watering — logging it helps spot patterns early.';
      } else if (w.wateredToday && driesOut) {
        text = 'Freshly watered on a sunny day — good call. Let the top few inches dry out before the next water.';
      } else if (w.wateredToday) {
        text = moist
          ? 'Freshly watered and overcast outside — soil will stay moist longer. Fiddle Leaf Figs prefer to dry out a bit between waterings.'
          : 'Freshly watered. Check the soil before the next water — FLFs are prone to root rot if overwatered.';
      } else if (w.days >= w.interval && driesOut) {
        text = 'Watering is overdue and the sunny conditions may have sped up drying. Check the soil — give it a thorough soak if the top few inches feel dry.';
      } else if (w.days >= w.interval) {
        text = 'Watering is overdue. Check the soil before watering — Fiddle Leaf Figs hate sitting in wet soil.';
      } else {
        const daysLeft  = w.interval - w.days;
        const isDueSoon = w.days >= w.interval * 0.75;
        if (isDueSoon && driesOut) {
          text = `Getting close to watering time and bright conditions are speeding up evaporation. Check the soil — it may be ready a day early.`;
        } else if (isDueSoon) {
          text = `Approaching watering time — ${daysLeft} day${daysLeft !== 1 ? 's' : ''} to go. Stick your finger into the soil to check moisture before watering.`;
        } else if (moist) {
          text = `Overcast outside slows evaporation indoors too — FLF soil should hold well. ${daysLeft} day${daysLeft !== 1 ? 's' : ''} until next water.`;
        } else {
          text = `All on track. ${daysLeft} day${daysLeft !== 1 ? 's' : ''} until the next watering.`;
        }
      }

      if (humidTip) text += ' ' + humidTip;
      if (uvTip)    text += ' ' + uvTip;
      if (windTip)  text += ' ' + windTip;
      if (rainTip)    text += ' ' + rainTip;
      if (heatingTip) text += ' ' + heatingTip;

      if (text) { textEl.textContent = text; insightEl.style.display = 'block'; }
    }

    fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,weathercode,relative_humidity_2m,uv_index,wind_speed_10m&temperature_unit=celsius&wind_speed_unit=kmh&timezone=${encodeURIComponent(tz)}`)
      .then(r => r.json())
      .then(data => {
        const temp = Math.round(data.current.temperature_2m);
        const code = data.current.weathercode;
        const humidity = data.current.relative_humidity_2m;
        const uvIndex = Math.round(data.current.uv_index);
        const windSpeed = Math.round(data.current.wind_speed_10m);
        const icon = weatherIcons[code] ?? '🌡️';
        const desc = weatherDescs[code] ?? 'Unknown';
        widget.innerHTML = `
          <span class="weather-icon">${icon}</span>
          <div class="weather-info">
            <div class="weather-temp">${temp}°C</div>
            <div class="weather-desc">${desc}</div>
            <div class="weather-desc" style="margin-top:2px;">${humidity}% humidity · UV ${uvIndex}</div>
          </div>
          <div class="weather-location">${cityName}, ${prov}</div>
        `;
        window._lastWeatherArgs = [code, temp, humidity, uvIndex, windSpeed];
        generateInsight(code, temp, humidity, uvIndex, windSpeed);
      })
      .catch(() => {
        widget.innerHTML = '<span class="weather-error">Weather unavailable</span>';
        generateInsight(null, null, null, null, null);
      });
  </script>

  <script>
    (function() {
      const HISTORY_KEY  = 'fiddle-watering-history';
      const INTERVAL_KEY = 'fiddle-watering-interval';

      function getHistory() { try { return JSON.parse(localStorage.getItem(HISTORY_KEY)) || []; } catch { return []; } }
      function todayISO() { const d = new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
      function daysSince(iso) { const then = new Date(iso + 'T00:00:00'); const now = new Date(); now.setHours(0,0,0,0); return Math.floor((now - then) / 86400000); }

      window._waterStatus = { ready: false };

      window.logWatering = function() {
        const today = todayISO(); const h = getHistory();
        if (h[0] === today) return;
        h.unshift(today);
        localStorage.setItem(HISTORY_KEY, JSON.stringify(h));
        renderWater();
        if (window._lastWeatherArgs) generateInsight(...window._lastWeatherArgs);
      };

      function renderWater() {
        const history  = getHistory();
        const interval = parseInt(localStorage.getItem(INTERVAL_KEY) || '10', 10);
        const textEl = document.getElementById('waterWidgetText');
        const subEl  = document.getElementById('waterWidgetSub');
        const btn    = document.getElementById('waterNowBtn');
        const fill   = document.getElementById('waterBarFill');

        if (history.length === 0) {
          textEl.textContent = 'No waterings logged yet'; subEl.textContent = ''; subEl.className = 'water-widget-sub';
          fill.style.width = '0%'; fill.className = 'water-bar-fill good';
          btn.textContent = '💧 Water today'; btn.className = 'water-now-btn';
          return;
        }

        const last = history[0]; const days = daysSince(last); const daysLeft = interval - days; const pct = Math.min(days / interval, 1);
        textEl.textContent = days === 0 ? 'Watered today' : `Watered ${days} day${days !== 1 ? 's' : ''} ago`;

        let cls, sub;
        if (days < interval * 0.75)      { cls = 'good'; sub = daysLeft > 0 ? `Next in ${daysLeft} day${daysLeft !== 1 ? 's' : ''}` : 'Due today'; }
        else if (days < interval)         { cls = 'soon'; sub = `Due in ${daysLeft} day${daysLeft !== 1 ? 's' : ''}`; }
        else { cls = 'overdue'; const over = days - interval; sub = over === 0 ? 'Due today' : `${over} day${over !== 1 ? 's' : ''} overdue`; }

        subEl.textContent = sub; subEl.className = `water-widget-sub ${cls}`;
        fill.style.width = `${Math.round(pct * 100)}%`; fill.className = `water-bar-fill ${cls}`;
        if (last === todayISO()) { btn.textContent = '✓ Done'; btn.className = 'water-now-btn done'; }
        else { btn.textContent = '💧 Water today'; btn.className = 'water-now-btn'; }

        window._waterStatus = { ready: true, days, interval, noHistory: false, wateredToday: last === todayISO() };
      }

      function init() {
        const history = getHistory();
        if (history.length === 0) window._waterStatus = { ready: true, days: null, interval: parseInt(localStorage.getItem(INTERVAL_KEY) || '10', 10), noHistory: true, wateredToday: false };
        renderWater();
      }

      init();
    })();
  </script>
